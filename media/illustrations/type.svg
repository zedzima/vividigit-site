<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for typography frame -->
  <rect x="93" y="33" width="220" height="260" rx="12" fill="#000" opacity="0.08"/>
  <!-- Typography frame -->
  <rect x="90" y="30" width="220" height="260" rx="12" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Inner canvas area -->
  <rect x="106" y="50" width="188" height="220" rx="4" fill="white" fill-opacity="0.45" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Large letter A shadow -->
  <text x="153" y="208" font-family="Georgia, serif" font-size="160" fill="#000" opacity="0.08" font-weight="bold">A</text>
  <!-- Large letter A -->
  <text x="150" y="205" font-family="Georgia, serif" font-size="160" fill="#7C3AED" fill-opacity="0.20" stroke="#2E2D2D" stroke-width="3" font-weight="bold">A</text>
  <!-- Crossbar highlight on A -->
  <line x1="168" y1="175" x2="240" y2="175" stroke="#A855F7" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- Cursor blinking in text (near baseline) -->
  <line x1="260" y1="140" x2="260" y2="210" stroke="#C026D3" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Specimen grid: top-left small sizes -->
  <text x="112" y="65" font-family="Georgia, serif" font-size="8" fill="#2E2D2D" opacity="0.4">Aa</text>
  <text x="130" y="65" font-family="Georgia, serif" font-size="10" fill="#2E2D2D" opacity="0.4">Aa</text>
  <text x="152" y="65" font-family="Georgia, serif" font-size="12" fill="#2E2D2D" opacity="0.45">Aa</text>
  <text x="178" y="65" font-family="Georgia, serif" font-size="14" fill="#2E2D2D" opacity="0.5">Aa</text>
  <text x="208" y="65" font-family="Georgia, serif" font-size="16" fill="#7C3AED" opacity="0.5">Aa</text>
  <!-- Grid lines under specimen -->
  <line x1="112" y1="70" x2="240" y2="70" stroke="#2E2D2D" stroke-width="0.8" stroke-linecap="round" opacity="0.15"/>
  <!-- Baseline guides -->
  <line x1="140" y1="210" x2="270" y2="210" stroke="#A855F7" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="140" y1="80" x2="270" y2="80" stroke="#A855F7" stroke-width="1" stroke-dasharray="4,3" opacity="0.25"/>
  <!-- Left hand adjusting slider -->
  <path d="M42,195 C32,185 28,175 30,168 C32,162 38,160 42,164 C42,156 48,154 52,160 C54,152 62,152 64,160 C66,154 72,156 72,164 L72,200 C72,210 62,218 52,215 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Slider track (font weight) -->
  <rect x="44" y="225" width="10" height="80" rx="5" fill="#2E2D2D" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="49" cy="250" r="7" fill="#7C3AED" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Weight label -->
  <text x="32" y="320" font-family="sans-serif" font-size="9" fill="#2E2D2D" opacity="0.4">W</text>
  <!-- Right hand adjusting slider -->
  <path d="M358,195 C368,185 372,175 370,168 C368,162 362,160 358,164 C358,156 352,154 348,160 C346,152 338,152 336,160 C334,154 328,156 328,164 L328,200 C328,210 338,218 348,215 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Slider track (font size) -->
  <rect x="346" y="225" width="10" height="80" rx="5" fill="#2E2D2D" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="351" cy="265" r="7" fill="#A855F7" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Size label -->
  <text x="340" y="320" font-family="sans-serif" font-size="9" fill="#2E2D2D" opacity="0.4">Sz</text>
  <!-- Specimen grid bottom: different weights -->
  <text x="118" y="255" font-family="Georgia, serif" font-size="11" fill="#2E2D2D" opacity="0.3" font-weight="300">Light</text>
  <text x="165" y="255" font-family="Georgia, serif" font-size="11" fill="#2E2D2D" opacity="0.45" font-weight="400">Regular</text>
  <text x="225" y="255" font-family="Georgia, serif" font-size="11" fill="#2E2D2D" opacity="0.55" font-weight="700">Bold</text>
  <!-- Frame top bar detail -->
  <circle cx="106" cy="40" r="3" fill="#C026D3" fill-opacity="0.3"/>
  <circle cx="116" cy="40" r="3" fill="#A855F7" fill-opacity="0.3"/>
  <circle cx="126" cy="40" r="3" fill="#7C3AED" fill-opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="30" cy="130" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="375" cy="140" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="45" cy="350" r="2" fill="#C026D3" opacity="0.25"/>
  <circle cx="360" cy="345" r="3" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="320" y1="50" x2="340" y2="50" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="325" y1="58" x2="350" y2="58" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="55" y1="370" x2="72" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Floating typography symbol -->
  <text x="330" y="100" font-family="Georgia, serif" font-size="22" fill="#C026D3" opacity="0.25" font-weight="bold">Ty</text>
</svg>