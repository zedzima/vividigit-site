<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Circle shadow -->
  <circle cx="183" cy="193" r="100" fill="#000" opacity="0.08"/>
  <!-- Large circle -->
  <circle cx="180" cy="190" r="100" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Inner circle highlight -->
  <circle cx="180" cy="190" r="80" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <!-- Bold checkmark -->
  <polyline points="135,190 165,220 225,155" stroke="#7C3AED" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Checkmark accent shadow -->
  <polyline points="137,193 167,223 227,158" stroke="#000" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.06"/>
  <!-- Person giving thumbs up -->
  <!-- Head -->
  <circle cx="330" cy="140" r="20" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Hair detail -->
  <path d="M315,130 Q318,118 330,115 Q342,118 345,130" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Body -->
  <path d="M330,160 L330,230" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M330,230 L310,280" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <path d="M330,230 L350,280" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Left arm (relaxed) -->
  <path d="M330,175 L355,200" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Right arm (thumbs up) -->
  <path d="M330,175 L302,160" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Thumbs up hand -->
  <path d="M295,155 L290,130 C288,122 292,118 298,120 L302,125 C300,118 305,114 310,118 L308,128 Q306,138 300,150 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Thumb (pointing up) -->
  <path d="M290,130 L288,115 C287,108 292,106 295,110 L296,120" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.14" stroke-linecap="round"/>
  <!-- Confetti pieces -->
  <rect x="55" y="60" width="10" height="6" rx="1" fill="#7C3AED" fill-opacity="0.4" transform="rotate(25,60,63)"/>
  <rect x="105" y="40" width="10" height="6" rx="1" fill="#C026D3" fill-opacity="0.35" transform="rotate(-15,110,43)"/>
  <rect x="240" y="50" width="10" height="6" rx="1" fill="#A855F7" fill-opacity="0.35" transform="rotate(40,245,53)"/>
  <circle cx="80" cy="55" r="4" fill="#A855F7" fill-opacity="0.35"/>
  <circle cx="145" cy="45" r="3" fill="#7C3AED" fill-opacity="0.3"/>
  <circle cx="220" cy="40" r="4" fill="#C026D3" fill-opacity="0.3"/>
  <polygon points="175,35 178,42 185,42 180,47 182,54 175,49 168,54 170,47 165,42 172,42" fill="#7C3AED" fill-opacity="0.3"/>
  <!-- More confetti -->
  <rect x="50" y="310" width="8" height="5" rx="1" fill="#C026D3" fill-opacity="0.25" transform="rotate(-30,54,312)"/>
  <rect x="280" y="310" width="8" height="5" rx="1" fill="#7C3AED" fill-opacity="0.25" transform="rotate(20,284,312)"/>
  <circle cx="60" cy="95" r="3" fill="#C026D3" fill-opacity="0.3"/>
  <!-- Small task list (bottom-left) -->
  <rect x="25" y="320" width="80" height="65" rx="5" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="25" y="320" width="80" height="65" rx="5" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.10"/>
  <!-- Task list items -->
  <rect x="35" y="332" width="10" height="10" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <polyline points="37,337 40,340 44,334" stroke="#7C3AED" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="50" y1="337" x2="92" y2="337" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <rect x="35" y="350" width="10" height="10" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <polyline points="37,355 40,358 44,352" stroke="#7C3AED" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="50" y1="355" x2="85" y2="355" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <rect x="35" y="368" width="10" height="10" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <polyline points="37,373 40,376 44,370" stroke="#7C3AED" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="50" y1="373" x2="90" y2="373" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Completion indicator (progress circle) -->
  <circle cx="365" cy="340" r="18" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M365,322 A18,18 0 1,1 347,340" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <text x="358" y="346" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7C3AED" opacity="0.5">&#x2713;</text>
  <!-- Decorative dots -->
  <circle cx="370" cy="70" r="2.5" fill="#7C3AED" opacity="0.25"/>
  <circle cx="30" cy="200" r="3" fill="#A855F7" opacity="0.2"/>
  <circle cx="355" cy="240" r="2" fill="#C026D3" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="350" y1="95" x2="370" y2="95" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="20" y1="150" x2="35" y2="150" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>