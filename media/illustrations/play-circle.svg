<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for play circle -->
  <circle cx="193" cy="183" r="95" fill="#000" opacity="0.08"/>
  <!-- Large play circle -->
  <circle cx="190" cy="180" r="95" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Inner ring -->
  <circle cx="190" cy="180" r="75" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.15"/>
  <!-- Play triangle -->
  <path d="M170 145 L170 215 L225 180 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#A855F7" fill-opacity="0.2" stroke-linejoin="round"/>
  <!-- Triangle inner highlight -->
  <path d="M180 158 L180 202 L210 180 Z" fill="#7C3AED" opacity="0.08"/>
  <!-- Person pressing button (right side) -->
  <!-- Person head -->
  <circle cx="320" cy="155" r="18" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Hair line -->
  <path d="M306 148 Q310 135 320 132 Q330 135 334 148" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Person body -->
  <path d="M302 173 Q310 180 320 180 Q330 180 338 173 L345 220 Q340 240 320 245 Q300 240 295 220 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Person arm reaching to press -->
  <path d="M302 195 Q290 190 280 185 Q270 180 265 178" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Hand/finger pressing -->
  <path d="M265 178 Q260 174 255 175 Q252 178 256 182 Q260 185 266 182 Z" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.15" stroke-linejoin="round"/>
  <!-- Press effect rings -->
  <circle cx="260" cy="178" r="10" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.2"/>
  <circle cx="260" cy="178" r="16" stroke="#A855F7" stroke-width="1" fill="none" opacity="0.12"/>
  <!-- Volume bars (left side) -->
  <rect x="48" y="260" width="6" height="18" rx="2" fill="#2E2D2D" opacity="0.2"/>
  <rect x="60" y="250" width="6" height="28" rx="2" fill="#7C3AED" opacity="0.25"/>
  <rect x="72" y="240" width="6" height="38" rx="2" fill="#A855F7" opacity="0.25"/>
  <rect x="84" y="246" width="6" height="32" rx="2" fill="#C026D3" opacity="0.2"/>
  <rect x="96" y="256" width="6" height="22" rx="2" fill="#2E2D2D" opacity="0.15"/>
  <!-- Progress indicator arc (bottom) -->
  <path d="M120 330 A80 80 0 0 1 280 330" stroke="#2E2D2D" stroke-width="3" fill="none" opacity="0.15"/>
  <path d="M120 330 A80 80 0 0 1 200 290" stroke="#7C3AED" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Progress dot -->
  <circle cx="200" cy="290" r="5" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.3"/>
  <!-- Small playlist (bottom-right) -->
  <rect x="310" y="290" width="60" height="65" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.1"/>
  <!-- Playlist items -->
  <line x1="320" y1="305" x2="360" y2="305" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="320" y1="318" x2="355" y2="318" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="320" y1="331" x2="350" y2="331" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="320" y1="344" x2="345" y2="344" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Active item indicator -->
  <circle cx="314" cy="305" r="2.5" fill="#7C3AED" opacity="0.4"/>
  <!-- Decorative music note (top-left) -->
  <circle cx="58" cy="100" r="6" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.15"/>
  <line x1="64" y1="100" x2="64" y2="78" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M64 78 Q72 75 72 82" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="370" cy="120" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="382" cy="140" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="38" cy="200" r="2.5" fill="#C026D3" opacity="0.25"/>
  <circle cx="25" cy="340" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="340" y1="80" x2="360" y2="80" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="350" y1="90" x2="375" y2="90" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>