<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Map surface shadow -->
  <ellipse cx="203" cy="303" rx="150" ry="60" fill="#000" opacity="0.08"/>
  <!-- Map surface -->
  <ellipse cx="200" cy="300" rx="150" ry="60" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Map grid lines -->
  <path d="M70,290 Q130,275 200,285 Q270,295 330,280" stroke="#2E2D2D" stroke-width="1" opacity="0.12"/>
  <path d="M80,305 Q140,290 200,300 Q260,310 320,295" stroke="#2E2D2D" stroke-width="1" opacity="0.10"/>
  <path d="M90,318 Q150,305 200,315 Q250,325 310,310" stroke="#2E2D2D" stroke-width="1" opacity="0.08"/>
  <line x1="140" y1="260" x2="140" y2="340" stroke="#2E2D2D" stroke-width="1" opacity="0.08"/>
  <line x1="200" y1="245" x2="200" y2="355" stroke="#2E2D2D" stroke-width="1" opacity="0.08"/>
  <line x1="260" y1="260" x2="260" y2="340" stroke="#2E2D2D" stroke-width="1" opacity="0.08"/>
  <!-- Ripple effect at landing point -->
  <ellipse cx="200" cy="290" rx="55" ry="20" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.3"/>
  <ellipse cx="200" cy="290" rx="38" ry="14" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.2"/>
  <ellipse cx="200" cy="290" rx="22" ry="8" stroke="#C026D3" stroke-width="1.5" fill="#C026D3" fill-opacity="0.08"/>
  <!-- Pin shadow -->
  <path d="M173,160 C173,118 183,78 203,78 C223,78 233,118 233,160 C233,200 203,248 203,248 C203,248 173,200 173,160 Z" fill="#000" opacity="0.08"/>
  <!-- Large location pin -->
  <path d="M170,155 C170,115 180,75 200,75 C220,75 230,115 230,155 C230,195 200,245 200,245 C200,245 170,195 170,155 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.15"/>
  <!-- Pin inner circle -->
  <circle cx="200" cy="140" r="30" stroke="#2E2D2D" stroke-width="3" fill="white" fill-opacity="0.5"/>
  <!-- Pin highlight -->
  <circle cx="200" cy="140" r="18" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.2"/>
  <circle cx="200" cy="140" r="8" fill="#7C3AED" opacity="0.5"/>
  <!-- Pin shine -->
  <path d="M183,120 Q188,110 198,108" stroke="white" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- Small building icons at pin location -->
  <!-- Building 1 -->
  <rect x="185" y="278" width="10" height="14" rx="1" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.15"/>
  <rect x="187" y="280" width="2.5" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <rect x="191" y="280" width="2.5" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <rect x="187" y="285" width="2.5" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <rect x="191" y="285" width="2.5" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <!-- Building 2 -->
  <rect x="198" y="274" width="12" height="18" rx="1" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.12"/>
  <rect x="200" y="276" width="3" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <rect x="205" y="276" width="3" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <rect x="200" y="282" width="3" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <rect x="205" y="282" width="3" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <!-- Building 3 -->
  <rect x="213" y="280" width="8" height="12" rx="1" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.12"/>
  <rect x="215" y="282" width="2" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <rect x="215" y="287" width="2" height="3" rx="0.5" fill="#2E2D2D" opacity="0.3"/>
  <!-- Dotted circle area -->
  <circle cx="200" cy="290" r="42" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.15" stroke-dasharray="4,4"/>
  <!-- Motion lines showing pin dropping -->
  <line x1="180" y1="50" x2="180" y2="70" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="220" y1="45" x2="220" y2="65" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="200" y1="38" x2="200" y2="58" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <!-- Small location pins on map -->
  <path d="M100,275 C100,271 103,269 106,269 C109,269 112,271 112,275 C112,279 106,284 106,284 C106,284 100,279 100,275 Z" fill="#A855F7" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="1.5"/>
  <path d="M290,270 C290,266 293,264 296,264 C299,264 302,266 302,270 C302,274 296,279 296,279 C296,279 290,274 290,270 Z" fill="#C026D3" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Decorative dots -->
  <circle cx="50" cy="120" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="360" cy="100" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="45" cy="350" r="2" fill="#C026D3" opacity="0.2"/>
  <circle cx="355" cy="360" r="2.5" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="320" y1="60" x2="340" y2="60" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="60" y1="55" x2="75" y2="55" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>