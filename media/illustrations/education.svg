<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Bottom book stack shadow -->
  <rect x="98" y="233" width="200" height="28" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Book 1 (bottom) -->
  <rect x="95" y="230" width="200" height="28" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.15"/>
  <line x1="105" y1="236" x2="105" y2="252" stroke="#2E2D2D" stroke-width="2" opacity="0.3"/>
  <!-- Book 2 -->
  <rect x="105" y="200" width="190" height="28" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.14"/>
  <line x1="115" y1="206" x2="115" y2="222" stroke="#2E2D2D" stroke-width="2" opacity="0.3"/>
  <!-- Book 3 -->
  <rect x="100" y="170" width="195" height="28" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.12"/>
  <line x1="110" y1="176" x2="110" y2="192" stroke="#2E2D2D" stroke-width="2" opacity="0.3"/>
  <!-- Book 4 (top of closed stack) -->
  <rect x="108" y="140" width="185" height="28" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.12"/>
  <line x1="118" y1="146" x2="118" y2="162" stroke="#2E2D2D" stroke-width="2" opacity="0.3"/>
  <!-- Book text lines on spines -->
  <line x1="140" y1="244" x2="210" y2="244" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="145" y1="214" x2="220" y2="214" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="140" y1="184" x2="215" y2="184" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="148" y1="154" x2="220" y2="154" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Open book shadow -->
  <path d="M118 138 Q200 120 200 100 Q200 120 282 138" fill="#000" opacity="0.06" transform="translate(3,-2)"/>
  <!-- Open book left page -->
  <path d="M115 140 Q115 110 125 100 Q160 85 198 98 L198 138 Z" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.10"/>
  <!-- Open book right page -->
  <path d="M202 98 Q240 85 275 100 Q285 110 285 140 L202 138 Z" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Book spine -->
  <line x1="200" y1="95" x2="200" y2="140" stroke="#2E2D2D" stroke-width="2.5"/>
  <!-- Text lines in open book -->
  <line x1="130" y1="110" x2="185" y2="106" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="132" y1="118" x2="190" y2="114" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="134" y1="126" x2="188" y2="122" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="212" y1="106" x2="268" y2="110" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="210" y1="114" x2="265" y2="118" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Knowledge flowing out - abstract particles -->
  <circle cx="170" cy="72" r="5" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.15"/>
  <circle cx="200" cy="55" r="7" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.15"/>
  <circle cx="235" cy="65" r="4" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="155" cy="52" r="3.5" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.12"/>
  <circle cx="215" cy="42" r="5" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.12"/>
  <circle cx="180" cy="38" r="3" stroke="#2E2D2D" stroke-width="1" fill="#C026D3" fill-opacity="0.15"/>
  <!-- Rising lines from book -->
  <line x1="190" y1="85" x2="178" y2="60" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="210" y1="85" x2="222" y2="55" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Graduation cap shadow -->
  <path d="M275 285 L345 305 L275 325 L205 305 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Graduation cap - board -->
  <path d="M272 282 L342 302 L272 322 L202 302 Z" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.16"/>
  <!-- Cap base -->
  <path d="M232 302 L232 330 Q272 345 312 330 L312 302" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" fill-opacity="0.08"/>
  <!-- Tassel -->
  <line x1="342" y1="302" x2="342" y2="340" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="342" cy="343" r="4" fill="#2E2D2D" opacity="0.6"/>
  <!-- Button on top -->
  <circle cx="272" cy="298" r="4" fill="#2E2D2D" opacity="0.5"/>
  <!-- Lightbulb -->
  <path d="M55 290 Q55 268 68 260 Q80 252 92 260 Q105 268 105 290 L95 298 L65 298 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.14"/>
  <line x1="68" y1="302" x2="88" y2="302" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="70" y1="308" x2="86" y2="308" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Filament -->
  <path d="M75 280 Q80 270 80 280 Q80 270 85 280" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.35"/>
  <!-- Pencil -->
  <line x1="340" y1="175" x2="365" y2="225" stroke="#2E2D2D" stroke-width="6" stroke-linecap="round"/>
  <line x1="340" y1="175" x2="365" y2="225" stroke="#A855F7" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  <!-- Pencil tip -->
  <path d="M365 225 L368 238 L358 230 Z" fill="#2E2D2D" opacity="0.7"/>
  <!-- Pencil eraser -->
  <line x1="338" y1="170" x2="342" y2="178" stroke="#C026D3" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <!-- Small certificate -->
  <rect x="38" y="140" width="45" height="35" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="60" cy="155" r="6" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <line x1="48" y1="166" x2="72" y2="166" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Decorative dots -->
  <circle cx="350" cy="128" r="2.5" fill="#7C3AED" opacity="0.3"/>
  <circle cx="42" cy="240" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="365" cy="280" r="2" fill="#C026D3" opacity="0.25"/>
  <circle cx="140" cy="360" r="2.5" fill="#7C3AED" opacity="0.25"/>
  <!-- Decorative lines -->
  <line x1="310" y1="50" x2="330" y2="50" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="45" y1="370" x2="65" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>