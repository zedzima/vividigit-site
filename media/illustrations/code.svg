<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for monitor -->
  <rect x="77" y="53" width="250" height="170" rx="10" fill="#000" opacity="0.08"/>
  <!-- Monitor body -->
  <rect x="74" y="50" width="250" height="170" rx="10" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Screen inner area -->
  <rect x="88" y="64" width="222" height="140" rx="4" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.5"/>
  <!-- Code line 1: opening bracket -->
  <text x="105" y="95" font-family="monospace" font-size="22" fill="#7C3AED" font-weight="bold">{</text>
  <!-- Code lines -->
  <line x1="125" y1="90" x2="210" y2="90" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <line x1="135" y1="108" x2="240" y2="108" stroke="#A855F7" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="135" y1="124" x2="220" y2="124" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="135" y1="140" x2="260" y2="140" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="125" y1="156" x2="195" y2="156" stroke="#A855F7" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Code line: closing bracket -->
  <text x="105" y="175" font-family="monospace" font-size="22" fill="#7C3AED" font-weight="bold">}</text>
  <!-- Terminal icon top-right of screen -->
  <rect x="262" y="72" width="38" height="26" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.15"/>
  <polyline points="268,80 275,86 268,92" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="278" y1="92" x2="290" y2="92" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>
  <!-- Monitor stand -->
  <rect x="178" y="220" width="42" height="22" rx="2" stroke="#2E2D2D" stroke-width="3" fill="#2E2D2D" fill-opacity="0.08"/>
  <rect x="160" y="240" width="78" height="8" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#2E2D2D" fill-opacity="0.08"/>
  <!-- Depth shadow for keyboard -->
  <rect x="83" y="273" width="240" height="65" rx="8" fill="#000" opacity="0.08"/>
  <!-- Keyboard -->
  <rect x="80" y="270" width="240" height="65" rx="8" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.10"/>
  <!-- Keyboard keys row 1 -->
  <rect x="96" y="280" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="120" y="280" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="144" y="280" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="168" y="280" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="192" y="280" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="216" y="280" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="240" y="280" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="264" y="280" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <!-- Keyboard keys row 2 -->
  <rect x="102" y="298" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="126" y="298" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="150" y="298" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="174" y="298" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="198" y="298" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="222" y="298" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <rect x="246" y="298" width="18" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <!-- Spacebar -->
  <rect x="140" y="316" width="100" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <!-- Left hand -->
  <path d="M60,300 C50,290 42,280 42,270 C42,264 46,260 52,262 C52,254 60,252 64,258 C66,250 74,250 76,258 C78,250 86,252 86,260 L86,292 C86,298 78,306 70,308 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Right hand -->
  <path d="M340,300 C350,290 358,280 358,270 C358,264 354,260 348,262 C348,254 340,252 336,258 C334,250 326,250 324,258 C322,250 314,252 314,260 L314,292 C314,298 322,306 330,308 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Floating curly brace left -->
  <text x="30" y="140" font-family="monospace" font-size="30" fill="#7C3AED" opacity="0.35" font-weight="bold">{</text>
  <!-- Floating curly brace right -->
  <text x="348" y="120" font-family="monospace" font-size="30" fill="#A855F7" opacity="0.35" font-weight="bold">}</text>
  <!-- Decorative dots -->
  <circle cx="355" cy="180" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="370" cy="200" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="25" cy="200" r="3" fill="#C026D3" opacity="0.25"/>
  <circle cx="40" cy="180" r="2" fill="#7C3AED" opacity="0.3"/>
  <!-- Small angle bracket decorative -->
  <text x="340" y="160" font-family="monospace" font-size="16" fill="#C026D3" opacity="0.3">/&gt;</text>
</svg>