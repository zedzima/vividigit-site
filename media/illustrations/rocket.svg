<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Exhaust trail / flame shadow -->
  <path d="M203 318 Q178 348 168 378 Q198 365 203 378 Q208 365 238 378 Q228 348 203 318 Z" fill="#000" opacity="0.08" transform="translate(4,4)"/>
