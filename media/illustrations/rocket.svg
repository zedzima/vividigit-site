  <line x1="320" y1="282" x2="322" y2="286" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <line x1="335" y1="280" x2="335" y2="284" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <line x1="350" y1="282" x2="348" y2="286" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
