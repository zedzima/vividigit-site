<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Funnel shadow -->
  <path d="M53,83 L347,83 L233,233 L233,323 L167,323 L167,233 Z" fill="#000" opacity="0.08"/>
  <!-- Funnel body -->
  <path d="M50,80 L350,80 L230,230 L230,320 L170,320 L170,230 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10" stroke-linejoin="round"/>
  <!-- Stage line 1 -->
  <line x1="80" y1="120" x2="320" y2="120" stroke="#2E2D2D" stroke-width="2" opacity="0.2" stroke-dasharray="5,4"/>
  <!-- Stage fill 1 (top) -->
  <path d="M50,80 L350,80 L320,120 L80,120 Z" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Stage line 2 -->
  <line x1="110" y1="160" x2="290" y2="160" stroke="#2E2D2D" stroke-width="2" opacity="0.2" stroke-dasharray="5,4"/>
  <!-- Stage fill 2 -->
  <path d="M80,120 L320,120 L290,160 L110,160 Z" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Stage line 3 -->
  <line x1="145" y1="200" x2="255" y2="200" stroke="#2E2D2D" stroke-width="2" opacity="0.2" stroke-dasharray="5,4"/>
  <!-- Stage fill 3 -->
  <path d="M110,160 L290,160 L255,200 L145,200 Z" fill="#C026D3" fill-opacity="0.08"/>
  <!-- Stage labels (abstract lines) -->
  <line x1="62" y1="95" x2="108" y2="95" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="92" y1="137" x2="130" y2="137" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="122" y1="177" x2="152" y2="177" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Items/dots flowing through stages -->
  <!-- Top stage dots (many) -->
  <circle cx="120" cy="95" r="5" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="150" cy="92" r="5" fill="#A855F7" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="180" cy="98" r="5" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="210" cy="93" r="5" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="240" cy="97" r="5" fill="#A855F7" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="270" cy="94" r="5" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="300" cy="96" r="5" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Middle stage dots (fewer) -->
  <circle cx="155" cy="137" r="5" fill="#7C3AED" fill-opacity="0.35" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="185" cy="140" r="5" fill="#A855F7" fill-opacity="0.35" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="215" cy="138" r="5" fill="#C026D3" fill-opacity="0.35" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="245" cy="140" r="5" fill="#7C3AED" fill-opacity="0.35" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Lower stage dots (few) -->
  <circle cx="180" cy="178" r="5" fill="#7C3AED" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="210" cy="180" r="5" fill="#A855F7" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Output dot at bottom -->
  <circle cx="200" cy="340" r="7" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Arrow at bottom -->
  <line x1="200" y1="325" x2="200" y2="355" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <polyline points="192,348 200,358 208,348" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Person pouring leads at top -->
  <!-- Head -->
  <circle cx="370" cy="30" r="16" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Body -->
  <path d="M370,46 L370,90" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M370,90 L355,125" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <path d="M370,90 L385,125" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Arm holding container -->
  <path d="M370,58 L340,50 L310,62" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Other arm -->
  <path d="M370,58 L355,42" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Container being poured -->
  <rect x="290" y="48" width="30" height="22" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.15" transform="rotate(-20,305,59)"/>
  <!-- Items spilling from container -->
  <circle cx="285" cy="68" r="3" fill="#7C3AED" opacity="0.4"/>
  <circle cx="278" cy="72" r="3" fill="#A855F7" opacity="0.35"/>
  <circle cx="290" cy="75" r="3" fill="#C026D3" opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="30" cy="60" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="25" cy="250" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="375" cy="300" r="2.5" fill="#C026D3" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="25" y1="160" x2="42" y2="160" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="30" y1="168" x2="38" y2="168" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.1"/>
</svg>