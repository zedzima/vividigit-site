<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === USER-PLUS: Person with + circle, welcoming gesture === -->

  <!-- Shadow of person head -->
  <circle cx="158" cy="143" r="45" fill="#000" opacity="0.08"/>
  <!-- Person head -->
  <circle cx="155" cy="140" r="45" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Face features -->
  <circle cx="142" cy="132" r="3.5" fill="#2E2D2D" opacity="0.6"/>
  <circle cx="165" cy="132" r="3.5" fill="#2E2D2D" opacity="0.6"/>
  <path d="M145 150 Q155 160 165 150" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Hair hint -->
  <path d="M115 120 Q120 95 155 90 Q190 95 195 120" stroke="#2E2D2D" stroke-width="3" fill="none" opacity="0.3"/>

  <!-- Shadow of person body -->
  <path d="M98 243 Q98 203 155 203 Q212 203 212 243 L212 320 L98 320 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Person body -->
  <path d="M95 240 Q95 200 155 200 Q215 200 215 240 L215 320 L95 320 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Collar detail -->
  <path d="M138 200 L155 222 L172 200" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.35"/>

  <!-- Welcoming arm extended to the right -->
  <path d="M210 240 Q230 225 260 218 Q275 215 285 222" stroke="#2E2D2D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Hand at end of arm -->
  <path d="M280 218 Q290 212 295 218 Q300 225 293 230 Q288 233 282 230 Q278 226 280 218 Z" fill="#2E2D2D" opacity="0.85"/>
  <!-- Finger details -->
  <path d="M290 215 Q295 208 298 212" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M285 214 Q288 207 292 210" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Large + circle shadow -->
  <circle cx="313" cy="148" r="48" fill="#000" opacity="0.08"/>
  <!-- Large + circle -->
  <circle cx="310" cy="145" r="48" stroke="#2E2D2D" stroke-width="4" fill="#A855F7" fill-opacity="0.16"/>
  <!-- Plus sign -->
  <line x1="310" y1="120" x2="310" y2="170" stroke="#2E2D2D" stroke-width="5" stroke-linecap="round"/>
  <line x1="285" y1="145" x2="335" y2="145" stroke="#2E2D2D" stroke-width="5" stroke-linecap="round"/>

  <!-- Floating profile card (top left) -->
  <rect x="33" y="63" width="65" height="45" rx="6" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="30" y="60" width="65" height="45" rx="6" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Profile card avatar circle -->
  <circle cx="50" cy="78" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Profile card text lines -->
  <line x1="64" y1="74" x2="88" y2="74" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="64" y1="82" x2="82" y2="82" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="38" y1="96" x2="86" y2="96" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Dotted outline of new member joining (right side, below + circle) -->
  <circle cx="310" cy="260" r="28" stroke="#2E2D2D" stroke-width="2.5" stroke-dasharray="6,5" fill="none" opacity="0.25"/>
  <!-- Ghost silhouette inside dotted circle -->
  <circle cx="310" cy="252" r="10" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <path d="M296 278 Q296 268 310 268 Q324 268 324 278" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Second floating profile card (bottom) -->
  <rect x="48" y="305" width="55" height="38" rx="5" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.10"/>
  <circle cx="64" cy="320" r="6" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.35"/>
  <line x1="76" y1="317" x2="95" y2="317" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="76" y1="325" x2="90" y2="325" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Arrow from card to person (joining motion) -->
  <path d="M105 318 Q130 300 135 280" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.2"/>
  <path d="M133 286 L135 278 L140 285" stroke="#2E2D2D" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>

  <!-- Decorative dots -->
  <circle cx="250" cy="90" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="365" cy="220" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="22" cy="180" r="2" fill="#C026D3" opacity="0.28"/>
  <circle cx="340" cy="320" r="2.5" fill="#7C3AED" opacity="0.22"/>
  <circle cx="180" cy="340" r="2" fill="#C026D3" opacity="0.2"/>

  <!-- Decorative small lines -->
  <line x1="350" y1="88" x2="370" y2="88" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="355" y1="96" x2="380" y2="96" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="18" y1="280" x2="35" y2="280" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>