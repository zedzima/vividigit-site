<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for newspaper -->
  <rect x="63" y="53" width="260" height="320" rx="4" fill="#000" opacity="0.08"/>
  <!-- Newspaper body -->
  <rect x="60" y="50" width="260" height="320" rx="4" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Newspaper masthead area -->
  <rect x="60" y="50" width="260" height="35" rx="4" stroke="none" fill="#2E2D2D" fill-opacity="0.06"/>
  <rect x="60" y="81" width="260" height="4" fill="none" stroke="none"/>
  <!-- Masthead title -->
  <rect x="110" y="58" width="160" height="12" rx="2" fill="#2E2D2D" opacity="0.2"/>
  <!-- Date line -->
  <rect x="140" y="74" width="100" height="5" rx="1" fill="#2E2D2D" opacity="0.1"/>
  <!-- Horizontal rule under masthead -->
  <line x1="70" y1="86" x2="310" y2="86" stroke="#2E2D2D" stroke-width="2" opacity="0.2"/>
  <line x1="70" y1="89" x2="310" y2="89" stroke="#2E2D2D" stroke-width="0.5" opacity="0.15"/>
  <!-- Big headline -->
  <rect x="78" y="98" width="220" height="14" rx="2" fill="#2E2D2D" opacity="0.25"/>
  <rect x="78" y="116" width="180" height="10" rx="2" fill="#2E2D2D" opacity="0.15"/>
  <!-- Horizontal rule under headline -->
  <line x1="78" y1="134" x2="300" y2="134" stroke="#2E2D2D" stroke-width="1" opacity="0.12"/>
  <!-- Left column text -->
  <line x1="78" y1="148" x2="175" y2="148" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="78" y1="160" x2="175" y2="160" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="78" y1="172" x2="170" y2="172" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="78" y1="184" x2="175" y2="184" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="78" y1="196" x2="168" y2="196" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="78" y1="208" x2="175" y2="208" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
  <!-- Photo placeholder in right column -->
  <rect x="190" y="142" width="110" height="70" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.1"/>
  <!-- Mountain/landscape icon inside photo -->
  <path d="M200 202 L225 178 L245 195 L260 175 L290 202 Z" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.1" stroke-linejoin="round"/>
  <circle cx="275" cy="158" r="6" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1"/>
  <!-- Right column text below photo -->
  <line x1="190" y1="222" x2="300" y2="222" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="190" y1="234" x2="295" y2="234" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="190" y1="246" x2="300" y2="246" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
  <!-- Column divider -->
  <line x1="184" y1="140" x2="184" y2="260" stroke="#2E2D2D" stroke-width="0.8" opacity="0.12"/>
  <!-- Lower section divider -->
  <line x1="78" y1="260" x2="300" y2="260" stroke="#2E2D2D" stroke-width="1" opacity="0.12"/>
  <!-- Lower left: small article -->
  <rect x="78" y="268" width="8" height="8" rx="1" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1"/>
  <line x1="92" y1="272" x2="165" y2="272" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="78" y1="284" x2="170" y2="284" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="78" y1="294" x2="160" y2="294" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Lower right: small photo + article -->
  <rect x="196" y="268" width="45" height="32" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.08"/>
  <line x1="248" y1="272" x2="300" y2="272" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="248" y1="282" x2="295" y2="282" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="248" y1="292" x2="288" y2="292" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Person holding/reading newspaper -->
  <!-- Hands at bottom of newspaper -->
  <path d="M55 320 C45 310 38 305 35 298 C32 292 38 288 42 294 C40 286 46 284 50 290 C50 282 58 282 58 290 L58 315 C58 322 52 328 48 326 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <path d="M325 320 C335 310 342 305 345 298 C348 292 342 288 338 294 C340 286 334 284 330 290 C330 282 322 282 322 290 L322 315 C322 322 328 328 332 326 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Coffee cup (bottom-right) -->
  <ellipse cx="365" cy="348" rx="18" ry="6" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.1"/>
  <path d="M347 348 L350 375 Q365 382 380 375 L383 348" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Cup handle -->
  <path d="M383 355 Q395 358 393 368 Q390 376 383 370" stroke="#2E2D2D" stroke-width="2" fill="none"/>
  <!-- Steam lines -->
  <path d="M360 340 Q358 332 362 325" stroke="#2E2D2D" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M370 338 Q368 330 372 323" stroke="#2E2D2D" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15"/>
  <!-- Glasses (top-right, decorative) -->
  <circle cx="345" cy="42" r="10" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.25"/>
  <circle cx="367" cy="42" r="10" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.25"/>
  <line x1="355" y1="42" x2="357" y2="42" stroke="#2E2D2D" stroke-width="2" opacity="0.25"/>
  <line x1="335" y1="42" x2="328" y2="38" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="377" y1="42" x2="384" y2="38" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Decorative dots -->
  <circle cx="28" cy="120" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="18" cy="140" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="30" cy="250" r="2" fill="#C026D3" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="15" y1="70" x2="38" y2="70" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="20" y1="80" x2="32" y2="80" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>