<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for document -->
  <rect x="103" y="53" width="200" height="270" rx="8" fill="#000" opacity="0.08"/>
  <!-- Document page -->
  <rect x="100" y="50" width="200" height="270" rx="8" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Document header area -->
  <rect x="120" y="68" width="160" height="16" rx="3" fill="#2E2D2D" opacity="0.15"/>
  <!-- Text lines on document -->
  <line x1="120" y1="100" x2="270" y2="100" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="120" y1="116" x2="255" y2="116" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <!-- Strikethrough line (being edited) -->
  <line x1="120" y1="136" x2="250" y2="136" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="118" y1="136" x2="252" y2="136" stroke="#C026D3" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- New replacement line (purple accent) -->
  <line x1="120" y1="152" x2="260" y2="152" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- More text lines -->
  <line x1="120" y1="172" x2="240" y2="172" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="120" y1="188" x2="265" y2="188" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="120" y1="204" x2="230" y2="204" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Another strikethrough -->
  <line x1="120" y1="224" x2="245" y2="224" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="118" y1="224" x2="247" y2="224" stroke="#C026D3" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <!-- New line below -->
  <line x1="120" y1="240" x2="255" y2="240" stroke="#A855F7" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="120" y1="256" x2="210" y2="256" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Edit marker brackets -->
  <rect x="112" y="144" width="6" height="16" rx="1" fill="#7C3AED" opacity="0.35"/>
  <rect x="112" y="232" width="6" height="16" rx="1" fill="#A855F7" opacity="0.35"/>
  <!-- Depth shadow for pencil -->
  <path d="M258 108 L328 38 L348 58 L278 128 Z" fill="#000" opacity="0.08" transform="translate(3,4)"/>
  <!-- Pencil body -->
  <path d="M255 105 L325 35 L345 55 L275 125 Z" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.15" stroke-linejoin="round"/>
  <!-- Pencil tip -->
  <path d="M255 105 L245 130 L275 125 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.18" stroke-linejoin="round"/>
  <!-- Pencil tip point -->
  <circle cx="248" cy="126" r="2" fill="#2E2D2D" opacity="0.6"/>
  <!-- Pencil stripe -->
  <line x1="282" y1="78" x2="312" y2="48" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- Eraser on pencil top -->
  <rect x="322" y="28" width="28" height="16" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.2" transform="rotate(-45 336 36)"/>
  <!-- Hand holding pencil -->
  <path d="M280 135 C290 125 298 118 305 112 C312 108 318 112 315 120 C320 114 326 116 324 124 C330 118 335 122 330 130 L310 150 C304 156 294 155 286 148 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Finger detail -->
  <path d="M300 128 Q308 122 312 118" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Cursor icon (small) -->
  <path d="M85 155 L85 175 L92 170 L98 180 L102 178 L96 168 L104 168 Z" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.15" stroke-linejoin="round"/>
  <!-- Small eraser icon bottom-left -->
  <rect x="55" y="300" width="30" height="14" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.14" transform="rotate(-15 70 307)"/>
  <line x1="68" y1="300" x2="68" y2="314" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3" transform="rotate(-15 68 307)"/>
  <!-- Edit marker dots -->
  <circle cx="310" cy="180" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="325" cy="195" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="60" cy="120" r="2.5" fill="#C026D3" opacity="0.25"/>
  <circle cx="75" cy="100" r="2" fill="#7C3AED" opacity="0.3"/>
  <!-- Decorative small lines -->
  <line x1="50" y1="200" x2="70" y2="200" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="55" y1="210" x2="80" y2="210" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Document corner fold -->
  <path d="M280 50 L300 50 L300 70" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.06" stroke-linejoin="round"/>
  <!-- Small checkmark near edits -->
  <path d="M86 236 L90 242 L100 230" stroke="#7C3AED" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Bottom decorative dots -->
  <circle cx="330" cy="340" r="2" fill="#C026D3" opacity="0.2"/>
  <circle cx="345" cy="330" r="1.5" fill="#7C3AED" opacity="0.2"/>
  <circle cx="55" cy="350" r="2" fill="#A855F7" opacity="0.2"/>
</svg>