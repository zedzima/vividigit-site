<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === MESSAGE-CIRCLE: Chat bubble with person face profile === -->

  <!-- Shadow of main chat bubble -->
  <path d="M73 88 Q73 58 113 58 L303 58 Q343 58 343 88 L343 218 Q343 248 303 248 L163 248 L113 298 L123 248 L113 248 Q73 248 73 218 Z" fill="#000" opacity="0.08" transform="translate(3,4)"/>
  <!-- Main chat bubble -->
  <path d="M70 85 Q70 55 110 55 L300 55 Q340 55 340 85 L340 215 Q340 245 300 245 L160 245 L110 295 L120 245 L110 245 Q70 245 70 215 Z" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.13"/>

  <!-- Abstract text lines inside bubble -->
  <line x1="105" y1="100" x2="265" y2="100" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="105" y1="118" x2="240" y2="118" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="105" y1="136" x2="280" y2="136" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="105" y1="154" x2="220" y2="154" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="105" y1="172" x2="255" y2="172" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="105" y1="190" x2="195" y2="190" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- Emphasis highlight block inside bubble -->
  <rect x="275" y="92" width="45" height="22" rx="4" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5" opacity="0.4"/>

  <!-- Person face profile (right side of bubble) -->
  <!-- Face shadow -->
  <path d="M318 170 Q355 170 365 200 Q370 220 360 240 Q350 260 328 265 Q310 268 305 255 L305 180 Q310 170 318 170 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Face profile -->
  <path d="M315 168 Q352 168 362 198 Q367 218 357 238 Q347 258 325 263 Q307 266 302 253 L302 178 Q307 168 315 168 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Eye -->
  <circle cx="335" cy="205" r="4" fill="#2E2D2D" opacity="0.6"/>
  <!-- Nose hint -->
  <path d="M355 210 Q360 218 355 225" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Mouth (speaking) -->
  <ellipse cx="348" cy="238" rx="8" ry="5" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" opacity="0.15"/>
  <!-- Ear -->
  <path d="M305 200 Q298 200 298 210 Q298 220 305 220" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.35"/>

  <!-- Sound lines from mouth to bubble -->
  <path d="M340 242 Q320 255 290 258" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="3,3" fill="none" opacity="0.2"/>

  <!-- Reply bubble 1 (smaller, bottom left) -->
  <rect x="48" y="308" width="80" height="40" rx="10" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="45" y="305" width="80" height="40" rx="10" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.14"/>
  <path d="M108 345 L118 358 L100 345" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.14"/>
  <line x1="58" y1="320" x2="112" y2="320" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="58" y1="332" x2="98" y2="332" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Reply bubble 2 (tiny, top right) -->
  <rect x="300" y="30" width="60" height="28" rx="8" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10"/>
  <line x1="312" y1="42" x2="348" y2="42" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Typing indicator dots (below main bubble) -->
  <circle cx="170" cy="268" r="5" fill="#2E2D2D" opacity="0.2"/>
  <circle cx="188" cy="268" r="5" fill="#2E2D2D" opacity="0.3"/>
  <circle cx="206" cy="268" r="5" fill="#2E2D2D" opacity="0.4"/>

  <!-- Decorative dots -->
  <circle cx="40" cy="80" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="25" cy="200" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="375" cy="140" r="2" fill="#C026D3" opacity="0.28"/>
  <circle cx="200" cy="370" r="2.5" fill="#7C3AED" opacity="0.22"/>
  <circle cx="380" cy="300" r="2" fill="#A855F7" opacity="0.2"/>

  <!-- Decorative small lines -->
  <line x1="20" y1="120" x2="40" y2="120" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="370" y1="75" x2="388" y2="75" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="280" y1="370" x2="300" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>