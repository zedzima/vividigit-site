<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for top cylinder -->
  <ellipse cx="203" cy="83" rx="72" ry="20" fill="#000" opacity="0.08"/>
  <rect x="131" y="83" width="144" height="55" fill="#000" opacity="0.08"/>
  <ellipse cx="203" cy="138" rx="72" ry="20" fill="#000" opacity="0.08"/>
  <!-- Top database cylinder -->
  <ellipse cx="200" cy="80" rx="72" ry="20" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.15"/>
  <rect x="128" y="80" width="144" height="55" fill="#7C3AED" fill-opacity="0.15"/>
  <line x1="128" y1="80" x2="128" y2="135" stroke="#2E2D2D" stroke-width="3"/>
  <line x1="272" y1="80" x2="272" y2="135" stroke="#2E2D2D" stroke-width="3"/>
  <ellipse cx="200" cy="135" rx="72" ry="20" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.18"/>
  <!-- Middle divider line on top cylinder -->
  <ellipse cx="200" cy="105" rx="72" ry="18" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25"/>
  <!-- Status lights on top cylinder -->
  <circle cx="160" cy="80" r="3.5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="172" cy="80" r="3.5" fill="#A855F7" opacity="0.4"/>
  <circle cx="184" cy="80" r="3.5" fill="#C026D3" opacity="0.35"/>
  <!-- Depth shadow for middle cylinder -->
  <ellipse cx="203" cy="193" rx="72" ry="20" fill="#000" opacity="0.08"/>
  <rect x="131" y="193" width="144" height="55" fill="#000" opacity="0.08"/>
  <ellipse cx="203" cy="248" rx="72" ry="20" fill="#000" opacity="0.08"/>
  <!-- Middle database cylinder -->
  <ellipse cx="200" cy="190" rx="72" ry="20" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.14"/>
  <rect x="128" y="190" width="144" height="55" fill="#A855F7" fill-opacity="0.14"/>
  <line x1="128" y1="190" x2="128" y2="245" stroke="#2E2D2D" stroke-width="3"/>
  <line x1="272" y1="190" x2="272" y2="245" stroke="#2E2D2D" stroke-width="3"/>
  <ellipse cx="200" cy="245" rx="72" ry="20" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.16"/>
  <!-- Middle divider -->
  <ellipse cx="200" cy="215" rx="72" ry="18" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25"/>
  <!-- Status lights on middle -->
  <circle cx="160" cy="190" r="3.5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="172" cy="190" r="3.5" fill="#A855F7" opacity="0.4"/>
  <!-- Depth shadow for bottom cylinder -->
  <ellipse cx="203" cy="303" rx="72" ry="20" fill="#000" opacity="0.08"/>
  <rect x="131" y="303" width="144" height="55" fill="#000" opacity="0.08"/>
  <ellipse cx="203" cy="358" rx="72" ry="20" fill="#000" opacity="0.08"/>
  <!-- Bottom database cylinder -->
  <ellipse cx="200" cy="300" rx="72" ry="20" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.12"/>
  <rect x="128" y="300" width="144" height="55" fill="#C026D3" fill-opacity="0.12"/>
  <line x1="128" y1="300" x2="128" y2="355" stroke="#2E2D2D" stroke-width="3"/>
  <line x1="272" y1="300" x2="272" y2="355" stroke="#2E2D2D" stroke-width="3"/>
  <ellipse cx="200" cy="355" rx="72" ry="20" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14"/>
  <!-- Connection pipe: top to middle -->
  <line x1="200" y1="155" x2="200" y2="170" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Data dots flowing: top to middle -->
  <circle cx="200" cy="160" r="3" fill="#7C3AED" opacity="0.5"/>
  <circle cx="200" cy="168" r="2.5" fill="#A855F7" opacity="0.4"/>
  <!-- Connection pipe: middle to bottom -->
  <line x1="200" y1="265" x2="200" y2="280" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Data dots flowing: middle to bottom -->
  <circle cx="200" cy="272" r="3" fill="#A855F7" opacity="0.5"/>
  <circle cx="200" cy="280" r="2.5" fill="#C026D3" opacity="0.4"/>
  <!-- Side connection pipe (left) -->
  <path d="M128,110 L80,110 L80,220 L128,220" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data dots in left pipe -->
  <circle cx="80" cy="145" r="2.5" fill="#7C3AED" opacity="0.45"/>
  <circle cx="80" cy="165" r="2" fill="#A855F7" opacity="0.35"/>
  <circle cx="80" cy="185" r="2.5" fill="#C026D3" opacity="0.4"/>
  <!-- Side connection pipe (right) -->
  <path d="M272,220 L320,220 L320,330 L272,330" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data dots in right pipe -->
  <circle cx="320" cy="255" r="2.5" fill="#A855F7" opacity="0.45"/>
  <circle cx="320" cy="275" r="2" fill="#C026D3" opacity="0.35"/>
  <circle cx="320" cy="295" r="2.5" fill="#7C3AED" opacity="0.4"/>
  <!-- Query symbol (top-left) -->
  <text x="42" y="75" font-family="monospace" font-size="22" fill="#7C3AED" opacity="0.35" font-weight="bold">SQL</text>
  <!-- Small server rack (top-right) -->
  <rect x="330" y="60" width="40" height="55" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="330" y="60" width="40" height="55" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.10"/>
  <line x1="336" y1="75" x2="364" y2="75" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="336" y1="85" x2="364" y2="85" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="336" y1="95" x2="364" y2="95" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Server status lights -->
  <circle cx="360" cy="69" r="2.5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="360" cy="105" r="2.5" fill="#A855F7" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="50" cy="310" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="360" cy="170" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="40" cy="200" r="2" fill="#C026D3" opacity="0.25"/>
  <!-- Decorative small lines -->
  <line x1="40" y1="350" x2="58" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="345" y1="370" x2="370" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>