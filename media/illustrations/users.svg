<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === USERS: Three people in group/team formation === -->

  <!-- Shadow of center person (depth) -->
  <ellipse cx="203" cy="178" rx="38" ry="38" fill="#000" opacity="0.08"/>
  <!-- Center person head -->
  <circle cx="200" cy="175" r="38" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.15"/>
  <!-- Center person face features -->
  <circle cx="190" cy="168" r="3" fill="#2E2D2D" opacity="0.6"/>
  <circle cx="210" cy="168" r="3" fill="#2E2D2D" opacity="0.6"/>
  <path d="M192 182 Q200 190 208 182" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Shadow of center body -->
  <path d="M153 253 Q153 218 200 218 Q247 218 247 253 L247 290 L153 290 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Center person body (larger) -->
  <path d="M150 250 Q150 215 200 215 Q250 215 250 250 L250 290 L150 290 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Center person collar -->
  <path d="M185 215 L200 235 L215 215" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Shadow of left person -->
  <ellipse cx="93" cy="198" rx="32" ry="32" fill="#000" opacity="0.08"/>
  <!-- Left person head -->
  <circle cx="90" cy="195" r="32" stroke="#2E2D2D" stroke-width="3.5" fill="#A855F7" fill-opacity="0.14"/>
  <!-- Left person face -->
  <circle cx="82" cy="190" r="2.5" fill="#2E2D2D" opacity="0.55"/>
  <circle cx="98" cy="190" r="2.5" fill="#2E2D2D" opacity="0.55"/>
  <path d="M84 202 Q90 208 96 202" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Left person body -->
  <path d="M53 273 Q53 242 90 242 Q127 242 127 273 L127 310 L53 310 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <path d="M50 270 Q50 240 90 240 Q130 240 130 270 L130 310 L50 310 Z" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.12"/>

  <!-- Shadow of right person -->
  <ellipse cx="313" cy="198" rx="32" ry="32" fill="#000" opacity="0.08"/>
  <!-- Right person head -->
  <circle cx="310" cy="195" r="32" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.14"/>
  <!-- Right person face -->
  <circle cx="302" cy="190" r="2.5" fill="#2E2D2D" opacity="0.55"/>
  <circle cx="318" cy="190" r="2.5" fill="#2E2D2D" opacity="0.55"/>
  <path d="M304 202 Q310 208 316 202" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Right person body -->
  <path d="M273 273 Q273 242 310 242 Q347 242 347 273 L347 310 L273 310 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <path d="M270 270 Q270 240 310 240 Q350 240 350 270 L350 310 L270 310 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.12"/>

  <!-- Connection line: left to center -->
  <line x1="122" y1="230" x2="158" y2="222" stroke="#2E2D2D" stroke-width="2" stroke-dasharray="4,4" opacity="0.25"/>
  <!-- Connection line: right to center -->
  <line x1="278" y1="230" x2="242" y2="222" stroke="#2E2D2D" stroke-width="2" stroke-dasharray="4,4" opacity="0.25"/>
  <!-- Connection line: left to right (arc) -->
  <path d="M125 265 Q200 340 275 265" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="5,4" fill="none" opacity="0.15"/>

  <!-- Speech bubble above center person -->
  <rect x="218" y="108" width="52" height="30" rx="8" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="218" y="108" width="52" height="30" rx="8" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.12"/>
  <path d="M235 138 L230 148 L242 138" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="2"/>
  <line x1="226" y1="120" x2="260" y2="120" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="226" y1="128" x2="252" y2="128" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Small speech bubble near left person -->
  <rect x="48" y="138" width="38" height="24" rx="6" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.10"/>
  <path d="M70 162 L74 170 L78 162" stroke="#2E2D2D" stroke-width="1.5" fill="none"/>
  <line x1="55" y1="148" x2="78" y2="148" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Badge icon near right person -->
  <rect x="340" y="148" width="28" height="32" rx="4" fill="#000" opacity="0.08" transform="translate(2,2)"/>
  <rect x="340" y="148" width="28" height="32" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="354" cy="160" r="6" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <line x1="348" y1="170" x2="360" y2="170" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Badge icon near left person -->
  <rect x="28" y="260" width="24" height="28" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.10"/>
  <circle cx="40" cy="270" r="5" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <line x1="34" y1="280" x2="46" y2="280" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Decorative dots -->
  <circle cx="175" cy="100" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="320" cy="128" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="55" cy="120" r="2.5" fill="#C026D3" opacity="0.28"/>
  <circle cx="345" cy="300" r="2" fill="#7C3AED" opacity="0.2"/>
  <circle cx="200" cy="330" r="2.5" fill="#A855F7" opacity="0.22"/>

  <!-- Decorative small lines -->
  <line x1="155" y1="85" x2="168" y2="85" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="340" y1="115" x2="358" y2="115" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="30" y1="310" x2="48" y2="310" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>