<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Lightning bolt depth shadow -->
  <polygon points="220,28 148,188 200,188 163,328 288,155 230,155 288,28" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Lightning bolt main -->
  <polygon points="216,24 144,184 196,184 159,324 284,151 226,151 284,24" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.18" stroke-linejoin="round"/>
  <!-- Inner lightning highlight -->
  <polygon points="222,60 172,168 204,168 180,280 268,160 232,160 268,60" fill="#A855F7" fill-opacity="0.10" stroke="none"/>
  <!-- Battery body depth shadow -->
  <rect x="137" y="333" width="136" height="54" rx="8" fill="#000" opacity="0.08"/>
  <!-- Battery body -->
  <rect x="134" y="330" width="136" height="54" rx="8" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Battery terminal -->
  <rect x="270" y="345" width="14" height="24" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" fill-opacity="0.1"/>
  <!-- Battery charge level bars -->
  <rect x="148" y="342" width="20" height="30" rx="3" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="174" y="342" width="20" height="30" rx="3" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="200" y="342" width="20" height="30" rx="3" fill="#A855F7" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="226" y="342" width="20" height="30" rx="3" fill="#2E2D2D" fill-opacity="0.06" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Small lightning icon on battery -->
  <polygon points="204,348 196,358 204,358 198,370 212,356 204,356 212,348" fill="#7C3AED" opacity="0.4"/>
  <!-- Motion lines left -->
  <line x1="100" y1="120" x2="130" y2="140" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="90" y1="148" x2="122" y2="160" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="85" y1="178" x2="118" y2="182" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Motion lines right -->
  <line x1="300" y1="120" x2="330" y2="100" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="306" y1="150" x2="338" y2="138" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="308" y1="180" x2="340" y2="175" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Energy circle 1 -->
  <circle cx="90" cy="250" r="18" stroke="#7C3AED" stroke-width="2" fill="#7C3AED" fill-opacity="0.10"/>
  <circle cx="90" cy="250" r="8" stroke="#7C3AED" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.15"/>
  <!-- Energy circle 2 -->
  <circle cx="330" cy="240" r="22" stroke="#A855F7" stroke-width="2" fill="#A855F7" fill-opacity="0.08"/>
  <circle cx="330" cy="240" r="10" stroke="#A855F7" stroke-width="1.5" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Energy circle 3 (small) -->
  <circle cx="60" cy="310" r="12" stroke="#C026D3" stroke-width="1.5" fill="#C026D3" fill-opacity="0.08"/>
  <circle cx="60" cy="310" r="5" stroke="#C026D3" stroke-width="1.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Sparkle dots -->
  <circle cx="172" cy="42" r="3" fill="#7C3AED" opacity="0.4"/>
  <circle cx="310" cy="60" r="2.5" fill="#A855F7" opacity="0.35"/>
  <circle cx="120" cy="80" r="2" fill="#C026D3" opacity="0.3"/>
  <circle cx="350" cy="280" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="55" cy="200" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="365" cy="320" r="2.5" fill="#C026D3" opacity="0.25"/>
  <!-- Star sparkle top-right -->
  <path d="M350,38 L353,46 L361,46 L355,51 L357,59 L350,54 L343,59 L345,51 L339,46 L347,46 Z" fill="#7C3AED" opacity="0.25"/>
  <!-- Star sparkle bottom-left -->
  <path d="M40,370 L42,376 L48,376 L44,380 L45,386 L40,382 L35,386 L36,380 L32,376 L38,376 Z" fill="#A855F7" opacity="0.25"/>
  <!-- Radiating dotted lines from impact -->
  <line x1="159" y1="324" x2="120" y2="340" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.25"/>
  <line x1="159" y1="324" x2="100" y2="310" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.2"/>
</svg>