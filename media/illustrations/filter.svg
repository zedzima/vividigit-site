<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Filter funnel shadow -->
  <path d="M73,63 L327,63 L227,193 L227,283 L173,283 L173,193 Z" fill="#000" opacity="0.08"/>
  <!-- Filter funnel body -->
  <path d="M70,60 L330,60 L224,190 L224,280 L176,280 L176,190 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#A855F7" fill-opacity="0.10" stroke-linejoin="round"/>
  <!-- Filter mesh lines inside -->
  <line x1="105" y1="90" x2="295" y2="90" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="125" y1="110" x2="275" y2="110" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="145" y1="130" x2="255" y2="130" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="162" y1="150" x2="238" y2="150" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="175" y1="170" x2="225" y2="170" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <!-- Data flowing in from top - mixed shapes (unfiltered) -->
  <circle cx="120" cy="35" r="6" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="148" y="28" width="12" height="12" rx="2" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <polygon points="185,28 192,40 178,40" fill="#A855F7" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="215" cy="35" r="6" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="238" y="28" width="12" height="12" rx="2" fill="#A855F7" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <polygon points="280,28 287,40 273,40" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Items entering funnel top -->
  <circle cx="140" cy="70" r="5" fill="#7C3AED" fill-opacity="0.35" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="175" y="65" width="10" height="10" rx="2" fill="#C026D3" fill-opacity="0.35" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="220" cy="72" r="5" fill="#A855F7" fill-opacity="0.35" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="248" y="66" width="10" height="10" rx="2" fill="#7C3AED" fill-opacity="0.35" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Refined output at bottom (uniform circles) -->
  <circle cx="195" cy="300" r="5" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="200" cy="320" r="5" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="205" cy="340" r="5" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Output arrow -->
  <polyline points="192,350 200,362 208,350" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Left hand adjusting filter -->
  <path d="M30,140 C25,130 20,118 22,110 C24,102 30,100 34,106 L36,112 C35,102 40,98 44,104 C42,95 48,92 52,100 L55,115 C57,130 50,148 42,155 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Left arm -->
  <path d="M30,155 Q22,175 18,200 L48,200 Q44,178 38,158" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.10"/>
  <!-- Left hand reaching to filter -->
  <line x1="55" y1="110" x2="70" y2="85" stroke="#2E2D2D" stroke-width="2" opacity="0.3" stroke-dasharray="3,3"/>
  <!-- Right hand adjusting filter -->
  <path d="M370,140 C375,130 380,118 378,110 C376,102 370,100 366,106 L364,112 C365,102 360,98 356,104 C358,95 352,92 348,100 L345,115 C343,130 350,148 358,155 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Right arm -->
  <path d="M370,155 Q378,175 382,200 L352,200 Q356,178 362,158" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.10"/>
  <!-- Right hand reaching to filter -->
  <line x1="345" y1="110" x2="330" y2="85" stroke="#2E2D2D" stroke-width="2" opacity="0.3" stroke-dasharray="3,3"/>
  <!-- Toggle controls (left side) -->
  <rect x="15" y="230" width="50" height="16" rx="8" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.12"/>
  <circle cx="50" cy="238" r="6" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="15" y="258" width="50" height="16" rx="8" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.12"/>
  <circle cx="30" cy="266" r="6" fill="#2E2D2D" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Parameter sliders (right side) -->
  <line x1="340" y1="238" x2="390" y2="238" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <circle cx="370" cy="238" r="5" fill="#A855F7" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="340" y1="266" x2="390" y2="266" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <circle cx="355" cy="266" r="5" fill="#C026D3" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Decorative dots -->
  <circle cx="100" cy="370" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="300" cy="375" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="50" cy="320" r="2" fill="#C026D3" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="310" y1="370" x2="330" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>