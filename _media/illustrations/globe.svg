<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Globe depth shadow -->
  <circle cx="203" cy="203" r="130" fill="#000" opacity="0.08"/>
  <!-- Globe body -->
  <circle cx="200" cy="200" r="130" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Equator -->
  <ellipse cx="200" cy="200" rx="130" ry="30" stroke="#2E2D2D" stroke-width="2" fill="none"/>
  <!-- Tropic upper -->
  <ellipse cx="200" cy="155" rx="110" ry="22" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Tropic lower -->
  <ellipse cx="200" cy="245" rx="110" ry="22" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Meridian center -->
  <ellipse cx="200" cy="200" rx="30" ry="130" stroke="#2E2D2D" stroke-width="2" fill="none"/>
  <!-- Meridian offset left -->
  <ellipse cx="200" cy="200" rx="75" ry="130" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Meridian offset right -->
  <ellipse cx="200" cy="200" rx="110" ry="130" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Connection node 1 (Europe area) -->
  <circle cx="220" cy="148" r="8" fill="#7C3AED" fill-opacity="0.20" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="220" cy="148" r="3" fill="#7C3AED"/>
  <!-- Connection node 2 (Asia area) -->
  <circle cx="280" cy="180" r="8" fill="#A855F7" fill-opacity="0.18" stroke="#A855F7" stroke-width="2"/>
  <circle cx="280" cy="180" r="3" fill="#A855F7"/>
  <!-- Connection node 3 (Americas area) -->
  <circle cx="130" cy="190" r="8" fill="#C026D3" fill-opacity="0.18" stroke="#C026D3" stroke-width="2"/>
  <circle cx="130" cy="190" r="3" fill="#C026D3"/>
  <!-- Connection node 4 (South) -->
  <circle cx="190" cy="260" r="7" fill="#7C3AED" fill-opacity="0.18" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="190" cy="260" r="3" fill="#7C3AED"/>
  <!-- Connection node 5 (Africa area) -->
  <circle cx="240" cy="220" r="7" fill="#A855F7" fill-opacity="0.18" stroke="#A855F7" stroke-width="2"/>
  <circle cx="240" cy="220" r="3" fill="#A855F7"/>
  <!-- Dotted connection lines between nodes -->
  <line x1="220" y1="148" x2="280" y2="180" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="130" y1="190" x2="220" y2="148" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="280" y1="180" x2="240" y2="220" stroke="#C026D3" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="240" y1="220" x2="190" y2="260" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="130" y1="190" x2="190" y2="260" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <!-- Airplane path (curved arc outside globe) -->
  <path d="M60,100 Q30,160 50,220" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="6 3" fill="none" opacity="0.35"/>
  <!-- Small airplane icon -->
  <path d="M56,106 L66,100 L56,94 L58,100 Z" fill="#2E2D2D" opacity="0.5"/>
  <!-- Location pin 1 -->
  <path d="M340,120 C340,108 354,108 354,120 C354,130 347,140 347,140 C347,140 340,130 340,120 Z" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.18"/>
  <circle cx="347" cy="120" r="3" fill="#2E2D2D" opacity="0.4"/>
  <!-- Location pin 2 -->
  <path d="M52,280 C52,270 64,270 64,280 C64,288 58,296 58,296 C58,296 52,288 52,280 Z" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.18"/>
  <circle cx="58" cy="280" r="2.5" fill="#2E2D2D" opacity="0.4"/>
  <!-- Globe stand/base hint -->
  <path d="M140,340 Q200,355 260,340" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="200" y1="330" x2="200" y2="345" stroke="#2E2D2D" stroke-width="2.5"/>
  <!-- Decorative dots -->
  <circle cx="365" cy="165" r="3" fill="#7C3AED" opacity="0.25"/>
  <circle cx="375" cy="185" r="2" fill="#A855F7" opacity="0.2"/>
  <circle cx="30" cy="320" r="2.5" fill="#C026D3" opacity="0.2"/>
  <circle cx="370" cy="300" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Small decorative lines -->
  <line x1="350" y1="250" x2="375" y2="250" stroke="#A855F7" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <line x1="355" y1="260" x2="370" y2="260" stroke="#7C3AED" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
</svg>