<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === ENERGY: Lightning bolt with kilocalorie badge === -->

  <!-- Shadow under bolt -->
  <ellipse cx="203" cy="358" rx="90" ry="12" fill="#000" opacity="0.06"/>

  <!-- Lightning bolt shadow -->
  <path d="M223 48 L143 198 L193 198 L163 358 L283 178 L228 178 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Lightning bolt -->
  <path d="M220 45 L140 195 L190 195 L160 355 L280 175 L225 175 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.15" stroke-linejoin="round"/>

  <!-- Inner glow line -->
  <path d="M210 80 L165 175 L200 175 L178 300" stroke="#A855F7" stroke-width="2" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Kilocalorie badge (top right) -->
  <rect x="295" y="80" width="72" height="32" rx="6" fill="#000" opacity="0.07" transform="translate(2,2)"/>
  <rect x="293" y="78" width="72" height="32" rx="6" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <text x="329" y="99" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#2E2D2D" opacity="0.5">kcal</text>

  <!-- Energy rings (radiating from bolt) -->
  <circle cx="210" cy="185" r="55" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.12" stroke-dasharray="5 5"/>
  <circle cx="210" cy="185" r="85" stroke="#A855F7" stroke-width="1" fill="none" opacity="0.08" stroke-dasharray="5 5"/>

  <!-- Small battery icon (bottom left) -->
  <rect x="40" y="280" width="35" height="50" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.08"/>
  <rect x="50" y="274" width="15" height="6" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="#2E2D2D" fill-opacity="0.15"/>
  <!-- Battery fill -->
  <rect x="45" y="305" width="25" height="20" rx="2" fill="#A855F7" fill-opacity="0.15"/>
  <!-- Battery level lines -->
  <line x1="45" y1="305" x2="70" y2="305" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>

  <!-- Spark particles -->
  <circle cx="295" cy="140" r="3" fill="#C026D3" opacity="0.3"/>
  <circle cx="120" cy="120" r="2.5" fill="#7C3AED" opacity="0.25"/>
  <circle cx="310" cy="220" r="2" fill="#A855F7" opacity="0.2"/>

  <!-- Small zigzag sparks -->
  <path d="M330 175 L335 168 L340 178 L345 170" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M80 200 L85 193 L90 203" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Decorative dots -->
  <circle cx="365" cy="320" r="2.5" fill="#7C3AED" opacity="0.2"/>
  <circle cx="30" cy="180" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="350" y1="350" x2="370" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="30" y1="350" x2="48" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
