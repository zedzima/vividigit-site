<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === ENERGY: Lightning bolt on battery, hand plugging in === -->

  <ellipse cx="203" cy="360" rx="100" ry="12" fill="#000" opacity="0.06"/>

  <!-- Battery body shadow -->
  <rect x="93" y="93" width="200" height="230" rx="16" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Battery body -->
  <rect x="90" y="90" width="200" height="230" rx="16" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Battery cap -->
  <rect x="155" y="70" width="70" height="24" rx="8" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.12"/>

  <!-- Charge level fill -->
  <rect x="105" y="175" width="170" height="130" rx="8" fill="#7C3AED" fill-opacity="0.08"/>
  <rect x="105" y="135" width="170" height="170" rx="8" fill="#A855F7" fill-opacity="0.06"/>

  <!-- Lightning bolt -->
  <path d="M200 110 L160 195 H195 L175 295 L240 185 H205 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.18" stroke-linejoin="round"/>

  <!-- Charge indicator lines -->
  <line x1="108" y1="250" x2="130" y2="250" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="108" y1="265" x2="125" y2="265" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>

  <!-- Hand plugging cable (bottom right) -->
  <path d="M310,310 C320,295 332,285 340,280 C348,275 354,280 350,288 L345,295 C355,288 360,296 352,302 C362,298 365,306 357,310 C367,308 368,316 358,320 L328,335 C312,345 300,340 290,330 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Cable -->
  <path d="M290 330 Q280 315 280 300 L280 260" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Plug -->
  <rect x="272" y="242" width="16" height="20" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.15"/>
  <line x1="278" y1="242" x2="278" y2="235" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>
  <line x1="284" y1="242" x2="284" y2="235" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>

  <!-- Sparkles -->
  <line x1="320" y1="95" x2="320" y2="82" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="310" y1="100" x2="304" y2="90" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="330" y1="100" x2="336" y2="90" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <circle cx="320" cy="78" r="2.5" fill="#7C3AED" opacity="0.35"/>

  <!-- Small energy wave -->
  <path d="M55 170 Q45 190 55 210" stroke="#A855F7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M42 160 Q28 190 42 220" stroke="#C026D3" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15"/>

  <circle cx="50" cy="120" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="355" cy="180" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="60" cy="320" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="340" y1="360" x2="360" y2="360" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="30" y1="270" x2="45" y2="270" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
