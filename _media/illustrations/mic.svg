<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === MIC: Studio microphone with sound waves, stand === -->

  <!-- Shadow under stand -->
  <ellipse cx="203" cy="358" rx="80" ry="10" fill="#000" opacity="0.06"/>

  <!-- Stand base -->
  <ellipse cx="200" cy="345" rx="55" ry="12" fill="#000" opacity="0.07" transform="translate(2,2)"/>
  <ellipse cx="200" cy="343" rx="55" ry="12" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.10"/>

  <!-- Stand pole -->
  <rect x="194" y="255" width="12" height="90" rx="3" fill="#000" opacity="0.07" transform="translate(2,2)"/>
  <rect x="192" y="253" width="12" height="90" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.08"/>

  <!-- Microphone body shadow -->
  <rect x="163" y="78" width="80" height="180" rx="40" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Microphone body -->
  <rect x="160" y="75" width="80" height="180" rx="40" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.14"/>

  <!-- Grille lines on mic head -->
  <line x1="175" y1="105" x2="225" y2="105" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="172" y1="120" x2="228" y2="120" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="170" y1="135" x2="230" y2="135" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="170" y1="150" x2="230" y2="150" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="172" y1="165" x2="228" y2="165" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="175" y1="180" x2="225" y2="180" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>

  <!-- Mic body ring (where head meets body) -->
  <line x1="160" y1="195" x2="240" y2="195" stroke="#2E2D2D" stroke-width="2.5" opacity="0.3"/>

  <!-- On/off indicator -->
  <circle cx="200" cy="230" r="5" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Sound waves (left) -->
  <path d="M135 120 Q125 140 135 165" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M115 105 Q100 140 115 180" stroke="#A855F7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M95 90 Q75 140 95 195" stroke="#C026D3" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15"/>

  <!-- Sound waves (right) -->
  <path d="M265 120 Q275 140 265 165" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M285 105 Q300 140 285 180" stroke="#A855F7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M305 90 Q325 140 305 195" stroke="#C026D3" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15"/>

  <!-- Musical notes (floating) -->
  <!-- Note 1 -->
  <circle cx="325" cy="85" r="6" fill="#7C3AED" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="331" y1="85" x2="331" y2="62" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <path d="M331 62 Q338 58 338 65" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25"/>
  <!-- Note 2 -->
  <circle cx="75" cy="70" r="5" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="80" y1="70" x2="80" y2="50" stroke="#2E2D2D" stroke-width="1.5" opacity="0.25"/>

  <!-- Small pop filter (decorative, left) -->
  <circle cx="60" cy="220" r="18" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.15"/>
  <circle cx="60" cy="220" r="12" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.1"/>
  <line x1="60" y1="238" x2="60" y2="260" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>

  <!-- Decorative dots -->
  <circle cx="350" cy="280" r="3" fill="#7C3AED" opacity="0.2"/>
  <circle cx="45" cy="310" r="2.5" fill="#A855F7" opacity="0.18"/>
  <circle cx="365" cy="190" r="2" fill="#C026D3" opacity="0.2"/>

  <!-- Decorative small lines -->
  <line x1="340" y1="340" x2="360" y2="340" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="30" y1="160" x2="48" y2="160" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
