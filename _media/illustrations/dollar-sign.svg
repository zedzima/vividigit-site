<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Growth arrow shadow -->
  <path d="M78 308 L178 118 L248 188 L348 58" stroke="#000" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.08" transform="translate(4,4)"/>
  <!-- Growth arrow -->
  <path d="M75 305 L175 115 L245 185 L345 55" stroke="#7C3AED" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.35"/>
  <!-- Arrow head -->
  <polygon points="345,55 325,62 338,75" fill="#7C3AED" opacity="0.4"/>
  <!-- Growth area fill -->
  <path d="M75 305 L175 115 L245 185 L345 55 L345 305 Z" fill="#7C3AED" fill-opacity="0.06"/>
  <!-- Coin platform shadow -->
  <ellipse cx="203" cy="293" rx="95" ry="28" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Coin platform -->
  <ellipse cx="200" cy="290" rx="95" ry="28" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.14"/>
  <!-- Coin side (3D depth) -->
  <path d="M105 290 L105 305 Q105 320 200 320 Q295 320 295 305 L295 290" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Coin bottom edge -->
  <ellipse cx="200" cy="305" rx="95" ry="28" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Dollar sign shadow -->
  <text x="204" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#000" opacity="0.08">$</text>
  <!-- Dollar sign -->
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="none" stroke="#2E2D2D" stroke-width="3.5">$</text>
  <!-- Dollar sign inner fill -->
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#C026D3" fill-opacity="0.15">$</text>
  <!-- Small stacked coins left -->
  <ellipse cx="62" cy="310" rx="25" ry="8" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <ellipse cx="60" cy="308" rx="25" ry="8" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.12"/>
  <ellipse cx="60" cy="300" rx="25" ry="8" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.12"/>
  <path d="M35 300 L35 308" stroke="#2E2D2D" stroke-width="2"/>
  <path d="M85 300 L85 308" stroke="#2E2D2D" stroke-width="2"/>
  <ellipse cx="60" cy="292" rx="25" ry="8" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <path d="M35 292 L35 300" stroke="#2E2D2D" stroke-width="2"/>
  <path d="M85 292 L85 300" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Small stacked coins right -->
  <ellipse cx="345" cy="315" rx="20" ry="6" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <ellipse cx="343" cy="313" rx="20" ry="6" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.12"/>
  <ellipse cx="343" cy="306" rx="20" ry="6" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.12"/>
  <path d="M323 306 L323 313" stroke="#2E2D2D" stroke-width="2"/>
  <path d="M363 306 L363 313" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Calculator top-right -->
  <rect x="318" y="138" width="48" height="62" rx="5" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="315" y="135" width="48" height="62" rx="5" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Calculator screen -->
  <rect x="322" y="142" width="34" height="14" rx="2" fill="#2E2D2D" opacity="0.15"/>
  <!-- Calculator buttons grid -->
  <circle cx="328" cy="167" r="3" fill="#2E2D2D" opacity="0.25"/>
  <circle cx="339" cy="167" r="3" fill="#2E2D2D" opacity="0.25"/>
  <circle cx="350" cy="167" r="3" fill="#2E2D2D" opacity="0.25"/>
  <circle cx="328" cy="179" r="3" fill="#2E2D2D" opacity="0.2"/>
  <circle cx="339" cy="179" r="3" fill="#2E2D2D" opacity="0.2"/>
  <circle cx="350" cy="179" r="3" fill="#7C3AED" opacity="0.35"/>
  <circle cx="328" cy="191" r="3" fill="#2E2D2D" opacity="0.2"/>
  <circle cx="339" cy="191" r="3" fill="#2E2D2D" opacity="0.2"/>
  <circle cx="350" cy="191" r="3" fill="#2E2D2D" opacity="0.2"/>
  <!-- Floating percentage signs -->
  <text x="50" y="110" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2E2D2D" opacity="0.18">%</text>
  <text x="320" y="85" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E2D2D" opacity="0.15">%</text>
  <text x="72" cy="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2E2D2D" opacity="0.12">%</text>
  <!-- Decorative dots -->
  <circle cx="42" cy="165" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="365" cy="240" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="130" cy="65" r="2" fill="#C026D3" opacity="0.28"/>
  <circle cx="280" cy="45" r="2" fill="#7C3AED" opacity="0.22"/>
  <!-- Small decorative lines -->
  <line x1="35" y1="225" x2="52" y2="225" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="30" y1="233" x2="48" y2="233" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Upward small arrows (growth indicators) -->
  <line x1="100" y1="80" x2="100" y2="60" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <polyline points="94,68 100,60 106,68" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.2"/>
</svg>