<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === PHONE: Smartphone with notifications, chat bubbles === -->

  <!-- Shadow under phone -->
  <ellipse cx="203" cy="365" rx="75" ry="10" fill="#000" opacity="0.06"/>

  <!-- Phone body shadow -->
  <rect x="133" y="48" width="140" height="290" rx="18" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Phone body -->
  <rect x="130" y="45" width="140" height="290" rx="18" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Screen -->
  <rect x="142" y="72" width="116" height="240" rx="6" fill="white" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Status bar -->
  <line x1="155" y1="85" x2="175" y2="85" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <circle cx="245" cy="85" r="3" fill="#2E2D2D" opacity="0.15"/>

  <!-- Notch/dynamic island -->
  <rect x="180" y="52" width="40" height="10" rx="5" fill="#2E2D2D" opacity="0.15"/>

  <!-- Notification 1 -->
  <rect x="152" y="105" width="96" height="32" rx="6" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="165" cy="121" r="5" fill="#A855F7" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1"/>
  <line x1="175" y1="117" x2="235" y2="117" stroke="#2E2D2D" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="175" y1="126" x2="220" y2="126" stroke="#2E2D2D" stroke-width="1" opacity="0.15" stroke-linecap="round"/>

  <!-- Notification 2 -->
  <rect x="152" y="145" width="96" height="32" rx="6" fill="#C026D3" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="165" cy="161" r="5" fill="#C026D3" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="1"/>
  <line x1="175" y1="157" x2="230" y2="157" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="175" y1="166" x2="215" y2="166" stroke="#2E2D2D" stroke-width="1" opacity="0.12" stroke-linecap="round"/>

  <!-- Content lines on screen -->
  <line x1="155" y1="200" x2="240" y2="200" stroke="#2E2D2D" stroke-width="1.5" opacity="0.12" stroke-linecap="round"/>
  <line x1="155" y1="215" x2="225" y2="215" stroke="#2E2D2D" stroke-width="1.5" opacity="0.10" stroke-linecap="round"/>
  <line x1="155" y1="230" x2="235" y2="230" stroke="#2E2D2D" stroke-width="1.5" opacity="0.10" stroke-linecap="round"/>

  <!-- Bottom nav dots -->
  <circle cx="180" cy="290" r="3" fill="#2E2D2D" opacity="0.15"/>
  <circle cx="200" cy="290" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="220" cy="290" r="3" fill="#2E2D2D" opacity="0.15"/>

  <!-- Chat bubble (floating, left) -->
  <path d="M40 140 Q40 120 55 120 L90 120 Q105 120 105 140 L105 160 Q105 175 90 175 L65 175 L50 190 L55 175 L55 175 Q40 175 40 160 Z" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.10"/>
  <line x1="52" y1="138" x2="92" y2="138" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="52" y1="150" x2="82" y2="150" stroke="#2E2D2D" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="52" y1="162" x2="75" y2="162" stroke="#2E2D2D" stroke-width="1" opacity="0.12" stroke-linecap="round"/>

  <!-- Chat bubble (floating, right) -->
  <path d="M300 200 Q300 185 312 185 L345 185 Q358 185 358 200 L358 215 Q358 228 345 228 L325 228 L335 242 L322 228 L312 228 Q300 228 300 215 Z" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10"/>
  <line x1="312" y1="200" x2="345" y2="200" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="312" y1="212" x2="340" y2="212" stroke="#2E2D2D" stroke-width="1" opacity="0.15" stroke-linecap="round"/>

  <!-- Signal waves (top right) -->
  <path d="M310 80 Q315 70 320 80" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M305 75 Q315 60 325 75" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Decorative dots -->
  <circle cx="355" cy="130" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="35" cy="260" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="370" cy="310" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="340" y1="350" x2="360" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="30" y1="320" x2="48" y2="320" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
