<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === PHONE: Smartphone with notification, hand holding === -->

  <ellipse cx="203" cy="360" rx="90" ry="11" fill="#000" opacity="0.06"/>

  <!-- Phone body shadow -->
  <rect x="123" y="53" width="150" height="280" rx="18" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Phone body -->
  <rect x="120" y="50" width="150" height="280" rx="18" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>

  <!-- Screen -->
  <rect x="132" y="72" width="126" height="238" rx="8" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.35"/>

  <!-- Status bar -->
  <line x1="145" y1="85" x2="170" y2="85" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <circle cx="242" cy="85" r="3" fill="#2E2D2D" opacity="0.15"/>
  <rect x="228" y="82" width="10" height="6" rx="1.5" stroke="#2E2D2D" stroke-width="1" opacity="0.2"/>

  <!-- App header -->
  <rect x="142" y="98" width="106" height="14" rx="3" fill="#7C3AED" fill-opacity="0.12"/>
  <line x1="150" y1="105" x2="200" y2="105" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Chat bubbles -->
  <!-- Incoming -->
  <rect x="142" y="125" width="80" height="28" rx="10" fill="#A855F7" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="152" y1="136" x2="208" y2="136" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="152" y1="145" x2="192" y2="145" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>

  <!-- Outgoing -->
  <rect x="168" y="165" width="80" height="28" rx="10" fill="#C026D3" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="178" y1="176" x2="234" y2="176" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="178" y1="185" x2="218" y2="185" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>

  <!-- Incoming -->
  <rect x="142" y="205" width="70" height="24" rx="10" fill="#7C3AED" fill-opacity="0.10" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="152" y1="217" x2="200" y2="217" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>

  <!-- Input bar -->
  <rect x="142" y="270" width="106" height="28" rx="14" stroke="#2E2D2D" stroke-width="1.5" fill="#2E2D2D" fill-opacity="0.05"/>
  <circle cx="236" cy="284" r="8" fill="#7C3AED" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Home indicator -->
  <line x1="170" y1="318" x2="220" y2="318" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round" opacity="0.2"/>

  <!-- Notification badge -->
  <circle cx="260" cy="60" r="14" fill="#C026D3" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="2.5"/>
  <text x="260" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E2D2D" opacity="0.5">3</text>

  <!-- Hand holding phone -->
  <path d="M88,300 C78,285 72,275 68,268 C64,260 68,255 76,258 L80,262 C76,252 84,248 88,256 C88,248 96,246 98,254 L100,270 Q105,300 100,330 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Thumb on screen -->
  <path d="M100 270 Q108 265 115 268" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Sound waves -->
  <path d="M285 160 Q295 180 285 200" stroke="#A855F7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M300 148 Q315 180 300 212" stroke="#C026D3" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15"/>

  <circle cx="50" cy="130" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="345" cy="100" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="55" cy="350" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="320" y1="360" x2="340" y2="360" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
