<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Rising line with a star anchored to it = your value grows with the company -->

  <!-- Area fill under the curve -->
  <path d="M60 300 Q130 280 180 240 Q230 200 270 160 Q310 120 340 80 L340 340 L60 340 Z" fill="#7C3AED" fill-opacity="0.05"/>

  <!-- Shadow of the curve -->
  <path d="M63 303 Q133 283 183 243 Q233 203 273 163 Q313 123 343 83" stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.06"/>

  <!-- Main growth curve -->
  <path d="M60 300 Q130 280 180 240 Q230 200 270 160 Q310 120 340 80" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Data points on curve -->
  <circle cx="60" cy="300" r="4" fill="#7C3AED" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="130" cy="270" r="4" fill="#7C3AED" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="180" cy="240" r="4" fill="#A855F7" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="230" cy="200" r="4.5" fill="#A855F7" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="270" cy="160" r="4.5" fill="#C026D3" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Star at the peak (you) anchored to the line -->
  <circle cx="340" cy="80" r="14" fill="#C026D3" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Star shape inside -->
  <polygon points="340,69 343,76 350,77 345,82 346,89 340,86 334,89 335,82 330,77 337,76"
           fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Dashed vertical line from star to base (long-term anchor) -->
  <line x1="340" y1="94" x2="340" y2="340" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.15"/>

  <!-- Time arrow at bottom -->
  <line x1="50" y1="345" x2="360" y2="345" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <path d="M355 340 L365 345 L355 350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.2"/>

  <!-- Sparkles near the star -->
  <line x1="365" y1="65" x2="365" y2="55" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="358" y1="58" x2="353" y2="52" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="372" y1="58" x2="377" y2="52" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <circle cx="365" cy="50" r="2" fill="#7C3AED" opacity="0.35"/>

  <!-- Decorative -->
  <circle cx="45" cy="150" r="3" fill="#7C3AED" opacity="0.2"/>
  <circle cx="55" cy="350" r="2" fill="#A855F7" opacity="0.15"/>
  <line x1="35" y1="250" x2="48" y2="250" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
</svg>
