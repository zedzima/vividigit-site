<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Cart basket shadow -->
  <path d="M103 158 L118 288 L313 288 L328 158 Z" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Cart basket -->
  <path d="M100 155 L115 285 L310 285 L325 155 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Cart rim / top rail -->
  <line x1="88" y1="155" x2="338" y2="155" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round"/>
  <!-- Cart handle bar going to the left -->
  <path d="M88 155 L55 120 L25 120" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Cart grid lines (wire basket effect) -->
  <line x1="165" y1="165" x2="160" y2="275" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="215" y1="165" x2="215" y2="275" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="265" y1="165" x2="270" y2="275" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="108" y1="200" x2="322" y2="200" stroke="#2E2D2D" stroke-width="1.5" opacity="0.12"/>
  <line x1="112" y1="240" x2="318" y2="240" stroke="#2E2D2D" stroke-width="1.5" opacity="0.12"/>
  <!-- Wheel left shadow -->
  <circle cx="148" cy="305" r="20" fill="#000" opacity="0.08"/>
  <!-- Wheel left -->
  <circle cx="145" cy="302" r="20" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.15"/>
  <circle cx="145" cy="302" r="6" fill="#2E2D2D" opacity="0.4"/>
  <!-- Wheel right shadow -->
  <circle cx="283" cy="305" r="20" fill="#000" opacity="0.08"/>
  <!-- Wheel right -->
  <circle cx="280" cy="302" r="20" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.15"/>
  <circle cx="280" cy="302" r="6" fill="#2E2D2D" opacity="0.4"/>
  <!-- Axle line -->
  <line x1="145" y1="290" x2="145" y2="285" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="290" x2="280" y2="285" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Item 1 stacked in cart - large box -->
  <rect x="125" y="178" width="65" height="50" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="122" y="175" width="65" height="50" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.15"/>
  <line x1="132" y1="195" x2="175" y2="195" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="132" y1="205" x2="160" y2="205" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Item 2 stacked in cart - medium box -->
  <rect x="200" y="190" width="55" height="40" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="197" y="187" width="55" height="40" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.14"/>
  <line x1="207" y1="203" x2="240" y2="203" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Item 3 on top - small box -->
  <rect x="158" y="138" width="45" height="28" rx="3" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="155" y="135" width="45" height="28" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.16"/>
  <!-- Item 4 - cylinder sticking up -->
  <rect x="248" y="128" width="28" height="38" rx="10" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="245" y="125" width="28" height="38" rx="10" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.13"/>
  <!-- "Add to cart" button shape floating top-right -->
  <rect x="290" y="58" width="80" height="32" rx="6" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="287" y="55" width="80" height="32" rx="6" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.18"/>
  <!-- Plus icon inside button -->
  <line x1="302" y1="71" x2="314" y2="71" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="308" y1="65" x2="308" y2="77" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Button text lines -->
  <line x1="322" y1="68" x2="358" y2="68" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="322" y1="75" x2="348" y2="75" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Quantity badge -->
  <circle cx="375" cy="48" r="14" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <circle cx="372" cy="45" r="14" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.20"/>
  <text x="372" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E2D2D" opacity="0.6">3</text>
  <!-- Second quantity badge smaller -->
  <circle cx="88" cy="68" r="10" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.15"/>
  <text x="88" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E2D2D" opacity="0.5">1</text>
  <!-- Decorative dots -->
  <circle cx="355" cy="180" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="370" cy="210" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="55" cy="340" r="2.5" fill="#C026D3" opacity="0.28"/>
  <circle cx="340" cy="340" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="350" y1="260" x2="370" y2="260" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="355" y1="268" x2="375" y2="268" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
