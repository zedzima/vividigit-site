  <path d="M60 80 L100 45 L100 80 L150 45 L150 80 L200 45 L200 80 L240 55 L240 80" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.10"/>
  <!-- Windows on factory -->
  <rect x="78" y="105" width="30" height="25" rx="2" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10"/>
  <line x1="93" y1="105" x2="93" y2="130" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <rect x="128" y="105" width="30" height="25" rx="2" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10"/>
  <line x1="143" y1="105" x2="143" y2="130" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <rect x="178" y="105" width="30" height="25" rx="2" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10"/>
