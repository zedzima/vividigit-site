  <path d="M318 132 Q321 118 335 114 Q349 118 352 132 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.16" stroke-linejoin="round"/>
  <line x1="316" y1="132" x2="354" y2="132" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Worker body -->
  <path d="M312 208 Q312 177 320 167 Q326 159 335 157 Q344 159 350 167 Q358 177 358 208 L353 214 L317 214 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.14" stroke-linejoin="round"/>
