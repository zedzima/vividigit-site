  <circle cx="345" cy="289" r="6" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Belt tread marks -->
  <line x1="90" y1="283" x2="90" y2="295" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="120" y1="283" x2="120" y2="295" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="150" y1="283" x2="150" y2="295" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="180" y1="283" x2="180" y2="295" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="210" y1="283" x2="210" y2="295" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="240" y1="283" x2="240" y2="295" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="270" y1="283" x2="270" y2="295" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="300" y1="283" x2="300" y2="295" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
