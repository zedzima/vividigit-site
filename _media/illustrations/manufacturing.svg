  <rect x="100" y="258" width="28" height="22" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.15"/>
  <line x1="114" y1="258" x2="114" y2="280" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <!-- Products on belt - box 2 -->
  <rect x="180" y="255" width="32" height="25" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.14"/>
