<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Factory building shadow -->
  <rect x="63" y="83" width="180" height="170" rx="4" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Factory building -->
  <rect x="60" y="80" width="180" height="170" rx="4" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.10"/>
