  <line x1="125" y1="202" x2="170" y2="202" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <line x1="125" y1="210" x2="170" y2="210" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <line x1="125" y1="218" x2="170" y2="218" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
