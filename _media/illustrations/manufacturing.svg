  <circle cx="218" cy="12" r="6" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.1"/>
  <circle cx="230" cy="5" r="5" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.08"/>
