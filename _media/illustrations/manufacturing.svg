  <line x1="55" y1="329" x2="55" y2="335" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="55" y1="365" x2="55" y2="371" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="34" y1="350" x2="40" y2="350" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="70" y1="350" x2="76" y2="350" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="335" x2="44" y2="339" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="66" y1="361" x2="70" y2="365" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="40" y1="365" x2="44" y2="361" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="66" y1="339" x2="70" y2="335" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Robotic arm -->
  <line x1="280" y1="340" x2="310" y2="360" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round"/>
  <line x1="310" y1="360" x2="340" y2="345" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="310" cy="360" r="4" fill="#2E2D2D" opacity="0.4"/>
  <!-- Claw -->
  <path d="M340 345 L348 338 M340 345 L350 350" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Quality checkmark -->
  <circle cx="355" cy="50" r="16" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.14"/>
  <polyline points="346,50 352,58 366,42" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Decorative dots -->
  <circle cx="40" cy="55" r="2.5" fill="#7C3AED" opacity="0.3"/>
  <circle cx="275" cy="45" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="165" cy="350" r="2" fill="#C026D3" opacity="0.25"/>
  <!-- Decorative lines -->
  <line x1="45" y1="155" x2="56" y2="155" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
