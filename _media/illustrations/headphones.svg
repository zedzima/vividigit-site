<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Shadow -->
  <ellipse cx="203" cy="340" rx="90" ry="12" fill="#000" opacity="0.06"/>
  <!-- Headband shadow -->
  <path d="M103,193 C103,118 145,63 203,63 C261,63 303,118 303,193" stroke="#000" stroke-width="14" opacity="0.06" fill="none" stroke-linecap="round"/>
  <!-- Headband -->
  <path d="M100,190 C100,115 142,60 200,60 C258,60 300,115 300,190" stroke="#2E2D2D" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Headband inner detail -->
  <path d="M120,190 C120,130 155,80 200,80 C245,80 280,130 280,190" stroke="#7C3AED" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Headband padding -->
  <rect x="175" y="52" width="50" height="16" rx="8" fill="#7C3AED" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Left ear cup shadow -->
  <ellipse cx="83" cy="232" rx="42" ry="55" fill="#000" opacity="0.08"/>
  <!-- Left ear cup -->
  <rect x="55" y="175" width="70" height="105" rx="20" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="3"/>
  <!-- Left ear cushion -->
  <rect x="62" y="185" width="56" height="85" rx="16" fill="#A855F7" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Left speaker detail -->
  <circle cx="90" cy="227" r="18" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.06"/>
  <circle cx="90" cy="227" r="8" stroke="#2E2D2D" stroke-width="1" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Right ear cup shadow -->
  <ellipse cx="323" cy="232" rx="42" ry="55" fill="#000" opacity="0.08"/>
  <!-- Right ear cup -->
  <rect x="275" y="175" width="70" height="105" rx="20" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="3"/>
  <!-- Right ear cushion -->
  <rect x="282" y="185" width="56" height="85" rx="16" fill="#A855F7" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Right speaker detail -->
  <circle cx="310" cy="227" r="18" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.06"/>
  <circle cx="310" cy="227" r="8" stroke="#2E2D2D" stroke-width="1" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Sound waves from left -->
  <path d="M42,210 C32,220 32,235 42,245" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M30,200 C15,215 15,240 30,255" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>
  <!-- Sound waves from right -->
  <path d="M358,210 C368,220 368,235 358,245" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M370,200 C385,215 385,240 370,255" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>
  <!-- Microphone boom -->
  <path d="M125,240 Q140,280 155,310 Q160,320 170,325" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Microphone head -->
  <ellipse cx="177" cy="328" rx="12" ry="8" fill="#C026D3" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="177" cy="328" r="3" fill="#2E2D2D" opacity="0.3"/>
  <!-- Music notes decorative -->
  <circle cx="350" cy="100" r="5" fill="#7C3AED" opacity="0.25"/>
  <line x1="355" y1="100" x2="355" y2="80" stroke="#7C3AED" stroke-width="1.5" opacity="0.25"/>
  <path d="M355,80 Q365,78 360,85" fill="#7C3AED" opacity="0.25"/>
  <circle cx="60" cy="340" r="4" fill="#A855F7" opacity="0.2"/>
  <line x1="64" y1="340" x2="64" y2="322" stroke="#A855F7" stroke-width="1.5" opacity="0.2"/>
  <!-- Decorative dots -->
  <circle cx="45" cy="120" r="3" fill="#7C3AED" opacity="0.25"/>
  <circle cx="355" cy="310" r="2.5" fill="#C026D3" opacity="0.2"/>
  <circle cx="200" cy="370" r="2" fill="#A855F7" opacity="0.15"/>
</svg>