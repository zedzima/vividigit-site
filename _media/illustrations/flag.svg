<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Mountain summit -->
  <path d="M50,360 L180,180 L200,210 L240,160 L380,360 Z" fill="#A855F7" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Mountain inner texture -->
  <path d="M180,180 L195,200 L200,210" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.15"/>
  <path d="M240,160 L220,195 L200,210" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.15"/>
  <!-- Snow cap -->
  <path d="M220,180 L240,160 L260,182 L248,185 L235,178 Z" fill="white" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Flagpole shadow -->
  <line x1="243" y1="43" x2="243" y2="163" stroke="#000" stroke-width="5" opacity="0.08"/>
  <!-- Flagpole -->
  <line x1="240" y1="40" x2="240" y2="160" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round"/>
  <!-- Pole ball top -->
  <circle cx="240" cy="38" r="5" fill="#2E2D2D"/>
  <!-- Flag shadow -->
  <path d="M243,43 L343,63 Q338,83 343,103 L243,83 Z" fill="#000" opacity="0.08"/>
  <!-- Flag waving -->
  <path d="M240,40 Q280,50 320,45 Q340,55 340,70 Q340,85 320,90 Q280,95 240,80 Z" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.18" stroke-linejoin="round"/>
  <!-- Flag wave detail -->
  <path d="M260,48 Q280,55 300,50" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <path d="M260,68 Q280,75 300,70" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Flag inner star/emblem -->
  <circle cx="285" cy="62" r="10" fill="#7C3AED" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5" opacity="0.4"/>
  <!-- Person planting flag -->
  <!-- Head -->
  <circle cx="195" cy="115" r="16" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Body -->
  <path d="M195,131 L195,185" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs (standing on summit) -->
  <path d="M195,185 L175,225" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <path d="M195,185 L215,225" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Arm reaching up to pole -->
  <path d="M195,145 L225,130 L238,120" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Other arm extended -->
  <path d="M195,145 L168,135" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Hand gripping pole -->
  <ellipse cx="238" cy="118" rx="6" ry="8" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Milestone markers on mountain -->
  <line x1="100" y1="320" x2="100" y2="305" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <rect x="88" y="300" width="24" height="10" rx="2" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <line x1="155" y1="268" x2="155" y2="253" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <rect x="143" y="248" width="24" height="10" rx="2" fill="#7C3AED" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <!-- Small trophy (bottom-right) -->
  <path d="M330,310 L340,310 L340,320 Q335,325 330,320 Z" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.15"/>
  <line x1="335" y1="320" x2="335" y2="330" stroke="#2E2D2D" stroke-width="2"/>
  <line x1="328" y1="330" x2="342" y2="330" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>
  <!-- Trophy handles -->
  <path d="M330,312 Q322,315 330,320" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M340,312 Q348,315 340,320" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Star on trophy -->
  <polygon points="335,313 336,316 339,316 337,318 338,321 335,319 332,321 333,318 331,316 334,316" fill="#7C3AED" opacity="0.4"/>
  <!-- Background mountain (distant) -->
  <path d="M280,360 L340,250 L400,360 Z" fill="#2E2D2D" fill-opacity="0.04" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <!-- Decorative dots -->
  <circle cx="50" cy="80" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="370" cy="180" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="40" cy="260" r="2" fill="#C026D3" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="60" y1="140" x2="80" y2="140" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="65" y1="148" x2="75" y2="148" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.1"/>
</svg>