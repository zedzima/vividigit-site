<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === PERCENT: Large % sign with progress bar and growth context === -->

  <!-- Shadow under main element -->
  <ellipse cx="203" cy="358" rx="115" ry="14" fill="#000" opacity="0.06"/>

  <!-- Large percent sign shadow -->
  <text x="204" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="200" font-weight="bold" fill="#000" opacity="0.07" transform="translate(3,3)">%</text>
  <!-- Large percent sign outline -->
  <text x="200" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="200" font-weight="bold" fill="none" stroke="#2E2D2D" stroke-width="3.5">%</text>
  <!-- Large percent sign fill -->
  <text x="200" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="200" font-weight="bold" fill="#7C3AED" fill-opacity="0.12">%</text>

  <!-- Top circle of % filled with accent -->
  <circle cx="148" cy="145" r="28" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2.5"/>
  <!-- Inner ring in top circle -->
  <circle cx="148" cy="145" r="16" fill="none" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>

  <!-- Bottom circle of % filled with secondary -->
  <circle cx="252" cy="260" r="28" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2.5"/>
  <!-- Inner ring in bottom circle -->
  <circle cx="252" cy="260" r="16" fill="none" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>

  <!-- Progress bar below (showing measurement) -->
  <rect x="95" y="318" width="210" height="14" rx="7" fill="#2E2D2D" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Progress fill (~65%) -->
  <rect x="95" y="318" width="138" height="14" rx="7" fill="#7C3AED" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Progress indicator dot -->
  <circle cx="233" cy="325" r="5" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Small upward arrow (growth) near top-right -->
  <line x1="320" y1="110" x2="320" y2="75" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <polyline points="312,85 320,75 328,85" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>

  <!-- Small bar chart (left side) -->
  <rect x="48" y="270" width="14" height="30" rx="2" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="66" y="255" width="14" height="45" rx="2" fill="#A855F7" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="84" y="240" width="14" height="60" rx="2" fill="#C026D3" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Hand pointing at progress bar -->
  <path d="M340,340 Q335,330 328,325 L310,318 C305,315 305,310 310,310 L315,312 C310,305 315,300 320,304 C318,298 324,295 327,300 C327,294 333,292 334,298 L338,318 Q342,335 340,345 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Index finger -->
  <path d="M310,318 Q300,315 295,312" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <circle cx="293" cy="311" r="2.5" fill="#2E2D2D" opacity="0.3"/>

  <!-- Number badge top-left -->
  <rect x="55" y="80" width="42" height="24" rx="5" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.12"/>
  <text x="76" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2E2D2D" opacity="0.4">42%</text>

  <!-- Decorative dots -->
  <circle cx="350" cy="60" r="3" fill="#7C3AED" opacity="0.25"/>
  <circle cx="30" cy="180" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="375" cy="270" r="2" fill="#C026D3" opacity="0.2"/>
  <circle cx="40" cy="340" r="2" fill="#7C3AED" opacity="0.15"/>

  <!-- Decorative small lines -->
  <line x1="340" y1="380" x2="360" y2="380" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="25" y1="130" x2="42" y2="130" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
