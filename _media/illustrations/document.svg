<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Bottom document (3rd in stack) shadow -->
  <rect x="103" y="103" width="210" height="270" rx="8" fill="#000" opacity="0.08"/>
  <!-- Bottom document -->
  <rect x="95" y="95" width="210" height="270" rx="8" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.06"/>
  <!-- Middle document shadow -->
  <rect x="83" y="78" width="210" height="270" rx="8" fill="#000" opacity="0.08"/>
  <!-- Middle document -->
  <rect x="78" y="73" width="210" height="270" rx="8" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Middle document text lines -->
  <line x1="100" y1="108" x2="205" y2="108" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <line x1="100" y1="122" x2="185" y2="122" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <line x1="100" y1="136" x2="195" y2="136" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <!-- Top document shadow -->
  <rect x="63" y="58" width="210" height="270" rx="8" fill="#000" opacity="0.08"/>
  <!-- Top document -->
  <rect x="60" y="55" width="210" height="270" rx="8" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.06"/>
  <!-- Corner fold -->
  <path d="M235 55 L270 55 L270 90" stroke="#2E2D2D" stroke-width="2.5" fill="none"/>
  <path d="M235 55 L270 90 L235 90 Z" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Document header / title area -->
  <rect x="82" y="78" width="130" height="12" rx="3" fill="#2E2D2D" opacity="0.15"/>
  <!-- Document text lines -->
  <line x1="82" y1="108" x2="230" y2="108" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="82" y1="122" x2="220" y2="122" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="82" y1="136" x2="225" y2="136" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="82" y1="150" x2="200" y2="150" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  <line x1="82" y1="164" x2="215" y2="164" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  <line x1="82" y1="178" x2="195" y2="178" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <line x1="82" y1="192" x2="210" y2="192" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <line x1="82" y1="206" x2="180" y2="206" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.12"/>
  <!-- Paragraph break -->
  <line x1="82" y1="226" x2="225" y2="226" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="82" y1="240" x2="210" y2="240" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  <line x1="82" y1="254" x2="190" y2="254" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <!-- Checkmark circle -->
  <circle cx="220" cy="278" r="18" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.15"/>
  <!-- Checkmark -->
  <polyline points="210,278 217,286 232,270" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Paperclip -->
  <path d="M255 110 Q255 95 245 95 Q235 95 235 110 L235 145 Q235 158 245 158 Q255 158 255 145 L255 118" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Decorative dots -->
  <circle cx="35" cy="60" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="25" cy="80" r="2" fill="#A855F7" opacity="0.18"/>
  <circle cx="340" cy="340" r="3.5" fill="#C026D3" opacity="0.2"/>
  <circle cx="355" cy="320" r="2" fill="#7C3AED" opacity="0.18"/>
  <circle cx="45" cy="330" r="2.5" fill="#A855F7" opacity="0.18"/>
  <!-- Decorative lines -->
  <line x1="320" y1="360" x2="340" y2="360" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="325" y1="368" x2="345" y2="368" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <line x1="25" y1="180" x2="40" y2="180" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Small file tab indicator -->
  <rect x="35" cy="280" y="280" width="18" height="24" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.1" opacity="0.3"/>
  <line x1="40" y1="288" x2="48" y2="288" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
  <line x1="40" y1="294" x2="46" y2="294" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
</svg>
