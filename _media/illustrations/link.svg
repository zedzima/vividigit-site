<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === LINK: Two interlocked chain links with anchor === -->

  <!-- Shadow under chain -->
  <ellipse cx="203" cy="355" rx="100" ry="12" fill="#000" opacity="0.06"/>

  <!-- Left chain link shadow -->
  <rect x="73" y="103" width="130" height="170" rx="65" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Left chain link -->
  <rect x="70" y="100" width="130" height="170" rx="65" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Inner cutout left -->
  <rect x="102" y="138" width="66" height="94" rx="33" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.5"/>

  <!-- Right chain link shadow -->
  <rect x="203" y="133" width="130" height="170" rx="65" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Right chain link -->
  <rect x="200" y="130" width="130" height="170" rx="65" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Inner cutout right -->
  <rect x="232" y="168" width="66" height="94" rx="33" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.5"/>

  <!-- Overlap highlight -->
  <rect x="170" y="130" width="35" height="100" rx="6" fill="#A855F7" fill-opacity="0.08"/>

  <!-- Anchor (bottom center) -->
  <circle cx="200" cy="310" r="12" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.10"/>
  <line x1="200" y1="322" x2="200" y2="358" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="183" y1="338" x2="217" y2="338" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>
  <path d="M178 355 Q178 345 188 345 L200 355" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M222 355 Q222 345 212 345 L200 355" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Connection dots -->
  <circle cx="135" cy="185" r="4" fill="#7C3AED" opacity="0.3"/>
  <circle cx="265" cy="215" r="4" fill="#C026D3" opacity="0.3"/>

  <!-- Small link icon top-left -->
  <path d="M50 70 L65 55" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <path d="M57 77 L72 62" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <circle cx="50" cy="70" r="3" fill="#7C3AED" opacity="0.2"/>
  <circle cx="72" cy="62" r="3" fill="#A855F7" opacity="0.2"/>

  <!-- Decorative dots -->
  <circle cx="355" cy="85" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="40" cy="250" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="370" cy="300" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="345" y1="345" x2="365" y2="345" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="25" y1="160" x2="42" y2="160" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
