<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Left link shadow -->
  <g transform="translate(82 144) rotate(-24 72 48)">
    <rect x="0" y="0" width="144" height="96" rx="48" fill="#000" opacity="0.08"/>
  </g>
  <!-- Left link -->
  <g transform="translate(79 141) rotate(-24 72 48)">
    <rect x="0" y="0" width="144" height="96" rx="48" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.14"/>
    <rect x="34" y="22" width="76" height="52" rx="26" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.4"/>
  </g>

  <!-- Right link shadow -->
  <g transform="translate(175 162) rotate(24 72 48)">
    <rect x="0" y="0" width="144" height="96" rx="48" fill="#000" opacity="0.08"/>
  </g>
  <!-- Right link -->
  <g transform="translate(172 159) rotate(24 72 48)">
    <rect x="0" y="0" width="144" height="96" rx="48" stroke="#2E2D2D" stroke-width="3.5" fill="#A855F7" fill-opacity="0.14"/>
    <rect x="34" y="22" width="76" height="52" rx="26" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.4"/>
  </g>

  <!-- Interlock focus -->
  <circle cx="199" cy="203" r="16" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <line x1="188" y1="203" x2="210" y2="203" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>

  <!-- Anchor card shadow -->
  <rect x="287" y="84" width="78" height="94" rx="10" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Anchor card -->
  <rect x="284" y="81" width="78" height="94" rx="10" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="323" cy="104" r="8" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.14"/>
  <line x1="323" y1="112" x2="323" y2="145" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <line x1="309" y1="124" x2="337" y2="124" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M309 138 Q315 150 323 150 Q331 150 337 138" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M313 138 L307 144" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>
  <path d="M333 138 L339 144" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>
  <line x1="303" y1="159" x2="343" y2="159" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.22"/>

  <!-- Connection accent -->
  <path d="M258 170 Q282 164 298 146" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 4" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- URL chip -->
  <rect x="58" y="82" width="94" height="26" rx="7" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.08"/>
  <circle cx="72" cy="95" r="4" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.22"/>
  <line x1="82" y1="95" x2="134" y2="95" stroke="#2E2D2D" stroke-width="1.8" stroke-linecap="round" opacity="0.2"/>

  <!-- Cursor card -->
  <rect x="286" y="260" width="58" height="48" rx="8" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.08"/>
  <path d="M304 272 L304 292 L314 286 L320 298 L326 295 L320 284 L330 282 Z" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>

  <!-- Mini chain accent -->
  <path d="M86 262 Q104 246 126 252" stroke="#A855F7" stroke-width="2" fill="none" opacity="0.22"/>
  <path d="M118 228 Q126 220 136 224" stroke="#C026D3" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Decorative dots -->
  <circle cx="58" cy="112" r="3" fill="#7C3AED" opacity="0.24"/>
  <circle cx="50" cy="290" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="338" cy="250" r="2.5" fill="#C026D3" opacity="0.2"/>
  <circle cx="320" cy="336" r="2" fill="#7C3AED" opacity="0.18"/>
  <!-- Decorative lines -->
  <line x1="52" y1="232" x2="70" y2="232" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="270" y1="332" x2="294" y2="332" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
