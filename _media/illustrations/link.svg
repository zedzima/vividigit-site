<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === LINK: Two interlocked chain links, hand connecting them === -->

  <ellipse cx="203" cy="358" rx="110" ry="13" fill="#000" opacity="0.06"/>

  <!-- Left link shadow -->
  <rect x="53" y="133" width="160" height="100" rx="50" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Left link outer -->
  <rect x="50" y="130" width="160" height="100" rx="50" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Left link inner hole -->
  <rect x="85" y="158" width="90" height="44" rx="22" stroke="#2E2D2D" stroke-width="2.5" fill="white" fill-opacity="0.5"/>

  <!-- Right link shadow -->
  <rect x="183" y="163" width="160" height="100" rx="50" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Right link outer -->
  <rect x="180" y="160" width="160" height="100" rx="50" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.14"/>
  <!-- Right link inner hole -->
  <rect x="215" y="188" width="90" height="44" rx="22" stroke="#2E2D2D" stroke-width="2.5" fill="white" fill-opacity="0.5"/>

  <!-- Interlock overlap indicator -->
  <circle cx="210" cy="195" r="10" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2"/>

  <!-- Connection sparkle -->
  <line x1="210" y1="130" x2="210" y2="118" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="200" y1="135" x2="194" y2="126" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="220" y1="135" x2="226" y2="126" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Hand connecting links (bottom) -->
  <path d="M165,340 C155,325 147,315 140,310 C133,305 128,310 132,318 L135,325 C125,318 120,326 128,332 C118,328 115,336 123,340 C113,338 112,346 122,350 L152,365 C168,375 180,370 190,360 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Finger pointing up -->
  <path d="M190 360 Q195 340 193 320" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <circle cx="193" cy="318" r="2.5" fill="#2E2D2D" opacity="0.3"/>

  <!-- URL chip (top left) -->
  <rect x="55" y="75" width="90" height="26" rx="7" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.08"/>
  <circle cx="70" cy="88" r="4" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25"/>
  <line x1="80" y1="88" x2="130" y2="88" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Small link icon (top right) -->
  <circle cx="330" cy="90" r="15" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.10"/>
  <path d="M324 90 L336 90" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <path d="M320 85 L326 90 L320 95" stroke="#2E2D2D" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>

  <circle cx="40" cy="200" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="370" cy="250" r="2.5" fill="#C026D3" opacity="0.2"/>
  <circle cx="350" cy="340" r="2" fill="#A855F7" opacity="0.15"/>
  <line x1="330" y1="370" x2="350" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="35" y1="290" x2="50" y2="290" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
