<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for left chain link -->
  <path d="M88 163 A55 55 0 0 1 88 253 L138 253 A55 55 0 0 1 138 163 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Left chain link -->
  <path d="M85 160 A55 55 0 0 1 85 250 L135 250 A55 55 0 0 1 135 160 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Left link inner hole -->
  <path d="M100 180 A30 30 0 0 1 100 230 L120 230 A30 30 0 0 1 120 180 Z" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.5"/>
  <!-- Depth shadow for right chain link -->
  <path d="M258 163 A55 55 0 0 0 258 253 L208 253 A55 55 0 0 0 208 163 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Right chain link -->
  <path d="M255 160 A55 55 0 0 0 255 250 L205 250 A55 55 0 0 0 205 160 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#A855F7" fill-opacity="0.14"/>
