  <path d="M240 180 A30 30 0 0 0 240 230 L220 230 A30 30 0 0 0 220 180 Z" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.5"/>
  <!-- Overlap/connection zone (the interlocking part) -->
  <rect x="132" y="170" width="76" height="70" rx="4" fill="#C026D3" fill-opacity="0.06"/>
  <!-- Connection highlight -->
  <line x1="155" y1="195" x2="185" y2="195" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="155" y1="205" x2="185" y2="205" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="155" y1="215" x2="185" y2="215" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Left hand pulling link -->
  <path d="M58 185 C48 178 40 172 35 166 C30 160 36 155 40 162 C38 154 44 152 48 158 C48 150 56 150 56 158 L56 180 C56 188 50 194 46 192 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Left arm -->
  <path d="M58 185 Q68 190 78 192 Q85 192 88 188" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Right hand pulling link -->
  <path d="M282 185 C292 178 300 172 305 166 C310 160 304 155 300 162 C302 154 296 152 292 158 C292 150 284 150 284 158 L284 180 C284 188 290 194 294 192 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Right arm -->
  <path d="M282 185 Q272 190 262 192 Q255 192 252 188" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Motion/force lines (left) -->
  <line x1="30" y1="200" x2="18" y2="200" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="32" y1="210" x2="22" y2="213" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="32" y1="190" x2="22" y2="187" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Motion/force lines (right) -->
  <line x1="310" y1="200" x2="322" y2="200" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="308" y1="210" x2="318" y2="213" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="308" y1="190" x2="318" y2="187" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- URL bar (top area) -->
  <rect x="90" y="58" width="220" height="28" rx="6" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Lock icon in URL bar -->
  <rect x="100" y="66" width="10" height="10" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M102 66 L102 62 A3 3 0 0 1 108 62 L108 66" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- URL text -->
  <line x1="118" y1="72" x2="215" y2="72" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Small globe icon (bottom-right) -->
  <circle cx="340" cy="310" r="18" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.1"/>
  <!-- Globe meridians -->
  <ellipse cx="340" cy="310" rx="8" ry="18" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.2"/>
  <line x1="322" y1="310" x2="358" y2="310" stroke="#2E2D2D" stroke-width="1" opacity="0.2"/>
  <path d="M326 300 Q340 298 354 300" stroke="#2E2D2D" stroke-width="0.8" fill="none" opacity="0.15"/>
  <path d="M326 320 Q340 322 354 320" stroke="#2E2D2D" stroke-width="0.8" fill="none" opacity="0.15"/>
  <!-- Anchor symbol (bottom-left) -->
  <circle cx="60" cy="320" r="5" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.25"/>
  <line x1="60" y1="325" x2="60" y2="350" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <path d="M45 342 Q50 350 60 350 Q70 350 75 342" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <line x1="55" y1="330" x2="65" y2="330" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Connection spark/energy dots -->
  <circle cx="170" cy="175" r="3" fill="#7C3AED" opacity="0.35"/>
  <circle cx="165" cy="232" r="2.5" fill="#A855F7" opacity="0.3"/>
  <circle cx="175" cy="238" r="2" fill="#C026D3" opacity="0.25"/>
  <!-- Decorative dots -->
  <circle cx="355" cy="120" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="370" cy="140" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="30" cy="100" r="2.5" fill="#C026D3" opacity="0.25"/>
  <circle cx="20" cy="280" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="330" y1="50" x2="355" y2="50" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="340" y1="42" x2="360" y2="42" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Small link icon (decorative, top-left) -->
  <path d="M42 72 L52 62" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M48 78 L58 68" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
</svg>