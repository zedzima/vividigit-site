<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === CLOCK: Hourglass with sand flowing === -->

  <!-- Shadow under hourglass -->
  <ellipse cx="203" cy="362" rx="85" ry="10" fill="#000" opacity="0.06"/>

  <!-- Stand top bar shadow -->
  <rect x="118" y="53" width="170" height="14" rx="4" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Stand top bar -->
  <rect x="115" y="50" width="170" height="14" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.12"/>

  <!-- Stand bottom bar shadow -->
  <rect x="118" y="338" width="170" height="14" rx="4" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Stand bottom bar -->
  <rect x="115" y="335" width="170" height="14" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.12"/>

  <!-- Stand pillars -->
  <line x1="132" y1="64" x2="132" y2="335" stroke="#2E2D2D" stroke-width="2.5" opacity="0.25"/>
  <line x1="268" y1="64" x2="268" y2="335" stroke="#2E2D2D" stroke-width="2.5" opacity="0.25"/>

  <!-- Glass body shadow -->
  <path d="M153 68 Q153 178 203 198 Q253 178 253 68" fill="#000" opacity="0.06" transform="translate(3,3)"/>

  <!-- Top bulb (glass) -->
  <path d="M150 65 L150 145 Q150 185 200 195 Q250 185 250 145 L250 65" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.06"/>

  <!-- Bottom bulb (glass) -->
  <path d="M150 340 L150 255 Q150 215 200 205 Q250 215 250 255 L250 340" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.06"/>

  <!-- Sand in top (partially emptied) -->
  <path d="M158 105 L158 140 Q158 175 200 190 Q242 175 242 140 L242 105 Z" fill="#C026D3" fill-opacity="0.15"/>
  <line x1="158" y1="105" x2="242" y2="105" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>

  <!-- Sand stream (narrow middle) -->
  <line x1="200" y1="190" x2="200" y2="215" stroke="#C026D3" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Sand in bottom (accumulated) -->
  <path d="M160 340 L160 290 Q160 265 200 260 Q240 265 240 290 L240 340 Z" fill="#7C3AED" fill-opacity="0.12"/>

  <!-- Sand particles falling -->
  <circle cx="198" cy="225" r="1.5" fill="#C026D3" opacity="0.35"/>
  <circle cx="202" cy="235" r="1.5" fill="#C026D3" opacity="0.3"/>
  <circle cx="197" cy="245" r="1.5" fill="#C026D3" opacity="0.25"/>

  <!-- Small hourglass (decorative, top-left) -->
  <path d="M50 90 L50 105 Q50 115 60 118 Q70 115 70 105 L70 90" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <path d="M50 145 L50 130 Q50 120 60 118 Q70 120 70 130 L70 145" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <line x1="48" y1="90" x2="72" y2="90" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <line x1="48" y1="145" x2="72" y2="145" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>

  <!-- Time indicators (small clock, top-right) -->
  <circle cx="340" cy="100" r="16" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.08"/>
  <line x1="340" y1="100" x2="340" y2="90" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="340" y1="100" x2="348" y2="104" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Decorative dots -->
  <circle cx="365" cy="200" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="35" cy="250" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="360" cy="320" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="340" y1="355" x2="360" y2="355" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="25" y1="180" x2="42" y2="180" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
