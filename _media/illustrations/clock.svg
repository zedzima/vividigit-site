<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === CLOCK: Analog clock face with hand pointing, time indicators === -->

  <!-- Shadow under clock -->
  <ellipse cx="203" cy="355" rx="110" ry="14" fill="#000" opacity="0.06"/>
  <!-- Clock body shadow -->
  <circle cx="203" cy="193" r="130" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Clock body -->
  <circle cx="200" cy="190" r="130" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Inner ring -->
  <circle cx="200" cy="190" r="108" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.15"/>

  <!-- Hour markers (12 positions) -->
  <!-- 12 -->
  <line x1="200" y1="72" x2="200" y2="90" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- 3 -->
  <line x1="318" y1="190" x2="300" y2="190" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- 6 -->
  <line x1="200" y1="308" x2="200" y2="290" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- 9 -->
  <line x1="82" y1="190" x2="100" y2="190" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- 1 -->
  <line x1="259" y1="88" x2="250" y2="103" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- 2 -->
  <line x1="302" y1="131" x2="288" y2="140" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- 4 -->
  <line x1="302" y1="249" x2="288" y2="240" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- 5 -->
  <line x1="259" y1="292" x2="250" y2="277" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- 7 -->
  <line x1="141" y1="292" x2="150" y2="277" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- 8 -->
  <line x1="98" y1="249" x2="112" y2="240" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- 10 -->
  <line x1="98" y1="131" x2="112" y2="140" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- 11 -->
  <line x1="141" y1="88" x2="150" y2="103" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Hour hand (pointing to ~10) -->
  <line x1="200" y1="190" x2="138" y2="138" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="200" y1="190" x2="270" y2="115" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center cap -->
  <circle cx="200" cy="190" r="8" fill="#C026D3" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="2.5"/>

  <!-- Small second hand tick marks (subtle motion) -->
  <circle cx="260" cy="115" r="3" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1"/>

  <!-- Hand holding/adjusting clock (bottom right) -->
  <path d="M310,310 C320,295 332,285 340,280 C348,275 354,280 350,288 L345,295 C355,288 360,296 352,302 C362,298 365,306 357,310 C367,308 368,316 358,320 L328,335 C312,345 300,340 290,330 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Finger detail -->
  <path d="M342,305 Q348,298 350,292" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Small floating alarm indicators -->
  <!-- Bell shape top-left -->
  <path d="M52,75 Q52,60 62,60 Q72,60 72,75 L74,80 L50,80 Z" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.12"/>
  <line x1="58" y1="80" x2="66" y2="80" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <circle cx="62" cy="85" r="2" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.25"/>

  <!-- Small clock icon bottom-left -->
  <circle cx="60" cy="300" r="14" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.08"/>
  <line x1="60" y1="300" x2="60" y2="291" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="60" y1="300" x2="67" y2="303" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Decorative dots -->
  <circle cx="365" cy="70" r="3" fill="#7C3AED" opacity="0.25"/>
  <circle cx="45" cy="200" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="355" cy="350" r="2" fill="#C026D3" opacity="0.2"/>
  <circle cx="130" cy="360" r="2.5" fill="#7C3AED" opacity="0.15"/>

  <!-- Decorative small lines -->
  <line x1="340" y1="370" x2="360" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="30" y1="150" x2="45" y2="150" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
