<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === THUMBS-UP: Hand with thumb up, approval badge, sparkles === -->

  <!-- Shadow under hand -->
  <ellipse cx="203" cy="355" rx="100" ry="12" fill="#000" opacity="0.06"/>

  <!-- Wrist/palm shadow -->
  <path d="M148 188 L148 328 L208 328 L208 188 Z" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Wrist/palm block -->
  <rect x="145" y="185" width="60" height="143" rx="8" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Wrist lines -->
  <line x1="155" y1="280" x2="195" y2="280" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="155" y1="295" x2="195" y2="295" stroke="#2E2D2D" stroke-width="1.5" opacity="0.12"/>

  <!-- Thumb shadow -->
  <path d="M208 195 L208 105 Q208 75 238 75 Q268 75 268 105 L268 155 L298 155 Q318 155 318 175 L318 195 Q318 215 298 215 L208 215 Z" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Thumb -->
  <path d="M205 192 L205 102 Q205 72 235 72 Q265 72 265 102 L265 152 L295 152 Q315 152 315 172 L315 192 Q315 212 295 212 L205 212 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Thumb nail -->
  <path d="M225 82 Q235 76 245 82" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Thumb joint line -->
  <line x1="205" y1="152" x2="265" y2="152" stroke="#2E2D2D" stroke-width="2" opacity="0.2"/>

  <!-- Finger wraps on palm -->
  <line x1="145" y1="210" x2="205" y2="210" stroke="#2E2D2D" stroke-width="2" opacity="0.2"/>
  <line x1="145" y1="235" x2="205" y2="235" stroke="#2E2D2D" stroke-width="2" opacity="0.15"/>
  <line x1="145" y1="258" x2="205" y2="258" stroke="#2E2D2D" stroke-width="2" opacity="0.15"/>

  <!-- Approval badge (top right) -->
  <circle cx="310" cy="90" r="32" fill="#000" opacity="0.07" transform="translate(2,2)"/>
  <circle cx="308" cy="88" r="32" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.14"/>
  <!-- Checkmark inside badge -->
  <polyline points="294,88 304,99 322,78" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Sparkles around thumb -->
  <!-- Sparkle top -->
  <line x1="180" y1="50" x2="180" y2="38" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="170" y1="55" x2="164" y2="46" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="190" y1="55" x2="196" y2="46" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Sparkle right -->
  <line x1="340" y1="170" x2="352" y2="170" stroke="#C026D3" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="345" y1="160" x2="353" y2="155" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="345" y1="180" x2="353" y2="185" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Star dots -->
  <circle cx="180" cy="35" r="2.5" fill="#7C3AED" opacity="0.35"/>
  <circle cx="355" cy="168" r="2" fill="#C026D3" opacity="0.3"/>

  <!-- Small floating hearts/stars -->
  <circle cx="100" cy="110" r="3" fill="#A855F7" opacity="0.2"/>
  <circle cx="85" cy="130" r="2" fill="#7C3AED" opacity="0.15"/>
  <circle cx="340" cy="260" r="2.5" fill="#C026D3" opacity="0.2"/>

  <!-- Decorative dots -->
  <circle cx="50" cy="300" r="3" fill="#7C3AED" opacity="0.2"/>
  <circle cx="370" cy="330" r="2" fill="#A855F7" opacity="0.15"/>

  <!-- Decorative small lines -->
  <line x1="55" y1="350" x2="75" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="330" y1="350" x2="350" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
