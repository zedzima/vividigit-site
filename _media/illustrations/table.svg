<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === TABLE: Spreadsheet/data table with highlighted cells, hand selecting === -->

  <!-- Shadow under table -->
  <ellipse cx="203" cy="358" rx="120" ry="14" fill="#000" opacity="0.06"/>
  <!-- Table body shadow -->
  <rect x="53" y="68" width="300" height="260" rx="8" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Table body -->
  <rect x="50" y="65" width="300" height="260" rx="8" stroke="#2E2D2D" stroke-width="3.5" fill="white" fill-opacity="0.4"/>

  <!-- Header row -->
  <rect x="50" y="65" width="300" height="35" rx="8" fill="#7C3AED" fill-opacity="0.12"/>
  <path d="M50 100 L350 100" stroke="#2E2D2D" stroke-width="2" opacity="0.25"/>
  <!-- Header text lines -->
  <line x1="70" y1="83" x2="110" y2="83" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="160" y1="83" x2="200" y2="83" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="250" y1="83" x2="290" y2="83" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Column dividers -->
  <line x1="140" y1="65" x2="140" y2="325" stroke="#2E2D2D" stroke-width="1.5" opacity="0.12"/>
  <line x1="230" y1="65" x2="230" y2="325" stroke="#2E2D2D" stroke-width="1.5" opacity="0.12"/>

  <!-- Row dividers -->
  <line x1="50" y1="140" x2="350" y2="140" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <line x1="50" y1="180" x2="350" y2="180" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <line x1="50" y1="220" x2="350" y2="220" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <line x1="50" y1="260" x2="350" y2="260" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <line x1="50" y1="295" x2="350" y2="295" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>

  <!-- Highlighted cell (row 2, col 2) -->
  <rect x="141" y="141" width="88" height="38" fill="#C026D3" fill-opacity="0.12" stroke="#C026D3" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Highlighted cell (row 4, col 3) -->
  <rect x="231" y="221" width="118" height="38" fill="#A855F7" fill-opacity="0.10" stroke="#A855F7" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Cell text lines (row 1) -->
  <line x1="65" y1="120" x2="105" y2="120" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="155" y1="120" x2="195" y2="120" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="245" y1="120" x2="310" y2="120" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Cell text lines (row 2 — highlighted) -->
  <line x1="65" y1="160" x2="120" y2="160" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="155" y1="160" x2="215" y2="160" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="245" y1="160" x2="300" y2="160" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Cell text lines (row 3) -->
  <line x1="65" y1="200" x2="115" y2="200" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="155" y1="200" x2="205" y2="200" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="245" y1="200" x2="320" y2="200" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Cell text lines (row 4 — highlighted) -->
  <line x1="65" y1="240" x2="125" y2="240" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="155" y1="240" x2="200" y2="240" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="245" y1="240" x2="330" y2="240" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Cell text lines (row 5) -->
  <line x1="65" y1="278" x2="110" y2="278" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="155" y1="278" x2="210" y2="278" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="245" y1="278" x2="305" y2="278" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>

  <!-- Hand with pen pointing at highlighted cell -->
  <path d="M80,345 C70,325 60,315 55,305 C50,295 55,287 65,292 L70,297 C65,285 73,279 80,285 C77,275 85,271 90,279 C89,269 97,267 100,277 L105,305 C107,325 100,340 93,353 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Pen in hand -->
  <line x1="100" y1="277" x2="150" y2="225" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <polygon points="150,225 145,235 155,232" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Small chart (top right, decorative) -->
  <rect x="365" y="75" width="8" height="20" rx="1.5" fill="#7C3AED" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1"/>
  <rect x="377" y="65" width="8" height="30" rx="1.5" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1"/>

  <!-- Decorative dots -->
  <circle cx="30" cy="120" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="385" cy="180" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="370" cy="340" r="2" fill="#C026D3" opacity="0.18"/>
  <circle cx="25" cy="250" r="2" fill="#A855F7" opacity="0.15"/>

  <!-- Decorative small lines -->
  <line x1="365" y1="360" x2="385" y2="360" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="20" y1="180" x2="35" y2="180" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
