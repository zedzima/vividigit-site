<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Building shadow -->
  <rect x="103" y="103" width="200" height="210" rx="4" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Building body -->
  <rect x="100" y="100" width="200" height="210" rx="4" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Roof -->
  <path d="M85 100 L200 45 L315 100" stroke="#2E2D2D" stroke-width="4" fill="#A855F7" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Chimney -->
  <rect x="255" y="55" width="22" height="35" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" fill-opacity="0.1"/>
  <!-- Chimney smoke -->
  <path d="M266 50 Q260 40 268 32 Q275 24 270 15" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>
  <!-- Large window (showing interior) -->
  <rect x="130" y="125" width="140" height="95" rx="3" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.10"/>
  <!-- Window cross frame -->
  <line x1="200" y1="125" x2="200" y2="220" stroke="#2E2D2D" stroke-width="2.5"/>
  <line x1="130" y1="172" x2="270" y2="172" stroke="#2E2D2D" stroke-width="2.5"/>
  <!-- Interior details - lamp -->
  <line x1="155" y1="135" x2="155" y2="148" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <path d="M148 148 L162 148 L158 155 L152 155 Z" fill="#2E2D2D" opacity="0.15"/>
  <!-- Interior - small plant -->
  <line x1="240" y1="165" x2="240" y2="155" stroke="#2E2D2D" stroke-width="1.5" opacity="0.25"/>
  <circle cx="240" cy="152" r="5" fill="#7C3AED" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1" opacity="0.3"/>
  <circle cx="236" cy="156" r="4" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1" opacity="0.25"/>
  <!-- Interior - sofa hint -->
  <path d="M140 195 Q145 188 165 188 Q175 188 180 195" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Door -->
  <rect x="175" y="245" width="50" height="65" rx="3" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Doorknob -->
  <circle cx="217" cy="280" r="4" fill="#2E2D2D" opacity="0.4"/>
  <!-- Door panel -->
  <rect x="183" y="252" width="34" height="22" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Small windows on each side of door -->
  <rect x="115" y="250" width="35" height="30" rx="2" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.10"/>
  <line x1="132" y1="250" x2="132" y2="280" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <rect x="250" y="250" width="35" height="30" rx="2" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.10"/>
  <line x1="267" y1="250" x2="267" y2="280" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <!-- Ground line -->
  <line x1="50" y1="310" x2="350" y2="310" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Key in hand -->
  <!-- Hand silhouette -->
  <path d="M320 170 Q330 160 340 162 Q350 165 352 178 Q354 190 348 200 L338 205 Q330 200 325 192 Q318 182 320 170 Z" fill="#2E2D2D" opacity="0.8"/>
  <!-- Fingers detail -->
  <path d="M340 162 Q348 158 350 165" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Key shadow -->
  <path d="M343 200 L348 230 L370 230 L370 220 L358 220 L358 212 L365 212 L365 203 L343 200" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Key body -->
  <circle cx="340" cy="198" r="14" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.14"/>
  <circle cx="340" cy="198" r="6" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Key shaft -->
  <line x1="340" y1="212" x2="340" y2="248" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Key teeth -->
  <line x1="340" y1="238" x2="350" y2="238" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="248" x2="352" y2="248" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Location pin -->
  <path d="M55 150 Q55 130 68 122 Q82 130 82 150 L68 170 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.15"/>
  <circle cx="68" cy="142" r="6" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.35"/>
  <!-- Small tree -->
  <line x1="55" y1="310" x2="55" y2="285" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <circle cx="55" cy="275" r="16" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.12"/>
  <circle cx="48" cy="282" r="10" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.10"/>
  <circle cx="62" cy="268" r="11" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Price tag -->
  <rect x="42" y="335" width="48" height="28" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="52" cy="349" r="3" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <line x1="60" y1="345" x2="80" y2="345" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="60" y1="353" x2="75" y2="353" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Decorative dots -->
  <circle cx="348" cy="310" r="2.5" fill="#7C3AED" opacity="0.3"/>
  <circle cx="370" cy="280" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="40" cy="100" r="2" fill="#C026D3" opacity="0.25"/>
  <circle cx="355" cy="120" r="3" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="345" y1="340" x2="365" y2="340" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="340" y1="50" x2="360" y2="50" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>