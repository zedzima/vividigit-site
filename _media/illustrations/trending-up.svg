<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Stepping stones / stairs beneath the line -->
  <!-- Step 1 -->
  <rect x="48" y="305" width="55" height="20" rx="3" fill="#7C3AED" fill-opacity="0.1" stroke="#2E2D2D" stroke-width="2" opacity="0.5"/>
  <!-- Step 2 -->
  <rect x="98" y="275" width="55" height="20" rx="3" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="2" opacity="0.5"/>
  <!-- Step 3 -->
  <rect x="148" y="240" width="55" height="20" rx="3" fill="#A855F7" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="2" opacity="0.5"/>
  <!-- Step 4 -->
  <rect x="198" y="200" width="55" height="20" rx="3" fill="#A855F7" fill-opacity="0.14" stroke="#2E2D2D" stroke-width="2" opacity="0.5"/>
  <!-- Step 5 -->
  <rect x="248" y="155" width="55" height="20" rx="3" fill="#C026D3" fill-opacity="0.14" stroke="#2E2D2D" stroke-width="2" opacity="0.5"/>
  <!-- Vertical fills connecting stairs -->
  <rect x="98" y="295" width="55" height="10" rx="0" fill="#7C3AED" fill-opacity="0.05"/>
  <rect x="148" y="260" width="55" height="15" rx="0" fill="#A855F7" fill-opacity="0.05"/>
  <rect x="198" y="220" width="55" height="20" rx="0" fill="#A855F7" fill-opacity="0.05"/>
  <rect x="248" y="175" width="55" height="25" rx="0" fill="#C026D3" fill-opacity="0.05"/>
  <!-- Area fill under the line -->
  <path d="M60 310 L120 275 L175 238 L225 198 L275 153 L325 95 L325 340 L60 340 Z" fill="#7C3AED" fill-opacity="0.06"/>
  <!-- Shadow of the ascending line -->
  <polyline points="63,313 123,278 178,241 228,201 278,156 328,98" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.08"/>
  <!-- Main ascending line -->
  <polyline points="60,310 120,275 175,238 225,198 275,153 325,95" stroke="#2E2D2D" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points on the line -->
  <circle cx="60" cy="310" r="5" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="120" cy="275" r="5" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="175" cy="238" r="5" fill="#A855F7" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="225" cy="198" r="5" fill="#A855F7" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="275" cy="153" r="5" fill="#C026D3" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Rocket at peak -->
  <!-- Rocket body shadow -->
  <path d="M328 98 L318 70 Q325 55 332 70 L342 98" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Rocket body -->
  <path d="M318 95 Q315 72 325 48 Q335 72 332 95 Z" fill="#C026D3" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="3"/>
  <!-- Rocket window -->
  <circle cx="325" cy="72" r="6" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.2"/>
  <!-- Rocket fins -->
  <path d="M318 90 L308 100 L318 95" fill="#A855F7" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="2"/>
  <path d="M332 90 L342 100 L332 95" fill="#A855F7" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Rocket flame -->
  <path d="M320 95 Q325 110 330 95 Q325 105 320 95" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Sparkle at the top -->
  <!-- Sparkle lines -->
  <line x1="325" y1="30" x2="325" y2="20" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="315" y1="35" x2="310" y2="28" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="335" y1="35" x2="340" y2="28" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="345" y1="45" x2="352" y2="40" stroke="#C026D3" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="305" y1="45" x2="298" y2="40" stroke="#C026D3" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Sparkle star -->
  <circle cx="325" cy="25" r="2.5" fill="#7C3AED" opacity="0.4"/>
  <circle cx="348" cy="38" r="1.5" fill="#A855F7" opacity="0.3"/>
  <circle cx="302" cy="38" r="1.5" fill="#A855F7" opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="40" cy="350" r="3" fill="#7C3AED" opacity="0.2"/>
  <circle cx="55" cy="360" r="2" fill="#A855F7" opacity="0.15"/>
  <circle cx="370" cy="310" r="2.5" fill="#C026D3" opacity="0.2"/>
  <!-- Small decorative lines -->
  <line x1="355" y1="180" x2="375" y2="180" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="360" y1="188" x2="372" y2="188" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <line x1="25" y1="270" x2="38" y2="270" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Percentage badge -->
  <rect x="345" y="110" width="40" height="20" rx="4" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.12" opacity="0.5"/>
  <line x1="352" y1="120" x2="377" y2="120" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
