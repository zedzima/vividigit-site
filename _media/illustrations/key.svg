<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === KEY: Large key with shield lock, hand turning === -->

  <ellipse cx="203" cy="358" rx="110" ry="13" fill="#000" opacity="0.06"/>

  <!-- Key ring shadow -->
  <circle cx="133" cy="183" r="62" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Key ring -->
  <circle cx="130" cy="180" r="62" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Key ring inner hole -->
  <circle cx="130" cy="180" r="28" stroke="#2E2D2D" stroke-width="2.5" fill="white" fill-opacity="0.4"/>

  <!-- Key shaft shadow -->
  <rect x="188" y="163" width="140" height="34" rx="8" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Key shaft -->
  <rect x="185" y="160" width="140" height="34" rx="8" stroke="#2E2D2D" stroke-width="3.5" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Shaft groove -->
  <line x1="200" y1="177" x2="290" y2="177" stroke="#2E2D2D" stroke-width="2" opacity="0.15"/>

  <!-- Key teeth -->
  <path d="M305 160 L340 160 L340 172 L328 172 L328 194 L312 194 L312 177 L305 177 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>

  <!-- Shield/lock (top right) -->
  <path d="M300 72 L340 85 V115 C340 140 315 158 300 165 C285 158 260 140 260 115 V85 Z" fill="#000" opacity="0.07" transform="translate(2,2)"/>
  <path d="M298 70 L338 83 V113 C338 138 313 156 298 163 C283 156 258 138 258 113 V83 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Lock checkmark -->
  <polyline points="284,113 294,124 314,100" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Hand turning key -->
  <path d="M95,310 C85,295 77,285 70,280 C63,275 58,280 62,288 L65,295 C55,288 50,296 58,302 C48,298 45,306 53,310 C43,308 42,316 52,320 L82,335 C98,345 110,340 120,330 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Finger gripping ring -->
  <path d="M120 330 Q125 310 128 290" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Access card (bottom right) -->
  <rect x="300" y="275" width="60" height="40" rx="6" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.08"/>
  <circle cx="315" cy="290" r="5" fill="#A855F7" opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="326" y1="290" x2="348" y2="290" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="326" y1="300" x2="342" y2="300" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>

  <circle cx="45" cy="110" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="370" cy="200" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="200" cy="340" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="340" y1="350" x2="360" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="35" y1="230" x2="50" y2="230" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
