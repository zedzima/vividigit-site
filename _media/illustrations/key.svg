<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === KEY: Large key with "word" text badge === -->

  <!-- Shadow under key -->
  <ellipse cx="203" cy="355" rx="110" ry="12" fill="#000" opacity="0.06"/>

  <!-- Key head (circle) shadow -->
  <circle cx="143" cy="163" r="68" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Key head -->
  <circle cx="140" cy="160" r="68" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Key head inner circle -->
  <circle cx="140" cy="160" r="38" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Keyhole shape -->
  <circle cx="140" cy="150" r="12" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <rect x="134" y="150" width="12" height="25" rx="2" fill="#C026D3" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="2"/>

  <!-- Key shaft shadow -->
  <rect x="208" y="153" width="150" height="18" rx="4" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Key shaft -->
  <rect x="205" y="150" width="150" height="18" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Shaft groove -->
  <line x1="220" y1="159" x2="340" y2="159" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>

  <!-- Key teeth -->
  <path d="M355 150 L355 135 L340 135 L340 150" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.10"/>
  <path d="M340 168 L340 183 L325 183 L325 168" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.10"/>
  <path d="M325 150 L325 140 L315 140 L315 150" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.08"/>

  <!-- "word" text badge (bottom center) -->
  <rect x="150" y="262" width="100" height="38" rx="8" fill="#000" opacity="0.07" transform="translate(2,2)"/>
  <rect x="148" y="260" width="100" height="38" rx="8" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <text x="198" y="285" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#2E2D2D" opacity="0.5">word</text>

  <!-- Dotted line connecting key to badge -->
  <line x1="198" y1="230" x2="198" y2="258" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.25"/>

  <!-- Lock icon (top right, decorative) -->
  <rect x="320" y="65" width="30" height="24" rx="4" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.08"/>
  <path d="M327 65 L327 55 Q327 45 335 45 Q343 45 343 55 L343 65" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="335" cy="77" r="2.5" fill="#2E2D2D" opacity="0.25"/>

  <!-- Decorative dots -->
  <circle cx="50" cy="80" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="375" cy="200" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="55" cy="320" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="340" y1="340" x2="360" y2="340" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="25" y1="240" x2="42" y2="240" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
