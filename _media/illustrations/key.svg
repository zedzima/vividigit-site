<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Ring shadow -->
  <circle cx="123" cy="213" r="56" fill="#000" opacity="0.08"/>
  <!-- Ring -->
  <circle cx="120" cy="210" r="56" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <circle cx="120" cy="210" r="24" stroke="#2E2D2D" stroke-width="2.5" fill="white" fill-opacity="0.34"/>

  <!-- Shaft shadow -->
  <rect x="170" y="193" width="126" height="34" rx="12" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Shaft -->
  <rect x="167" y="190" width="126" height="34" rx="12" stroke="#2E2D2D" stroke-width="3.5" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Teeth -->
  <path d="M293 190 H330 V206 H316 V224 H296 V210 H280 V238 H260 V224 H244 V190 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <line x1="190" y1="207" x2="272" y2="207" stroke="#2E2D2D" stroke-width="2" opacity="0.14"/>

  <!-- Security badge -->
  <path d="M278 264 L322 278 V316 C322 344 294 364 278 372 C262 364 234 344 234 316 V278 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.1" stroke-linejoin="round"/>
  <path d="M264 316 L276 328 L298 302" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Access card -->
  <rect x="46" y="94" width="74" height="50" rx="8" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.08" transform="rotate(-8 83 119)"/>
  <circle cx="66" cy="116" r="6" fill="#7C3AED" opacity="0.24"/>
  <line x1="80" y1="114" x2="110" y2="114" stroke="#2E2D2D" stroke-width="1.8" stroke-linecap="round" opacity="0.2" transform="rotate(-8 95 114)"/>
  <line x1="80" y1="126" x2="104" y2="126" stroke="#2E2D2D" stroke-width="1.8" stroke-linecap="round" opacity="0.16" transform="rotate(-8 92 126)"/>

  <!-- Word chip -->
  <rect x="152" y="96" width="90" height="34" rx="10" stroke="#2E2D2D" stroke-width="2.2" fill="white" fill-opacity="0.34"/>
  <text x="197" y="118" text-anchor="middle" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#2E2D2D">word</text>

  <!-- Decorative accents -->
  <circle cx="50" cy="202" r="3" fill="#7C3AED" opacity="0.24"/>
  <circle cx="350" cy="176" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="220" cy="350" r="2.5" fill="#C026D3" opacity="0.2"/>
  <line x1="304" y1="354" x2="330" y2="354" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
