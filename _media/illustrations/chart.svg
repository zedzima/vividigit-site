<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === CHART: Bar chart with trend line, hand drawing === -->

  <ellipse cx="203" cy="358" rx="120" ry="14" fill="#000" opacity="0.06"/>

  <!-- Chart bg shadow -->
  <rect x="63" y="63" width="260" height="255" rx="10" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <rect x="60" y="60" width="260" height="255" rx="10" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.08"/>

  <!-- Axes -->
  <line x1="95" y1="280" x2="295" y2="280" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="95" y1="90" x2="95" y2="280" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="95" y1="220" x2="295" y2="220" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <line x1="95" y1="160" x2="295" y2="160" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>

  <!-- Bars -->
  <rect x="115" y="230" width="30" height="50" rx="3" fill="#C026D3" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="160" y="190" width="30" height="90" rx="3" fill="#A855F7" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="205" y="150" width="30" height="130" rx="3" fill="#7C3AED" fill-opacity="0.20" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="250" y="110" width="30" height="170" rx="3" fill="#7C3AED" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="2.5"/>

  <!-- Trend line -->
  <polyline points="130,222 175,180 220,142 265,102" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="130,222 175,180 220,142 265,102" stroke="#7C3AED" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>
  <circle cx="130" cy="222" r="5" fill="#C026D3" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="175" cy="180" r="5" fill="#A855F7" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="220" cy="142" r="5" fill="#7C3AED" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="265" cy="102" r="5" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>

  <!-- Arrow at trend peak -->
  <path d="M265 102 L278 88" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M272 96 L280 86 L268 90" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hand drawing the line -->
  <path d="M305,335 C315,320 327,310 335,305 C343,300 349,305 345,313 L340,320 C350,313 355,321 347,327 C357,323 360,331 352,335 C362,333 363,341 353,345 L323,360 C307,370 295,365 285,355 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <line x1="285" y1="355" x2="268" y2="108" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="268,108 264,118 272,116" fill="#A855F7" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>

  <circle cx="40" cy="130" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="340" cy="60" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="45" cy="310" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="330" y1="378" x2="350" y2="378" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="30" y1="240" x2="45" y2="240" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
