<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === MAIL: Open envelope with letter and hand === -->

  <!-- Shadow of envelope body -->
  <path d="M63 193 L63 323 L343 323 L343 193 Z" fill="#000" opacity="0.08" transform="translate(3,4)"/>
  <!-- Envelope body -->
  <rect x="60" y="190" width="280" height="130" rx="6" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Envelope flap (open, folded back) -->
  <path d="M60 190 L200 100 L340 190" stroke="#2E2D2D" stroke-width="3.5" fill="#A855F7" fill-opacity="0.10"/>
  <!-- Inner V-fold lines -->
  <path d="M60 190 L200 270 L340 190" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Shadow of letter -->
  <rect x="118" y="103" width="170" height="125" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Letter being pulled out -->
  <rect x="115" y="100" width="170" height="125" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.10"/>
  <!-- Letter text lines -->
  <line x1="135" y1="125" x2="255" y2="125" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="135" y1="142" x2="240" y2="142" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="135" y1="158" x2="250" y2="158" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="135" y1="174" x2="220" y2="174" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="135" y1="190" x2="200" y2="190" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- @ symbol (floating) -->
  <circle cx="55" cy="130" r="18" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.12"/>
  <path d="M55 140 Q42 140 42 130 Q42 118 55 118 Q65 118 65 128 Q65 135 58 135 Q53 135 55 128" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Notification bell (top right) -->
  <path d="M335 75 Q335 55 350 55 Q365 55 365 75 L368 88 L332 88 Z" fill="#000" opacity="0.08" transform="translate(2,2)"/>
  <path d="M333 73 Q333 53 348 53 Q363 53 363 73 L366 86 L330 86 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.14"/>
  <!-- Bell clapper -->
  <circle cx="348" cy="92" r="4" fill="#2E2D2D" opacity="0.4"/>
  <!-- Bell ring arc -->
  <path d="M340 48 Q348 42 356 48" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Paper airplane 1 (flying, top left) -->
  <path d="M48 58 L88 72 L68 82 Z" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <line x1="68" y1="82" x2="72" y2="68" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <!-- Motion trail -->
  <line x1="38" y1="65" x2="28" y2="68" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="42" y1="72" x2="30" y2="77" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>

  <!-- Paper airplane 2 (smaller, bottom right) -->
  <path d="M328 340 L358 350 L345 358 Z" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.10"/>
  <line x1="345" y1="358" x2="348" y2="348" stroke="#2E2D2D" stroke-width="1" opacity="0.25"/>

  <!-- Envelope seal/stamp hint -->
  <circle cx="200" cy="280" r="12" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10" opacity="0.4"/>
  <path d="M195 280 L200 275 L205 280 L200 285 Z" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Decorative dots -->
  <circle cx="380" cy="175" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="30" cy="260" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="310" cy="370" r="2" fill="#C026D3" opacity="0.22"/>
  <circle cx="100" cy="45" r="2.5" fill="#7C3AED" opacity="0.28"/>
  <circle cx="25" cy="340" r="2" fill="#A855F7" opacity="0.2"/>

  <!-- Decorative small lines -->
  <line x1="350" y1="290" x2="372" y2="290" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="20" y1="195" x2="40" y2="195" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="140" y1="370" x2="162" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>
