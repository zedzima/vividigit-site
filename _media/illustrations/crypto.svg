<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === CRYPTO: Large coin with binary code (1s and 0s) stream === -->

  <!-- Shadow under coin -->
  <ellipse cx="203" cy="330" rx="95" ry="22" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Coin platform -->
  <ellipse cx="200" cy="328" rx="95" ry="22" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.10"/>
  <!-- Coin side -->
  <path d="M105 328 L105 305 Q105 285 200 285 Q295 285 295 305 L295 328" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Coin top -->
  <ellipse cx="200" cy="305" rx="95" ry="22" stroke="#2E2D2D" stroke-width="3" fill="white" fill-opacity="0.3"/>
  <!-- Coin top shadow -->
  <ellipse cx="200" cy="285" rx="80" ry="18" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.12"/>

  <!-- Binary symbol on coin -->
  <text x="200" y="292" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#2E2D2D" opacity="0.45">₿</text>

  <!-- Binary stream (left side, flowing down) -->
  <text x="55" y="90" font-family="monospace" font-size="14" fill="#7C3AED" opacity="0.35">1 0 1</text>
  <text x="50" y="115" font-family="monospace" font-size="14" fill="#7C3AED" opacity="0.30">0 1 1 0</text>
  <text x="58" y="140" font-family="monospace" font-size="14" fill="#A855F7" opacity="0.25">1 1 0</text>
  <text x="45" y="165" font-family="monospace" font-size="14" fill="#A855F7" opacity="0.20">0 0 1 1</text>
  <text x="55" y="190" font-family="monospace" font-size="14" fill="#C026D3" opacity="0.15">1 0 1</text>

  <!-- Binary stream (right side, flowing down) -->
  <text x="310" y="100" font-family="monospace" font-size="14" fill="#7C3AED" opacity="0.35">0 1 0</text>
  <text x="315" y="125" font-family="monospace" font-size="14" fill="#7C3AED" opacity="0.30">1 0 0 1</text>
  <text x="308" y="150" font-family="monospace" font-size="14" fill="#A855F7" opacity="0.25">0 1 1</text>
  <text x="320" y="175" font-family="monospace" font-size="14" fill="#A855F7" opacity="0.20">1 1 0</text>
  <text x="310" y="200" font-family="monospace" font-size="14" fill="#C026D3" opacity="0.15">0 1 0</text>

  <!-- Blockchain chain links (small, between streams and coin) -->
  <rect x="155" y="105" width="20" height="14" rx="4" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.10"/>
  <rect x="180" y="125" width="20" height="14" rx="4" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.10"/>
  <rect x="205" y="145" width="20" height="14" rx="4" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.10"/>
  <!-- Chain connections -->
  <line x1="175" y1="112" x2="180" y2="125" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <line x1="200" y1="132" x2="205" y2="145" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>

  <!-- Small stacked coins (left) -->
  <ellipse cx="65" cy="280" rx="20" ry="5" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.10"/>
  <ellipse cx="65" cy="273" rx="20" ry="5" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.10"/>
  <path d="M45 273 L45 280" stroke="#2E2D2D" stroke-width="1.5"/>
  <path d="M85 273 L85 280" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Decorative dots -->
  <circle cx="360" cy="65" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="30" cy="230" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="375" cy="280" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="340" y1="350" x2="360" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="25" y1="310" x2="42" y2="310" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
