<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === CRYPTO: Large coin with ₿ symbol, blockchain chain, hand holding coin === -->

  <ellipse cx="203" cy="358" rx="110" ry="13" fill="#000" opacity="0.06"/>

  <!-- Main coin shadow -->
  <circle cx="178" cy="178" r="100" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Main coin outer -->
  <circle cx="175" cy="175" r="100" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Main coin inner ring -->
  <circle cx="175" cy="175" r="72" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.08"/>

  <!-- Bitcoin-style symbol -->
  <line x1="175" y1="118" x2="175" y2="232" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M150 140 H192 Q210 140 210 158 Q210 175 192 175 H150" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  <path d="M150 175 H196 Q215 175 215 193 Q215 210 196 210 H150" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Blockchain chain (right side) -->
  <!-- Block 1 -->
  <rect x="300" y="100" width="50" height="40" rx="6" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.12"/>
  <circle cx="325" cy="120" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.3"/>
  <!-- Block 2 -->
  <rect x="300" y="170" width="50" height="40" rx="6" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="325" cy="190" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.3"/>
  <!-- Block 3 -->
  <rect x="300" y="240" width="50" height="40" rx="6" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.12"/>
  <circle cx="325" cy="260" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.3"/>
  <!-- Chain links between blocks -->
  <line x1="325" y1="140" x2="325" y2="170" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="325" y1="210" x2="325" y2="240" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Hand holding coin (bottom) -->
  <path d="M130,320 C120,305 112,295 105,290 C98,285 93,290 97,298 L100,305 C90,298 85,306 93,312 C83,308 80,316 88,320 C78,318 77,326 87,330 L117,345 C133,355 145,350 155,340 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <path d="M155 340 Q160 325 162 305" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Candlestick mini chart (bottom right) -->
  <line x1="310" y1="310" x2="310" y2="340" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="304" y="318" width="12" height="12" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.15"/>
  <line x1="330" y1="305" x2="330" y2="340" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="324" y="310" width="12" height="18" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.15"/>
  <line x1="350" y1="315" x2="350" y2="340" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="344" y="320" width="12" height="10" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.12"/>

  <circle cx="50" cy="130" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="370" cy="80" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="55" cy="290" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="40" y1="210" x2="55" y2="210" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
