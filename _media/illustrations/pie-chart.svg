<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Shadow under chart -->
  <ellipse cx="203" cy="345" rx="110" ry="14" fill="#000" opacity="0.06"/>
  <!-- Chart base shadow -->
  <circle cx="193" cy="193" r="120" fill="#000" opacity="0.07"/>
  <!-- Pie chart circle -->
  <circle cx="190" cy="190" r="120" fill="white" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="3"/>
  <!-- Segment 1: large purple (40%) -->
  <path d="M190,190 L190,70 A120,120 0 0,1 296,126 Z" fill="#7C3AED" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Segment 2: medium magenta (25%) -->
  <path d="M190,190 L296,126 A120,120 0 0,1 310,230 Z" fill="#C026D3" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Segment 3: small accent (15%) -->
  <path d="M190,190 L310,230 A120,120 0 0,1 220,305 Z" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Segment 4: remainder (20%) -->
  <path d="M190,190 L220,305 A120,120 0 0,1 190,70 Z" fill="#7C3AED" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Center white circle -->
  <circle cx="190" cy="190" r="40" fill="white" fill-opacity="0.7" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Center percentage -->
  <text x="172" y="196" font-family="sans-serif" font-size="20" font-weight="bold" fill="#7C3AED">40%</text>
  <!-- Pulled-out segment indicator -->
  <line x1="240" y1="140" x2="300" y2="95" stroke="#2E2D2D" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="95" r="3" fill="#7C3AED" opacity="0.5"/>
  <!-- Legend items -->
  <rect x="320" y="85" width="12" height="12" rx="2" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1"/>
  <line x1="338" y1="91" x2="378" y2="91" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <rect x="320" y="108" width="12" height="12" rx="2" fill="#C026D3" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="1"/>
  <line x1="338" y1="114" x2="370" y2="114" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <rect x="320" y="131" width="12" height="12" rx="2" fill="#A855F7" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1"/>
  <line x1="338" y1="137" x2="365" y2="137" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <!-- Hand with pen pointing at chart -->
  <path d="M80,330 C70,310 60,300 55,290 C50,280 55,272 65,277 L70,282 C65,270 73,264 80,270 C77,260 85,256 90,264 C89,254 97,252 100,262 L105,290 C107,310 100,325 93,338 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Pen in hand -->
  <line x1="100" y1="262" x2="145" y2="215" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <polygon points="145,215 140,225 150,222" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Decorative dots -->
  <circle cx="50" cy="120" r="3" fill="#7C3AED" opacity="0.25"/>
  <circle cx="35" cy="200" r="2" fill="#A855F7" opacity="0.2"/>
  <circle cx="370" cy="280" r="2.5" fill="#C026D3" opacity="0.2"/>
  <circle cx="340" cy="340" r="2" fill="#7C3AED" opacity="0.15"/>
  <!-- Small trend arrow -->
  <path d="M330,175 L350,160 L345,170 L360,165" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
</svg>