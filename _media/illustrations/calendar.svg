<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Shadow -->
  <ellipse cx="203" cy="358" rx="115" ry="14" fill="#000" opacity="0.06"/>
  <!-- Calendar body shadow -->
  <rect x="63" y="93" width="260" height="250" rx="16" fill="#000" opacity="0.07"/>
  <!-- Calendar body -->
  <rect x="60" y="90" width="260" height="250" rx="16" fill="white" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="3"/>
  <!-- Calendar header -->
  <rect x="60" y="90" width="260" height="60" rx="16" fill="#7C3AED" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="3"/>
  <rect x="60" y="130" width="260" height="20" fill="#7C3AED" fill-opacity="0.15"/>
  <!-- Binding rings -->
  <rect x="120" y="78" width="16" height="28" rx="6" fill="white" fill-opacity="0.6" stroke="#2E2D2D" stroke-width="2.5"/>
  <rect x="190" y="78" width="16" height="28" rx="6" fill="white" fill-opacity="0.6" stroke="#2E2D2D" stroke-width="2.5"/>
  <rect x="260" y="78" width="16" height="28" rx="6" fill="white" fill-opacity="0.6" stroke="#2E2D2D" stroke-width="2.5"/>
  <!-- Month title area -->
  <line x1="100" y1="115" x2="180" y2="115" stroke="#2E2D2D" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Navigation arrows -->
  <path d="M245,115 L255,108 L255,122 Z" fill="#2E2D2D" opacity="0.3"/>
  <path d="M285,115 L275,108 L275,122 Z" fill="#2E2D2D" opacity="0.3"/>
  <!-- Day of week headers -->
  <text x="85" y="168" font-family="sans-serif" font-size="10" fill="#2E2D2D" opacity="0.4">M</text>
  <text x="120" y="168" font-family="sans-serif" font-size="10" fill="#2E2D2D" opacity="0.4">T</text>
  <text x="155" y="168" font-family="sans-serif" font-size="10" fill="#2E2D2D" opacity="0.4">W</text>
  <text x="190" y="168" font-family="sans-serif" font-size="10" fill="#2E2D2D" opacity="0.4">T</text>
  <text x="225" y="168" font-family="sans-serif" font-size="10" fill="#2E2D2D" opacity="0.4">F</text>
  <text x="258" y="168" font-family="sans-serif" font-size="10" fill="#2E2D2D" opacity="0.4">S</text>
  <text x="290" y="168" font-family="sans-serif" font-size="10" fill="#2E2D2D" opacity="0.4">S</text>
  <!-- Grid separator -->
  <line x1="75" y1="175" x2="305" y2="175" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <!-- Week 1 -->
  <text x="88" y="198" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.3">1</text>
  <text x="122" y="198" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.3">2</text>
  <text x="157" y="198" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.3">3</text>
  <text x="192" y="198" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.3">4</text>
  <text x="227" y="198" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.3">5</text>
  <text x="260" y="198" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.2">6</text>
  <text x="292" y="198" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.2">7</text>
  <!-- Week 2 -->
  <text x="86" y="228" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.3">8</text>
  <text x="122" y="228" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.3">9</text>
  <!-- Highlighted date (10th) -->
  <circle cx="162" cy="224" r="14" fill="#7C3AED" fill-opacity="0.25" stroke="#7C3AED" stroke-width="2"/>
  <text x="155" y="228" font-family="sans-serif" font-size="13" font-weight="bold" fill="#7C3AED">10</text>
  <text x="188" y="228" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.3">11</text>
  <!-- Range highlight (12-14) -->
  <rect x="218" y="213" width="95" height="22" rx="11" fill="#C026D3" fill-opacity="0.1"/>
  <text x="225" y="228" font-family="sans-serif" font-size="13" fill="#C026D3" opacity="0.6">12</text>
  <text x="258" y="228" font-family="sans-serif" font-size="13" fill="#C026D3" opacity="0.6">13</text>
  <text x="290" y="228" font-family="sans-serif" font-size="13" fill="#C026D3" opacity="0.6">14</text>
  <!-- Week 3 (partial, fade out) -->
  <text x="84" y="258" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.2">15</text>
  <text x="118" y="258" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.2">16</text>
  <text x="153" y="258" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.2">17</text>
  <text x="188" y="258" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.15">18</text>
  <text x="223" y="258" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.15">19</text>
  <!-- Week 4 (very faded) -->
  <text x="84" y="288" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.12">22</text>
  <text x="118" y="288" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.12">23</text>
  <text x="153" y="288" font-family="sans-serif" font-size="13" fill="#2E2D2D" opacity="0.12">24</text>
  <!-- Checkmark on a date -->
  <path d="M85,252 L89,257 L97,247" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Bell notification -->
  <path d="M340,80 C340,70 348,64 355,64 C362,64 370,70 370,80 L372,90 L338,90 Z" fill="#C026D3" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="355" cy="96" r="3" fill="#2E2D2D" opacity="0.3"/>
  <circle cx="370" cy="70" r="5" fill="#7C3AED" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Decorative dots -->
  <circle cx="40" cy="120" r="3" fill="#7C3AED" opacity="0.25"/>
  <circle cx="35" cy="300" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="360" cy="250" r="2" fill="#C026D3" opacity="0.15"/>
  <!-- Clock mini icon -->
  <circle cx="50" cy="220" r="10" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.08"/>
  <line x1="50" y1="220" x2="50" y2="214" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <line x1="50" y1="220" x2="55" y2="222" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
</svg>