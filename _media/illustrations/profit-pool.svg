<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Pie chart with highlighted segment = your share of profit -->

  <!-- Full circle (company profit) -->
  <circle cx="200" cy="195" r="90" fill="#7C3AED" fill-opacity="0.06" stroke="#2E2D2D" stroke-width="2.5"/>

  <!-- 20% segment highlighted -->
  <path d="M200 195 L200 105 A90 90 0 0 1 285 155 Z" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Inner dashed circle -->
  <circle cx="200" cy="195" r="55" fill="none" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Percentage label on segment -->
  <rect x="230" y="128" width="36" height="20" rx="4" fill="#C026D3" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <text x="248" y="142" font-family="monospace" font-size="11" fill="#2E2D2D" text-anchor="middle" opacity="0.7">20%</text>

  <!-- People dots around the chart (team distribution) -->
  <circle cx="200" cy="310" r="6" fill="#7C3AED" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="225" cy="305" r="6" fill="#A855F7" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="175" cy="305" r="6" fill="#A855F7" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="248" cy="295" r="5" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="152" cy="295" r="5" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Lines connecting dots to chart -->
  <line x1="200" y1="285" x2="200" y2="304" stroke="#2E2D2D" stroke-width="1" opacity="0.2"/>
  <line x1="220" y1="280" x2="225" y2="299" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <line x1="180" y1="280" x2="175" y2="299" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>

  <!-- Decorative elements -->
  <circle cx="55" cy="130" r="3" fill="#7C3AED" opacity="0.2"/>
  <circle cx="350" cy="100" r="2" fill="#A855F7" opacity="0.15"/>
  <circle cx="65" cy="290" r="2.5" fill="#C026D3" opacity="0.2"/>
  <line x1="330" y1="300" x2="350" y2="300" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <line x1="45" y1="220" x2="60" y2="220" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
</svg>
