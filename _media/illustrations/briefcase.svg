<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Briefcase body shadow -->
  <rect x="63" y="153" width="260" height="170" rx="10" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Briefcase body -->
  <rect x="60" y="150" width="260" height="170" rx="10" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Briefcase top flap (open, tilted back) -->
  <path d="M60 155 L55 85 Q55 75 65 75 L315 75 Q325 75 325 85 L320 155" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.10"/>
  <!-- Briefcase handle base -->
  <rect x="155" y="68" width="70" height="12" rx="3" stroke="#2E2D2D" stroke-width="3" fill="none"/>
  <!-- Briefcase handle -->
  <path d="M165 68 Q165 48 190 48 Q215 48 215 68" stroke="#2E2D2D" stroke-width="3.5" fill="none"/>
  <!-- Briefcase clasp -->
  <rect x="178" y="145" width="24" height="16" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.18"/>
  <circle cx="190" cy="153" r="3" fill="#2E2D2D" opacity="0.4"/>
  <!-- Briefcase middle divider -->
  <line x1="190" y1="170" x2="190" y2="305" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <!-- Document 1 peeking from briefcase -->
  <rect x="80" y="105" width="65" height="55" rx="3" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="77" y="102" width="65" height="55" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <line x1="87" y1="115" x2="128" y2="115" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="87" y1="124" x2="122" y2="124" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="87" y1="133" x2="115" y2="133" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="87" y1="142" x2="108" y2="142" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Laptop peeking from briefcase -->
  <rect x="218" y="95" width="75" height="52" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="215" y="92" width="75" height="52" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Laptop screen -->
  <rect x="222" y="98" width="61" height="36" rx="2" fill="#2E2D2D" opacity="0.08"/>
  <!-- Laptop screen content lines -->
  <line x1="230" y1="108" x2="270" y2="108" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="230" y1="116" x2="260" y2="116" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="230" y1="124" x2="255" y2="124" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Laptop keyboard indicator -->
  <line x1="235" y1="140" x2="268" y2="140" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Business card floating top-left -->
  <rect x="40" y="35" width="62" height="38" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="37" y="32" width="62" height="38" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.14"/>
  <circle cx="52" cy="46" r="6" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <line x1="64" y1="42" x2="90" y2="42" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="64" y1="50" x2="85" y2="50" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="45" y1="60" x2="78" y2="60" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
  <!-- Pen floating right -->
  <line x1="348" y1="100" x2="365" y2="180" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M365 180 L368 192 L362 192 Z" fill="#2E2D2D" opacity="0.7"/>
  <line x1="348" y1="100" x2="350" y2="108" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Pen clip -->
  <line x1="350" y1="100" x2="353" y2="120" stroke="#2E2D2D" stroke-width="1.5" opacity="0.5"/>
  <!-- Professional badge bottom-right -->
  <rect x="305" y="265" width="55" height="68" rx="5" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="302" y="262" width="55" height="68" rx="5" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Badge photo area -->
  <circle cx="330" cy="282" r="12" stroke="#2E2D2D" stroke-width="1.5" fill="#2E2D2D" opacity="0.1"/>
  <!-- Badge head silhouette -->
  <circle cx="330" cy="278" r="5" fill="#2E2D2D" opacity="0.2"/>
  <path d="M322 288 Q326 284 330 283 Q334 284 338 288" fill="#2E2D2D" opacity="0.15"/>
  <!-- Badge text lines -->
  <line x1="312" y1="302" x2="348" y2="302" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="318" y1="310" x2="342" y2="310" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="322" y1="318" x2="338" y2="318" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Badge lanyard -->
  <path d="M320 262 Q310 250 320 240 Q330 232 340 240 Q350 250 340 262" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Decorative dots -->
  <circle cx="350" cy="50" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="375" cy="230" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="25" cy="280" r="2.5" fill="#C026D3" opacity="0.28"/>
  <circle cx="370" cy="350" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="330" y1="350" x2="350" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="25" y1="340" x2="45" y2="340" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
