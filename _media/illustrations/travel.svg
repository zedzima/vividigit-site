<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Suitcase shadow -->
  <rect x="103" y="163" width="170" height="150" rx="12" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Suitcase body -->
  <rect x="100" y="160" width="170" height="150" rx="12" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Suitcase handle top -->
  <path d="M160 160 L160 145 Q160 135 170 135 L200 135 Q210 135 210 145 L210 160" stroke="#2E2D2D" stroke-width="3.5" fill="none"/>
  <!-- Suitcase belt -->
  <line x1="100" y1="235" x2="270" y2="235" stroke="#2E2D2D" stroke-width="3"/>
  <!-- Belt buckle -->
  <rect x="172" y="228" width="26" height="14" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.15"/>
  <!-- Suitcase lock -->
  <circle cx="145" cy="235" r="5" stroke="#2E2D2D" stroke-width="1.5" fill="#2E2D2D" opacity="0.3"/>
  <circle cx="225" cy="235" r="5" stroke="#2E2D2D" stroke-width="1.5" fill="#2E2D2D" opacity="0.3"/>
  <!-- Travel sticker 1 (circle) -->
  <circle cx="135" cy="195" r="14" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.18"/>
  <line x1="128" y1="195" x2="142" y2="195" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <line x1="135" y1="188" x2="135" y2="202" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <!-- Travel sticker 2 (rectangle) -->
  <rect x="165" y="182" width="30" height="20" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.15"/>
  <line x1="170" y1="190" x2="190" y2="190" stroke="#2E2D2D" stroke-width="1" opacity="0.25"/>
  <line x1="170" y1="196" x2="185" y2="196" stroke="#2E2D2D" stroke-width="1" opacity="0.2"/>
  <!-- Travel sticker 3 (star shape-ish) -->
  <rect x="215" y="185" width="25" height="18" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.15" transform="rotate(8 228 194)"/>
  <!-- Sticker on lower portion -->
  <circle cx="155" cy="270" r="11" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.12"/>
  <line x1="149" y1="270" x2="161" y2="270" stroke="#2E2D2D" stroke-width="1" opacity="0.3"/>
  <!-- Wheels -->
  <circle cx="128" cy="315" r="7" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" fill-opacity="0.1"/>
  <circle cx="128" cy="315" r="2.5" fill="#2E2D2D" opacity="0.4"/>
  <circle cx="242" cy="315" r="7" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" fill-opacity="0.1"/>
  <circle cx="242" cy="315" r="2.5" fill="#2E2D2D" opacity="0.4"/>
  <!-- Airplane shadow -->
  <path d="M263 53 L343 83 L338 93 L298 83 L303 113 L293 113 L278 88 L263 83 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Airplane -->
  <path d="M260 50 L340 80 L335 90 L295 80 L300 110 L290 110 L275 85 L260 80 Z" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.15"/>
  <!-- Airplane window dots -->
  <circle cx="280" cy="75" r="2" fill="#2E2D2D" opacity="0.3"/>
  <circle cx="290" cy="78" r="2" fill="#2E2D2D" opacity="0.3"/>
  <circle cx="300" cy="81" r="2" fill="#2E2D2D" opacity="0.3"/>
  <!-- Airplane trail -->
  <line x1="255" y1="65" x2="230" y2="58" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15" stroke-dasharray="4 4"/>
  <line x1="252" y1="75" x2="225" y2="68" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.1" stroke-dasharray="3 4"/>
  <!-- Passport shadow -->
  <rect x="303" y="193" width="55" height="72" rx="5" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Passport -->
  <rect x="300" y="190" width="55" height="72" rx="5" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.14"/>
  <!-- Passport emblem -->
  <circle cx="327" cy="218" r="12" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="327" cy="218" r="5" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Passport text -->
  <line x1="312" y1="240" x2="343" y2="240" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="315" y1="248" x2="340" y2="248" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Boarding pass -->
  <rect x="300" y="280" width="65" height="35" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Boarding pass tear line -->
  <line x1="348" y1="283" x2="348" y2="312" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.3"/>
  <!-- Boarding pass lines -->
  <line x1="306" y1="292" x2="338" y2="292" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="306" y1="300" x2="330" y2="300" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Barcode on boarding pass -->
  <line x1="352" y1="290" x2="352" y2="305" stroke="#2E2D2D" stroke-width="1" opacity="0.2"/>
  <line x1="355" y1="290" x2="355" y2="305" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="358" y1="290" x2="358" y2="305" stroke="#2E2D2D" stroke-width="1" opacity="0.2"/>
  <line x1="361" y1="290" x2="361" y2="305" stroke="#2E2D2D" stroke-width="0.8" opacity="0.15"/>
  <!-- Globe -->
  <circle cx="55" cy="90" r="22" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Globe meridians -->
  <ellipse cx="55" cy="90" rx="10" ry="22" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <line x1="33" y1="90" x2="77" y2="90" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <ellipse cx="55" cy="90" rx="22" ry="8" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.12" transform="rotate(0 55 90)"/>
  <!-- Decorative dots -->
  <circle cx="175" cy="45" r="2.5" fill="#7C3AED" opacity="0.3"/>
  <circle cx="370" cy="155" r="2" fill="#C026D3" opacity="0.25"/>
  <circle cx="40" cy="200" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="200" cy="370" r="2" fill="#7C3AED" opacity="0.25"/>
  <!-- Decorative lines -->
  <line x1="45" y1="145" x2="65" y2="145" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="350" y1="135" x2="370" y2="135" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
