<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Shadow for back page -->
  <rect x="138" y="48" width="180" height="240" rx="6" fill="#000" opacity="0.06"/>
  <!-- Back page (slightly visible) -->
  <rect x="135" y="45" width="180" height="240" rx="6" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Depth shadow for front document page -->
  <rect x="98" y="63" width="200" height="280" rx="8" fill="#000" opacity="0.08"/>
  <!-- Front document page -->
  <rect x="95" y="60" width="200" height="280" rx="8" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Page corner fold -->
  <path d="M275 60 L295 60 L295 80" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.06" stroke-linejoin="round"/>
  <!-- Large heading line -->
  <rect x="118" y="82" width="140" height="12" rx="3" fill="#2E2D2D" opacity="0.22"/>
  <!-- Subheading -->
  <rect x="118" y="102" width="100" height="8" rx="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Horizontal rule -->
  <line x1="118" y1="120" x2="270" y2="120" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <!-- Text lines body -->
  <line x1="118" y1="138" x2="270" y2="138" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="118" y1="155" x2="258" y2="155" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="118" y1="172" x2="270" y2="172" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="118" y1="189" x2="240" y2="189" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="118" y1="206" x2="265" y2="206" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="118" y1="223" x2="250" y2="223" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Highlighted text line -->
  <rect x="115" y="237" width="155" height="14" rx="2" fill="#A855F7" fill-opacity="0.12"/>
  <line x1="118" y1="244" x2="265" y2="244" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="118" y1="261" x2="230" y2="261" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="118" y1="278" x2="255" y2="278" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Page number -->
  <text x="190" y="328" font-family="sans-serif" font-size="11" fill="#2E2D2D" opacity="0.3">1</text>
  <!-- Bookmark tab on right edge -->
  <path d="M295 100 L310 100 L310 135 L302 128 L295 135 Z" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.18" stroke-linejoin="round"/>
  <!-- Hand flipping page (top-right) -->
  <path d="M310 75 C320 68 328 60 335 55 C340 52 345 56 342 62 C348 56 352 60 348 68 C354 63 356 68 350 75 L332 92 C326 98 315 96 310 88 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Curled page edge being flipped -->
  <path d="M305 60 Q325 55 335 65 Q345 75 330 85" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.08" stroke-linejoin="round"/>
  <!-- Small magnifier on text -->
  <circle cx="62" cy="230" r="18" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.1"/>
  <line x1="74" y1="244" x2="86" y2="256" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Text lines inside magnifier (zoomed) -->
  <line x1="50" y1="226" x2="72" y2="226" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="50" y1="233" x2="68" y2="233" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Second bookmark (smaller) -->
  <path d="M120 56 L108 56 L108 75 L114 70 L120 75 Z" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.15" stroke-linejoin="round" opacity="0.5"/>
  <!-- Decorative dots -->
  <circle cx="355" cy="160" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="368" cy="180" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="38" cy="140" r="2.5" fill="#C026D3" opacity="0.25"/>
  <circle cx="48" cy="310" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="340" y1="290" x2="360" y2="290" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="345" y1="300" x2="370" y2="300" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Small A icon -->
  <text x="352" y="250" font-family="serif" font-size="18" fill="#7C3AED" opacity="0.2" font-weight="bold">A</text>
  <!-- Reading glasses icon (small, decorative) -->
  <circle cx="340" cy="340" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <circle cx="358" cy="340" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <line x1="348" y1="340" x2="350" y2="340" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2"/>
  <line x1="332" y1="340" x2="326" y2="336" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
</svg>