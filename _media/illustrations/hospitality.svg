<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === HOSPITALITY: Hotel building with bell, key card, welcome mat === -->

  <!-- Shadow under building -->
  <ellipse cx="203" cy="358" rx="130" ry="14" fill="#000" opacity="0.06"/>

  <!-- Building shadow -->
  <rect x="103" y="103" width="200" height="240" rx="6" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Building body -->
  <rect x="100" y="100" width="200" height="240" rx="6" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>

  <!-- Building roof accent -->
  <rect x="100" y="100" width="200" height="25" rx="6" fill="#7C3AED" fill-opacity="0.08"/>
  <line x1="100" y1="125" x2="300" y2="125" stroke="#2E2D2D" stroke-width="2" opacity="0.2"/>

  <!-- Windows row 1 -->
  <rect x="120" y="140" width="30" height="25" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.08"/>
  <rect x="170" y="140" width="30" height="25" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.08"/>
  <rect x="250" y="140" width="30" height="25" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Windows row 2 -->
  <rect x="120" y="185" width="30" height="25" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.06"/>
  <rect x="170" y="185" width="30" height="25" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.06"/>
  <rect x="250" y="185" width="30" height="25" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.06"/>
  <!-- Windows row 3 -->
  <rect x="120" y="230" width="30" height="25" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.05"/>
  <rect x="250" y="230" width="30" height="25" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.05"/>

  <!-- Door -->
  <rect x="175" y="275" width="50" height="65" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="218" cy="310" r="3" fill="#2E2D2D" opacity="0.3"/>
  <!-- Door window -->
  <rect x="183" y="283" width="34" height="20" rx="2" fill="white" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1"/>

  <!-- Bell (top, centered) -->
  <path d="M185 80 Q185 60 200 60 Q215 60 215 80 L218 88 L182 88 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.15"/>
  <line x1="188" y1="88" x2="212" y2="88" stroke="#2E2D2D" stroke-width="2" opacity="0.35"/>
  <circle cx="200" cy="93" r="3" stroke="#2E2D2D" stroke-width="1.5" fill="#2E2D2D" fill-opacity="0.2"/>
  <!-- Bell ring lines -->
  <path d="M175 68 L168 62" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M225 68 L232 62" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Key card (right side, floating) -->
  <rect x="325" y="165" width="42" height="60" rx="5" fill="#000" opacity="0.07" transform="translate(2,2)"/>
  <rect x="323" y="163" width="42" height="60" rx="5" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.12"/>
  <circle cx="344" cy="183" r="5" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.15"/>
  <line x1="333" y1="200" x2="355" y2="200" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="333" y1="208" x2="350" y2="208" stroke="#2E2D2D" stroke-width="1" opacity="0.15" stroke-linecap="round"/>

  <!-- Welcome mat -->
  <rect x="165" y="338" width="70" height="12" rx="2" fill="#7C3AED" fill-opacity="0.10" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="175" y1="344" x2="225" y2="344" stroke="#2E2D2D" stroke-width="1" opacity="0.15" stroke-linecap="round"/>

  <!-- Star ratings (top right, decorative) -->
  <circle cx="345" cy="90" r="4" fill="#7C3AED" opacity="0.3"/>
  <circle cx="358" cy="90" r="4" fill="#7C3AED" opacity="0.3"/>
  <circle cx="371" cy="90" r="4" fill="#7C3AED" opacity="0.3"/>
  <circle cx="345" cy="90" r="2" fill="#7C3AED" opacity="0.15"/>
  <circle cx="358" cy="90" r="2" fill="#7C3AED" opacity="0.15"/>
  <circle cx="371" cy="90" r="2" fill="#7C3AED" opacity="0.15"/>

  <!-- Decorative dots -->
  <circle cx="40" cy="120" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="50" cy="300" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="370" cy="300" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="30" y1="200" x2="48" y2="200" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="355" y1="350" x2="375" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
