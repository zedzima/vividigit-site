<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === HOSPITALITY: Hotel/building with bell, key card, hand ringing bell === -->

  <ellipse cx="203" cy="358" rx="120" ry="14" fill="#000" opacity="0.06"/>

  <!-- Building shadow -->
  <rect x="103" y="103" width="180" height="230" rx="8" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Building -->
  <rect x="100" y="100" width="180" height="230" rx="8" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>

  <!-- Roof/sign -->
  <rect x="120" y="80" width="140" height="28" rx="6" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.12"/>
  <line x1="145" y1="94" x2="235" y2="94" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Windows row 1 -->
  <rect x="120" y="125" width="30" height="35" rx="4" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <rect x="165" y="125" width="30" height="35" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10"/>
  <rect x="210" y="125" width="30" height="35" rx="4" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <!-- Window cross bars -->
  <line x1="135" y1="125" x2="135" y2="160" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <line x1="120" y1="142" x2="150" y2="142" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <line x1="225" y1="125" x2="225" y2="160" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <line x1="210" y1="142" x2="240" y2="142" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>

  <!-- Windows row 2 -->
  <rect x="120" y="180" width="30" height="35" rx="4" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <rect x="165" y="180" width="30" height="35" rx="4" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <rect x="210" y="180" width="30" height="35" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.10"/>

  <!-- Door -->
  <rect x="160" y="260" width="50" height="70" rx="5" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="200" cy="295" r="3" fill="#2E2D2D" opacity="0.3"/>
  <!-- Door arch -->
  <path d="M160 265 Q185 245 210 265" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Service bell (top right) -->
  <ellipse cx="325" cy="178" rx="35" ry="12" fill="#000" opacity="0.07" transform="translate(2,2)"/>
  <ellipse cx="323" cy="176" rx="35" ry="12" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Bell dome -->
  <path d="M293 176 Q293 138 323 130 Q353 138 353 176" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Bell button -->
  <circle cx="323" cy="128" r="6" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.2"/>

  <!-- Hand ringing bell -->
  <path d="M340,105 Q348,98 355,100 Q360,105 356,112 L348,120 Q342,115 338,118 Q332,108 340,105 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Index finger pressing -->
  <path d="M340 105 L330 98" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Key card (bottom left) -->
  <rect x="38" y="260" width="45" height="70" rx="5" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.10"/>
  <circle cx="60" cy="280" r="6" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.15"/>
  <line x1="48" y1="300" x2="72" y2="300" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="48" y1="310" x2="66" y2="310" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>

  <circle cx="50" cy="120" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="370" cy="260" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="330" cy="340" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="340" y1="370" x2="360" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
