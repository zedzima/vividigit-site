<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Cart body shadow -->
  <path d="M83 173 L103 303 L303 303 L323 173 Z" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Cart body -->
  <path d="M80 170 L100 300 L300 300 L320 170 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Cart rim -->
  <line x1="65" y1="170" x2="335" y2="170" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round"/>
  <!-- Cart handle bar -->
  <path d="M65 170 L45 130 L30 130" stroke="#2E2D2D" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Wheel left shadow -->
  <circle cx="133" cy="318" r="18" fill="#000" opacity="0.08"/>
  <!-- Wheel left -->
  <circle cx="130" cy="315" r="18" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.15"/>
  <circle cx="130" cy="315" r="5" fill="#2E2D2D" opacity="0.5"/>
  <!-- Wheel right shadow -->
  <circle cx="273" cy="318" r="18" fill="#000" opacity="0.08"/>
  <!-- Wheel right -->
  <circle cx="270" cy="315" r="18" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.15"/>
  <circle cx="270" cy="315" r="5" fill="#2E2D2D" opacity="0.5"/>
  <!-- Product box 1 (tall) -->
  <rect x="118" y="200" width="50" height="65" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="115" y="197" width="50" height="65" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.15"/>
  <line x1="125" y1="215" x2="155" y2="215" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="125" y1="225" x2="148" y2="225" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Product box 2 (wide) -->
  <rect x="178" y="225" width="65" height="42" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="175" y="222" width="65" height="42" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.14"/>
  <line x1="185" y1="238" x2="225" y2="238" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Product box 3 (small, on top) -->
  <rect x="195" y="188" width="40" height="30" rx="3" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="192" y="185" width="40" height="30" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.16"/>
  <!-- Price tag floating top-left -->
  <path d="M55 60 L90 60 L95 72 L90 84 L55 84 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <path d="M52 57 L87 57 L92 69 L87 81 L52 81 Z" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.14"/>
  <circle cx="60" cy="69" r="3" fill="#2E2D2D" opacity="0.4"/>
  <line x1="68" y1="66" x2="83" y2="66" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="68" y1="73" x2="78" y2="73" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Star rating top-right area -->
  <polygon points="345,70 348,79 358,79 350,85 353,94 345,88 337,94 340,85 332,79 342,79" fill="#2E2D2D" opacity="0.2"/>
  <polygon points="365,60 367,67 374,67 369,71 371,78 365,74 359,78 361,71 356,67 363,67" fill="#2E2D2D" opacity="0.15"/>
  <polygon points="355,48 357,53 362,53 358,56 360,61 355,58 350,61 352,56 348,53 353,53" fill="#2E2D2D" opacity="0.12"/>
  <!-- Floating product card bottom-left -->
  <rect x="28" y="255" width="52" height="38" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="25" y="252" width="52" height="38" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.12"/>
  <rect x="31" y="258" width="18" height="14" rx="2" fill="#2E2D2D" opacity="0.15"/>
  <line x1="53" y1="262" x2="70" y2="262" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="53" y1="269" x2="66" y2="269" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="31" y1="280" x2="50" y2="280" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Floating product card top-center -->
  <rect x="155" y="48" width="55" height="40" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="152" y="45" width="55" height="40" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <rect x="158" y="51" width="16" height="12" rx="2" fill="#2E2D2D" opacity="0.15"/>
  <line x1="178" y1="55" x2="200" y2="55" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="178" y1="61" x2="195" y2="61" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Decorative dots -->
  <circle cx="350" cy="200" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="365" cy="230" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="42" cy="155" r="2.5" fill="#C026D3" opacity="0.3"/>
  <circle cx="355" cy="300" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="330" y1="140" x2="350" y2="140" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="335" y1="148" x2="355" y2="148" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
