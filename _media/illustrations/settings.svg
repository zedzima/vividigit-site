<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === SETTINGS: Large gear with wrench, toggles panel === -->

  <ellipse cx="203" cy="358" rx="115" ry="14" fill="#000" opacity="0.06"/>

  <!-- Main gear shadow -->
  <circle cx="173" cy="183" r="95" fill="#000" opacity="0.07" transform="translate(3,3)"/>
  <!-- Main gear outer -->
  <circle cx="170" cy="180" r="95" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Main gear inner -->
  <circle cx="170" cy="180" r="40" stroke="#2E2D2D" stroke-width="2.5" fill="white" fill-opacity="0.4"/>
  <!-- Gear teeth (8 spokes) -->
  <line x1="170" y1="70" x2="170" y2="90" stroke="#2E2D2D" stroke-width="12" stroke-linecap="round"/>
  <line x1="170" y1="270" x2="170" y2="290" stroke="#2E2D2D" stroke-width="12" stroke-linecap="round"/>
  <line x1="60" y1="180" x2="80" y2="180" stroke="#2E2D2D" stroke-width="12" stroke-linecap="round"/>
  <line x1="260" y1="180" x2="280" y2="180" stroke="#2E2D2D" stroke-width="12" stroke-linecap="round"/>
  <line x1="93" y1="103" x2="107" y2="117" stroke="#2E2D2D" stroke-width="10" stroke-linecap="round"/>
  <line x1="233" y1="243" x2="247" y2="257" stroke="#2E2D2D" stroke-width="10" stroke-linecap="round"/>
  <line x1="93" y1="257" x2="107" y2="243" stroke="#2E2D2D" stroke-width="10" stroke-linecap="round"/>
  <line x1="233" y1="117" x2="247" y2="103" stroke="#2E2D2D" stroke-width="10" stroke-linecap="round"/>

  <!-- Small gear (bottom right) -->
  <circle cx="285" cy="275" r="38" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="285" cy="275" r="15" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.35"/>
  <line x1="285" y1="228" x2="285" y2="240" stroke="#2E2D2D" stroke-width="8" stroke-linecap="round"/>
  <line x1="285" y1="310" x2="285" y2="322" stroke="#2E2D2D" stroke-width="8" stroke-linecap="round"/>
  <line x1="238" y1="275" x2="250" y2="275" stroke="#2E2D2D" stroke-width="8" stroke-linecap="round"/>
  <line x1="320" y1="275" x2="332" y2="275" stroke="#2E2D2D" stroke-width="8" stroke-linecap="round"/>

  <!-- Toggles panel (top right) -->
  <rect x="295" y="75" width="70" height="110" rx="8" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Toggle 1 (on) -->
  <rect x="305" y="90" width="50" height="20" rx="10" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.14"/>
  <circle cx="340" cy="100" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.3"/>
  <!-- Toggle 2 (off) -->
  <rect x="305" y="120" width="50" height="20" rx="10" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.06"/>
  <circle cx="320" cy="130" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.4"/>
  <!-- Toggle 3 (on) -->
  <rect x="305" y="150" width="50" height="20" rx="10" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="340" cy="160" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.3"/>

  <!-- Wrench (bottom left) -->
  <path d="M55 330 L110 275" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <path d="M110 275 L125 265 L135 275 L125 285 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.15" stroke-linejoin="round"/>
  <rect x="45" y="322" width="20" height="28" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.12" transform="rotate(-45 55 336)"/>

  <circle cx="40" cy="100" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="375" cy="230" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="50" cy="260" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="345" y1="370" x2="365" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
