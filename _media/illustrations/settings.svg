<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === SETTINGS: Large gear with smaller gears, toggles panel === -->

  <!-- Shadow under main gear -->
  <ellipse cx="203" cy="355" rx="100" ry="12" fill="#000" opacity="0.06"/>

  <!-- Main gear shadow -->
  <circle cx="193" cy="183" r="95" fill="#000" opacity="0.07" transform="translate(3,3)"/>

  <!-- Main gear teeth -->
  <path d="M200 75 L210 75 L215 60 L225 60 L230 75 L240 78
           L248 65 L258 70 L255 85 L263 92
           L278 85 L283 95 L272 105 L277 115
           L293 115 L295 126 L280 132 L280 142
           L296 148 L293 160 L278 158 L272 168
           L285 180 L278 190 L265 182 L255 190
           L260 205 L250 210 L242 198 L230 200
           L228 216 L218 216 L215 200 L205 198
           L198 214 L188 210 L192 198 L182 190
           L172 200 L164 192 L175 180 L168 170
           L152 175 L148 164 L165 158 L162 148
           L145 145 L145 134 L162 130 L165 120
           L150 112 L155 102 L170 108 L178 98
           L168 85 L178 78 L188 92 L198 88 Z"
           stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Main gear center -->
  <circle cx="215" cy="140" r="35" stroke="#2E2D2D" stroke-width="2.5" fill="white" fill-opacity="0.4"/>
  <circle cx="215" cy="140" r="15" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.12"/>

  <!-- Small gear (top right) -->
  <circle cx="310" cy="95" r="28" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10"/>
  <!-- Small gear teeth hints -->
  <circle cx="310" cy="95" r="35" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.15" stroke-dasharray="8 6"/>
  <!-- Small gear center -->
  <circle cx="310" cy="95" r="10" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.08"/>

  <!-- Tiny gear (bottom right) -->
  <circle cx="330" cy="200" r="18" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.08"/>
  <circle cx="330" cy="200" r="24" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.12" stroke-dasharray="6 5"/>
  <circle cx="330" cy="200" r="7" stroke="#2E2D2D" stroke-width="1" fill="#A855F7" fill-opacity="0.06"/>

  <!-- Toggles panel (bottom left) -->
  <rect x="45" y="268" width="130" height="85" rx="6" fill="#000" opacity="0.07" transform="translate(2,2)"/>
  <rect x="43" y="266" width="130" height="85" rx="6" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <!-- Toggle 1 (on) -->
  <rect x="58" y="280" width="36" height="16" rx="8" fill="#7C3AED" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="82" cy="288" r="6" fill="#7C3AED" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="102" y1="288" x2="155" y2="288" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <!-- Toggle 2 (off) -->
  <rect x="58" y="305" width="36" height="16" rx="8" fill="#2E2D2D" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="70" cy="313" r="6" fill="#2E2D2D" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="102" y1="313" x2="148" y2="313" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <!-- Toggle 3 (on) -->
  <rect x="58" y="330" width="36" height="16" rx="8" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="82" cy="338" r="6" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="102" y1="338" x2="160" y2="338" stroke="#2E2D2D" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

  <!-- Wrench (top left, small decorative) -->
  <path d="M60 80 L72 68 L80 76 L68 88 Z" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.10"/>
  <circle cx="55" cy="85" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Decorative dots -->
  <circle cx="375" cy="280" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="25" cy="180" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="370" cy="350" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="350" y1="370" x2="370" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
