<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Two connected circles representing work → earnings flow -->

  <!-- Left circle (work/deliverable) -->
  <circle cx="130" cy="200" r="65" fill="#7C3AED" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="2.5"/>
  <circle cx="130" cy="200" r="45" fill="#7C3AED" fill-opacity="0.06" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <!-- Document icon inside left circle -->
  <rect x="115" y="180" width="30" height="38" rx="3" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2"/>
  <line x1="122" y1="192" x2="138" y2="192" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="122" y1="199" x2="138" y2="199" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="122" y1="206" x2="133" y2="206" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Arrow connecting circles -->
  <path d="M200 200 L240 200" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M235 193 L245 200 L235 207" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Percentage label on arrow -->
  <rect x="205" y="170" width="36" height="20" rx="4" fill="#C026D3" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <text x="223" y="184" font-family="monospace" font-size="11" fill="#2E2D2D" text-anchor="middle" opacity="0.7">40%</text>

  <!-- Right circle (earnings) -->
  <circle cx="310" cy="200" r="65" fill="#C026D3" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="2.5"/>
  <circle cx="310" cy="200" r="45" fill="#C026D3" fill-opacity="0.06" stroke="#2E2D2D" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <!-- Coin/value icon inside right circle -->
  <circle cx="310" cy="195" r="18" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="2"/>
  <text x="310" y="200" font-family="monospace" font-size="16" fill="#2E2D2D" text-anchor="middle" opacity="0.6">$</text>

  <!-- Decorative elements -->
  <circle cx="50" cy="120" r="3" fill="#7C3AED" opacity="0.2"/>
  <circle cx="365" cy="100" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="60" cy="310" r="2" fill="#C026D3" opacity="0.15"/>
  <line x1="40" y1="340" x2="55" y2="340" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <line x1="350" y1="320" x2="370" y2="320" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>

  <!-- Sparkle near earnings -->
  <line x1="355" y1="140" x2="355" y2="130" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="348" y1="143" x2="343" y2="137" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="362" y1="143" x2="367" y2="137" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
