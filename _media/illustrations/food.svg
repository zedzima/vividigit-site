  <line x1="42" y1="120" x2="42" y2="180" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="55" y1="120" x2="55" y2="180" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="120" x2="68" y2="180" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M42 180 Q55 195 68 180" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.3"/>

