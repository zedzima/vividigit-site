<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === FOOD: Plate with utensils, chef hat, steam === -->

  <!-- Shadow under plate -->
  <ellipse cx="203" cy="328" rx="120" ry="25" fill="#000" opacity="0.07" transform="translate(3,3)"/>

  <!-- Plate (large ellipse) -->
  <ellipse cx="200" cy="265" rx="130" ry="55" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Plate inner ring -->
  <ellipse cx="200" cy="265" rx="95" ry="38" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <!-- Plate side (3D) -->
  <path d="M70 265 L70 280 Q70 305 200 305 Q330 305 330 280 L330 265" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.06"/>
  <ellipse cx="200" cy="280" rx="130" ry="55" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Food items on plate (abstract shapes) -->
  <ellipse cx="180" cy="255" rx="25" ry="12" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>
  <ellipse cx="225" cy="260" rx="20" ry="10" fill="#7C3AED" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="200" cy="248" r="8" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Fork (left) -->
  <line x1="55" y1="175" x2="55" y2="335" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fork tines -->
  <line x1="45" y1="175" x2="45" y2="210" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="55" y1="175" x2="55" y2="210" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="175" x2="65" y2="210" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Fork bridge -->
  <line x1="45" y1="210" x2="65" y2="210" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>

  <!-- Knife (right) -->
  <line x1="345" y1="175" x2="345" y2="335" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Knife blade -->
  <path d="M345 175 Q355 180 355 210 L345 210 Z" fill="#A855F7" fill-opacity="0.10" stroke="#2E2D2D" stroke-width="1.5"/>

  <!-- Steam lines (above plate) -->
  <path d="M170 210 Q165 195 170 180 Q175 165 170 150" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.15" stroke-linecap="round"/>
  <path d="M200 200 Q195 185 200 170 Q205 155 200 140" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.15" stroke-linecap="round"/>
  <path d="M230 208 Q225 193 230 178 Q235 163 230 148" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.15" stroke-linecap="round"/>

  <!-- Chef hat (top center, decorative) -->
  <path d="M175 95 Q175 55 200 55 Q225 55 225 95" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <rect x="172" y="95" width="56" height="18" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10"/>
  <!-- Chef hat poof -->
  <circle cx="185" cy="60" r="12" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.3"/>
  <circle cx="200" cy="52" r="14" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.3"/>
  <circle cx="215" cy="60" r="12" stroke="#2E2D2D" stroke-width="1.5" fill="white" fill-opacity="0.3"/>

  <!-- Decorative dots -->
  <circle cx="370" cy="130" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="30" cy="250" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="375" cy="300" r="2" fill="#C026D3" opacity="0.18"/>
  <line x1="350" y1="360" x2="370" y2="360" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="25" y1="150" x2="42" y2="150" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
