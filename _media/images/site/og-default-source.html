<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vividigit OG Default</title>
  <style>
    @font-face {
      font-family: "JetBrains Mono";
      src: url("../../fonts/jetbrains-mono-latin.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "JetBrains Mono";
      src: url("../../fonts/jetbrains-mono-latin.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: "JetBrains Mono";
      src: url("../../fonts/jetbrains-mono-latin.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --bg: #0d1017;
      --bg-soft: #141827;
      --text: #f5f7fb;
      --muted: rgba(245, 247, 251, 0.74);
      --line: rgba(255, 255, 255, 0.14);
      --violet: #7c3aed;
      --violet-soft: #a855f7;
      --pink: #ec4899;
      --cyan: #8be8ff;
      --panel: rgba(255, 255, 255, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: var(--bg);
      font-family: "JetBrains Mono", monospace;
    }

    body {
      position: relative;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(124, 58, 237, 0.22), transparent 24%),
        radial-gradient(circle at 84% 16%, rgba(168, 85, 247, 0.26), transparent 24%),
        radial-gradient(circle at 82% 82%, rgba(236, 72, 153, 0.16), transparent 22%),
        linear-gradient(135deg, #0d1017 0%, #111523 42%, #18112a 100%);
    }

    .shell {
      position: absolute;
      inset: 0;
      padding: 52px 58px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
      width: 100%;
      max-width: 1020px;
      text-align: center;
    }

    .logo {
      width: 360px;
      height: auto;
      display: block;
    }

    .kicker {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
      letter-spacing: 0.08em;
      color: #d28bff;
      text-transform: uppercase;
    }

    .headline {
      margin: 0;
      font-size: 68px;
      line-height: 1.02;
      letter-spacing: -0.055em;
      font-weight: 700;
      max-width: 860px;
      text-wrap: balance;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 6px;
      justify-content: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 11px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 16px;
      line-height: 1;
      color: rgba(245, 247, 251, 0.88);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand">
      <img class="logo" src="logo-gradient.svg" alt="Vividigit">
      <p class="kicker">Human-led, AI-augmented, productized agency</p>
      <h1 class="headline">Human expertise, delivered as a cloud layer for global growth</h1>
      <div class="tags">
        <span class="tag">Multilingual</span>
        <span class="tag">International</span>
        <span class="tag">Global</span>
      </div>
    </div>
  </div>
</body>
</html>
