<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="100%" stop-color="#C026D3"/>
  </linearGradient>
  <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#A855F7"/>
    <stop offset="100%" stop-color="#7C3AED"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- TOP TRAFFIC SOURCES -->
<g filter="url(#glow)">
  <circle cx="150" cy="130" r="34" stroke="url(#g2)" stroke-width="3.5" fill="none"/>
  <circle cx="300" cy="95" r="34" stroke="url(#g1)" stroke-width="3.5" fill="none"/>
  <circle cx="450" cy="130" r="34" stroke="url(#g2)" stroke-width="3.5" fill="none"/>

  <!-- Search icon -->
  <circle cx="147" cy="128" r="12" stroke="#A855F7" stroke-width="2.5" fill="none"/>
  <line x1="156" y1="137" x2="166" y2="147" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>

  <!-- Cursor icon -->
  <path d="M286 80 L286 112 L296 103 L306 122 L314 118 L304 100 L318 96Z" stroke="#C026D3" stroke-width="2.8" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>

  <!-- Social icon -->
  <path d="M436 126 C444 113 456 113 464 126 C470 136 463 145 450 155 C437 145 430 136 436 126Z" stroke="#A855F7" stroke-width="2.5" fill="#A855F7" fill-opacity="0.12"/>
</g>

<!-- FUNNEL BODY -->
<g filter="url(#glow)">
  <path d="M120 200 L480 200 L418 280 L182 280Z" stroke="url(#g1)" stroke-width="4" fill="#7C3AED" fill-opacity="0.08" stroke-linejoin="round"/>
  <path d="M182 280 L418 280 L365 355 L235 355Z" stroke="#A855F7" stroke-width="3.5" fill="#A855F7" fill-opacity="0.08" stroke-linejoin="round"/>
  <path d="M235 355 L365 355 L336 418 L264 418Z" stroke="#C026D3" stroke-width="3.5" fill="#C026D3" fill-opacity="0.08" stroke-linejoin="round"/>

  <!-- Divider lines -->
  <line x1="170" y1="238" x2="430" y2="238" stroke="#A855F7" stroke-width="2" opacity="0.35"/>
  <line x1="220" y1="320" x2="380" y2="320" stroke="#A855F7" stroke-width="2" opacity="0.35"/>

  <!-- Input bubbles entering funnel -->
  <circle cx="190" cy="225" r="7" fill="#7C3AED" fill-opacity="0.5"/>
  <circle cx="235" cy="245" r="6" fill="#A855F7" fill-opacity="0.5"/>
  <circle cx="280" cy="220" r="8" fill="#C026D3" fill-opacity="0.5"/>
  <circle cx="340" cy="235" r="7" fill="#7C3AED" fill-opacity="0.5"/>
  <circle cx="390" cy="225" r="6" fill="#A855F7" fill-opacity="0.5"/>

  <!-- Flow down bubbles -->
  <circle cx="300" cy="295" r="7" fill="#C026D3" fill-opacity="0.5"/>
  <circle cx="300" cy="345" r="6" fill="#A855F7" fill-opacity="0.5"/>
  <circle cx="300" cy="390" r="5" fill="#7C3AED" fill-opacity="0.6"/>
</g>

<!-- OUTPUT / REVENUE -->
<g filter="url(#glow)">
  <line x1="300" y1="418" x2="300" y2="463" stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="300" cy="500" r="44" stroke="url(#g1)" stroke-width="4" fill="#7C3AED" fill-opacity="0.1"/>
  <path d="M285 500 C285 489 316 489 316 500 C316 511 285 511 285 500Z" stroke="#A855F7" stroke-width="2.5" fill="none"/>
  <line x1="300" y1="478" x2="300" y2="522" stroke="#A855F7" stroke-width="2.5" stroke-linecap="round"/>
</g>

<!-- LEFT ANALYTICS CARD -->
<g transform="translate(40,295)" filter="url(#glow)">
  <rect x="0" y="0" width="130" height="95" rx="12" stroke="#7C3AED" stroke-width="3" fill="#7C3AED" fill-opacity="0.05"/>
  <rect x="20" y="52" width="14" height="24" rx="2" fill="#7C3AED" fill-opacity="0.4"/>
  <rect x="42" y="42" width="14" height="34" rx="2" fill="#A855F7" fill-opacity="0.4"/>
  <rect x="64" y="31" width="14" height="45" rx="2" fill="#C026D3" fill-opacity="0.45"/>
  <rect x="86" y="46" width="14" height="30" rx="2" fill="#A855F7" fill-opacity="0.35"/>
  <path d="M20 45 L48 35 L70 28 L100 40" stroke="#C026D3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</g>

<!-- RIGHT KPI CARD -->
<g transform="translate(430,295)" filter="url(#glow)">
  <rect x="0" y="0" width="130" height="95" rx="12" stroke="#A855F7" stroke-width="3" fill="#7C3AED" fill-opacity="0.05"/>
  <circle cx="34" cy="47" r="20" stroke="#A855F7" stroke-width="2.5" fill="none"/>
  <path d="M34 47 L44 40" stroke="#C026D3" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="34" cy="47" r="2.5" fill="#C026D3"/>
  <path d="M74 56 L85 67 L108 42" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="74" y1="31" x2="112" y2="31" stroke="#A855F7" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</g>

<!-- CONNECTING LINES -->
<line x1="150" y1="165" x2="190" y2="200" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 6" opacity="0.35"/>
<line x1="300" y1="130" x2="300" y2="200" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 6" opacity="0.35"/>
<line x1="450" y1="165" x2="410" y2="200" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 6" opacity="0.35"/>
<line x1="170" y1="340" x2="120" y2="340" stroke="#7C3AED" stroke-width="2" stroke-dasharray="4 6" opacity="0.3"/>
<line x1="430" y1="340" x2="390" y2="340" stroke="#7C3AED" stroke-width="2" stroke-dasharray="4 6" opacity="0.3"/>

<!-- OUTER ORBIT -->
<ellipse cx="300" cy="300" rx="255" ry="175" stroke="#7C3AED" stroke-width="1.5" opacity="0.2" fill="none" transform="rotate(-8 300 300)"/>
<circle cx="540" cy="248" r="5" fill="#C026D3" fill-opacity="0.6"/>

<!-- SPARKLES -->
<g stroke="#A855F7" stroke-width="2" opacity="0.45">
  <line x1="72" y1="220" x2="72" y2="236" stroke-linecap="round"/>
  <line x1="64" y1="228" x2="80" y2="228" stroke-linecap="round"/>
</g>
<g stroke="#C026D3" stroke-width="2" opacity="0.42">
  <line x1="520" y1="190" x2="520" y2="206" stroke-linecap="round"/>
  <line x1="512" y1="198" x2="528" y2="198" stroke-linecap="round"/>
</g>
<circle cx="72" cy="430" r="3" fill="#7C3AED" opacity="0.35"/>
</svg>
