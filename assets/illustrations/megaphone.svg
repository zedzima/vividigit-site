<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === MEGAPHONE: Bullhorn with sound waves and person === -->

  <!-- Person holding megaphone (left side) -->
  <!-- Person head shadow -->
  <circle cx="88" cy="163" r="32" fill="#000" opacity="0.08"/>
  <!-- Person head -->
  <circle cx="85" cy="160" r="32" stroke="#2E2D2D" stroke-width="3.5" fill="#A855F7" fill-opacity="0.14"/>
  <!-- Face -->
  <circle cx="78" cy="155" r="2.5" fill="#2E2D2D" opacity="0.55"/>
  <circle cx="93" cy="155" r="2.5" fill="#2E2D2D" opacity="0.55"/>
  <path d="M80 168 Q86 174 92 168" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Person body shadow -->
  <path d="M53 213 Q53 198 85 198 Q117 198 117 213 L117 330 L53 330 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Person body -->
  <path d="M50 210 Q50 195 85 195 Q120 195 120 210 L120 330 L50 330 Z" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.10"/>

  <!-- Arm holding megaphone -->
  <path d="M115 225 Q130 215 148 210 Q160 207 170 210" stroke="#2E2D2D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Hand gripping megaphone handle -->
  <path d="M162 206 Q172 200 178 208 Q182 216 175 220 Q168 222 162 218 Z" fill="#2E2D2D" opacity="0.85"/>
  <!-- Second arm supporting -->
  <path d="M115 240 Q135 235 155 232" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Shadow of megaphone -->
  <path d="M178 178 L320 108 Q340 98 340 118 L340 288 Q340 308 320 298 L178 228 Z" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Megaphone body -->
  <path d="M175 175 L318 105 Q338 95 338 115 L338 285 Q338 305 318 295 L175 225 Z" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Megaphone bell opening -->
  <ellipse cx="338" cy="200" r="15" ry="90" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.10"/>
  <!-- Megaphone mouthpiece -->
  <rect x="160" y="178" width="20" height="44" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" opacity="0.15"/>
  <!-- Detail lines on megaphone -->
  <line x1="200" y1="172" x2="200" y2="228" stroke="#2E2D2D" stroke-width="1.5" opacity="0.15"/>
  <line x1="250" y1="148" x2="250" y2="252" stroke="#2E2D2D" stroke-width="1.5" opacity="0.12"/>

  <!-- Sound wave 1 (closest) -->
  <path d="M358 155 Q378 200 358 245" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Sound wave 2 -->
  <path d="M372 130 Q400 200 372 270" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- Sound wave 3 (farthest) -->
  <path d="M386 110 Q418 200 386 290" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.15"/>

  <!-- Floating notification badge 1 -->
  <circle cx="368" cy="80" r="14" fill="#000" opacity="0.08" transform="translate(2,2)"/>
  <circle cx="366" cy="78" r="14" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.18"/>
  <text x="366" y="83" text-anchor="middle" fill="#2E2D2D" font-size="13" font-weight="bold" opacity="0.6">3</text>

  <!-- Floating notification badge 2 -->
  <circle cx="350" cy="320" r="11" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.14"/>
  <text x="350" y="325" text-anchor="middle" fill="#2E2D2D" font-size="11" font-weight="bold" opacity="0.5">!</text>

  <!-- Small heart in sound waves -->
  <path d="M370 170 Q372 165 376 168 Q380 165 382 170 Q382 176 376 180 Q370 176 370 170 Z" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1" opacity="0.4"/>

  <!-- Small star in sound waves -->
  <path d="M378 225 L380 220 L382 225 L387 226 L383 229 L384 234 L380 231 L376 234 L377 229 L373 226 Z" fill="#A855F7" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="1" opacity="0.35"/>

  <!-- Another small heart -->
  <path d="M362 290 Q364 286 367 288 Q370 286 371 290 Q371 294 367 297 Q363 294 362 290 Z" fill="#7C3AED" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="0.8" opacity="0.3"/>

  <!-- Decorative dots -->
  <circle cx="30" cy="100" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="45" cy="340" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="150" cy="80" r="2" fill="#C026D3" opacity="0.22"/>
  <circle cx="140" cy="330" r="2.5" fill="#7C3AED" opacity="0.2"/>

  <!-- Decorative small lines -->
  <line x1="20" y1="130" x2="38" y2="130" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="25" y1="138" x2="48" y2="138" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="130" y1="360" x2="155" y2="360" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>