<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for video player -->
  <rect x="53" y="73" width="270" height="180" rx="10" fill="#000" opacity="0.08"/>
  <!-- Video player window -->
  <rect x="50" y="70" width="270" height="180" rx="10" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Player title bar -->
  <rect x="50" y="70" width="270" height="22" rx="10" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.08"/>
  <rect x="50" y="82" width="270" height="10" fill="#2E2D2D" fill-opacity="0.08"/>
  <!-- Window dots -->
  <circle cx="66" cy="81" r="3.5" fill="#C026D3" opacity="0.4"/>
  <circle cx="78" cy="81" r="3.5" fill="#A855F7" opacity="0.35"/>
  <circle cx="90" cy="81" r="3.5" fill="#7C3AED" opacity="0.3"/>
  <!-- Screen area -->
  <rect x="62" y="96" width="246" height="140" rx="4" fill="#2E2D2D" fill-opacity="0.04"/>
  <!-- Play button circle (center) -->
  <circle cx="185" cy="168" r="32" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.18"/>
  <!-- Play triangle -->
  <path d="M175 150 L175 186 L205 168 Z" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.2" stroke-linejoin="round"/>
  <!-- Progress bar background -->
  <rect x="62" y="240" width="246" height="5" rx="2.5" fill="#2E2D2D" opacity="0.12"/>
  <!-- Progress bar fill -->
  <rect x="62" y="240" width="100" height="5" rx="2.5" fill="#7C3AED" opacity="0.4"/>
  <!-- Progress bar handle -->
  <circle cx="162" cy="242" r="5" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.25"/>
  <!-- Timestamp text -->
  <text x="68" y="258" font-family="sans-serif" font-size="9" fill="#2E2D2D" opacity="0.3">2:34</text>
  <text x="280" y="258" font-family="sans-serif" font-size="9" fill="#2E2D2D" opacity="0.3">5:12</text>
  <!-- Camera on tripod (right side) -->
  <!-- Tripod legs -->
  <line x1="345" y1="200" x2="330" y2="270" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="345" y1="200" x2="360" y2="270" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="345" y1="200" x2="345" y2="270" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Tripod joint -->
  <circle cx="345" cy="200" r="4" fill="#2E2D2D" opacity="0.3"/>
  <!-- Camera body shadow -->
  <rect x="328" y="163" width="38" height="28" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Camera body -->
  <rect x="326" y="160" width="38" height="28" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.15"/>
  <!-- Camera lens -->
  <circle cx="345" cy="174" r="8" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.12"/>
  <circle cx="345" cy="174" r="3" fill="#2E2D2D" opacity="0.2"/>
  <!-- Camera viewfinder -->
  <rect x="352" y="156" width="10" height="8" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Camera record light -->
  <circle cx="330" cy="164" r="2" fill="#C026D3" opacity="0.5"/>
  <!-- Film strip (left side, decorative) -->
  <rect x="22" y="100" width="22" height="90" rx="2" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.1"/>
  <!-- Film strip holes -->
  <rect x="25" y="105" width="5" height="4" rx="1" fill="#2E2D2D" opacity="0.2"/>
  <rect x="36" y="105" width="5" height="4" rx="1" fill="#2E2D2D" opacity="0.2"/>
  <rect x="25" y="131" width="5" height="4" rx="1" fill="#2E2D2D" opacity="0.2"/>
  <rect x="36" y="131" width="5" height="4" rx="1" fill="#2E2D2D" opacity="0.2"/>
  <rect x="25" y="157" width="5" height="4" rx="1" fill="#2E2D2D" opacity="0.2"/>
  <rect x="36" y="157" width="5" height="4" rx="1" fill="#2E2D2D" opacity="0.2"/>
  <!-- Film strip frames -->
  <line x1="22" y1="120" x2="44" y2="120" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <line x1="22" y1="145" x2="44" y2="145" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <line x1="22" y1="170" x2="44" y2="170" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <!-- Clapperboard (bottom-left) -->
  <rect x="55" y="300" width="55" height="38" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Clapperboard top (striped) -->
  <path d="M52 300 L113 300 L108 286 L48 286 Z" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.1" stroke-linejoin="round"/>
  <!-- Clapper stripes -->
  <line x1="60" y1="286" x2="64" y2="300" stroke="#2E2D2D" stroke-width="2" opacity="0.2"/>
  <line x1="72" y1="286" x2="76" y2="300" stroke="#2E2D2D" stroke-width="2" opacity="0.2"/>
  <line x1="84" y1="286" x2="88" y2="300" stroke="#2E2D2D" stroke-width="2" opacity="0.2"/>
  <line x1="96" y1="286" x2="100" y2="300" stroke="#2E2D2D" stroke-width="2" opacity="0.2"/>
  <!-- Text on clapperboard -->
  <line x1="62" y1="314" x2="100" y2="314" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="62" y1="324" x2="90" y2="324" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Decorative dots -->
  <circle cx="365" cy="300" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="375" cy="320" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="30" cy="260" r="2.5" fill="#C026D3" opacity="0.25"/>
  <circle cx="20" cy="65" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="340" y1="60" x2="365" y2="60" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="350" y1="70" x2="375" y2="70" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>