<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for artboard -->
  <rect x="63" y="53" width="280" height="300" rx="6" fill="#000" opacity="0.08"/>
  <!-- Artboard/canvas -->
  <rect x="60" y="50" width="280" height="300" rx="6" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Grid lines (subtle) -->
  <line x1="60" y1="120" x2="340" y2="120" stroke="#2E2D2D" stroke-width="0.5" opacity="0.08"/>
  <line x1="60" y1="190" x2="340" y2="190" stroke="#2E2D2D" stroke-width="0.5" opacity="0.08"/>
  <line x1="60" y1="260" x2="340" y2="260" stroke="#2E2D2D" stroke-width="0.5" opacity="0.08"/>
  <line x1="130" y1="50" x2="130" y2="350" stroke="#2E2D2D" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="50" x2="200" y2="350" stroke="#2E2D2D" stroke-width="0.5" opacity="0.08"/>
  <line x1="270" y1="50" x2="270" y2="350" stroke="#2E2D2D" stroke-width="0.5" opacity="0.08"/>
  <!-- Artboard border markers -->
  <rect x="56" y="46" width="10" height="10" rx="1" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25"/>
  <rect x="334" y="46" width="10" height="10" rx="1" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25"/>
  <rect x="56" y="344" width="10" height="10" rx="1" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25"/>
  <rect x="334" y="344" width="10" height="10" rx="1" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25"/>
  <!-- Bezier curve path (main) -->
  <path d="M100 280 C130 140 220 320 300 160" stroke="#7C3AED" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Bezier curve shadow -->
  <path d="M103 283 C133 143 223 323 303 163" stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.06"/>
  <!-- Control line from anchor 1 -->
  <line x1="100" y1="280" x2="130" y2="140" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Control line from anchor 2 -->
  <line x1="300" y1="160" x2="220" y2="320" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Anchor point 1 (filled) -->
  <rect x="94" y="274" width="12" height="12" rx="1" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.2"/>
  <!-- Anchor point 2 (filled) -->
  <rect x="294" y="154" width="12" height="12" rx="1" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.2"/>
  <!-- Control point handle 1 -->
  <circle cx="130" cy="140" r="5" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.2"/>
  <!-- Control point handle 2 -->
  <circle cx="220" cy="320" r="5" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.2"/>
  <!-- Pen tool cursor -->
  <path d="M290 145 L282 175 L288 168 L296 178 L300 175 L292 165 L300 162 Z" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.15" stroke-linejoin="round"/>
  <!-- Small plus on pen tool -->
  <line x1="306" y1="148" x2="306" y2="156" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="302" y1="152" x2="310" y2="152" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Designer's hand -->
  <path d="M310 185 C320 178 328 172 335 168 C342 165 346 170 342 177 C348 172 352 176 348 183 C354 178 357 183 352 190 L334 208 C327 214 316 212 310 204 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Finger detail -->
  <path d="M326 188 Q332 182 338 176" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Color swatch panel (bottom-left) -->
  <rect x="78" y="318" width="50" height="20" rx="3" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.3"/>
  <rect x="82" y="322" width="12" height="12" rx="2" fill="#7C3AED" opacity="0.4"/>
  <rect x="98" y="322" width="12" height="12" rx="2" fill="#A855F7" opacity="0.4"/>
  <rect x="114" y="322" width="12" height="12" rx="2" fill="#C026D3" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="355" cy="90" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="370" cy="110" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="40" cy="180" r="2.5" fill="#C026D3" opacity="0.25"/>
  <circle cx="30" cy="150" r="2" fill="#7C3AED" opacity="0.3"/>
  <!-- Small bezier icon (decorative) -->
  <path d="M350 280 Q360 260 370 280" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <circle cx="350" cy="280" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="370" cy="280" r="2" fill="#A855F7" opacity="0.25"/>
  <!-- Decorative lines -->
  <line x1="25" y1="300" x2="45" y2="300" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="30" y1="310" x2="40" y2="310" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>