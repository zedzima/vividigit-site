<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Screen background shadow -->
  <rect x="73" y="43" width="260" height="170" rx="10" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Screen / monitor -->
  <rect x="70" y="40" width="260" height="170" rx="10" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Screen inner -->
  <rect x="82" y="52" width="236" height="142" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Screen stand -->
  <line x1="200" y1="210" x2="200" y2="235" stroke="#2E2D2D" stroke-width="4"/>
  <line x1="170" y1="235" x2="230" y2="235" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Game elements on screen - mountains -->
  <path d="M82 180 L130 110 L160 145 L200 85 L250 135 L280 100 L318 180" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Sun on screen -->
  <circle cx="120" cy="80" r="12" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.14"/>
  <!-- Game character (simple) -->
  <rect x="185" y="148" width="14" height="22" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.20"/>
  <circle cx="192" cy="142" r="7" stroke="#2E2D2D" stroke-width="1.5" fill="#2E2D2D" fill-opacity="0.12"/>
  <!-- Health bar on screen -->
  <rect x="92" y="58" width="60" height="8" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <rect x="92" y="58" width="40" height="8" rx="2" fill="#7C3AED" fill-opacity="0.2"/>
  <!-- Score text -->
  <line x1="250" y1="62" x2="310" y2="62" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Stars on screen -->
  <circle cx="268" cy="100" r="2.5" fill="#2E2D2D" opacity="0.2"/>
  <circle cx="298" cy="118" r="2" fill="#2E2D2D" opacity="0.15"/>
  <circle cx="108" cy="105" r="2" fill="#2E2D2D" opacity="0.15"/>
  <!-- Game controller shadow -->
  <path d="M103 283 Q103 260 128 255 L168 255 Q185 255 192 270 Q195 280 205 280 Q215 280 218 270 Q225 255 242 255 L282 255 Q307 260 307 283 Q308 310 295 330 Q288 340 280 338 Q270 335 268 320 L262 305 Q258 298 252 295 L158 295 Q152 298 148 305 L142 320 Q140 335 130 338 Q122 340 115 330 Q102 310 103 283 Z" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Game controller body -->
  <path d="M100 280 Q100 257 125 252 L165 252 Q182 252 189 267 Q192 277 202 277 Q212 277 215 267 Q222 252 239 252 L279 252 Q304 257 304 280 Q305 307 292 327 Q285 337 277 335 Q267 332 265 317 L259 302 Q255 295 249 292 L155 292 Q149 295 145 302 L139 317 Q137 332 127 335 Q119 337 112 327 Q99 307 100 280 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- D-pad (left side) -->
  <rect x="132" y="265" width="10" height="28" rx="2" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.12"/>
  <rect x="123" y="274" width="28" height="10" rx="2" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.12"/>
  <!-- Action buttons (right side) -->
  <circle cx="260" cy="268" r="7" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.15"/>
  <circle cx="275" cy="280" r="7" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.15"/>
  <circle cx="245" cy="280" r="7" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.14"/>
  <circle cx="260" cy="292" r="7" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Analog sticks -->
  <circle cx="165" cy="292" r="9" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.08"/>
  <circle cx="165" cy="292" r="4" fill="#2E2D2D" opacity="0.15"/>
  <circle cx="235" cy="302" r="9" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.08"/>
  <circle cx="235" cy="302" r="4" fill="#2E2D2D" opacity="0.15"/>
  <!-- Bumper buttons -->
  <path d="M118 252 Q130 242 160 242" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M286 252 Q274 242 244 242" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Headset -->
  <path d="M325 180 Q325 155 340 145 Q355 155 355 180" stroke="#2E2D2D" stroke-width="3" fill="none"/>
  <!-- Headband -->
  <path d="M330 150 Q340 138 350 150" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Ear cups -->
  <rect x="318" y="175" width="16" height="22" rx="5" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.15"/>
  <rect x="348" y="175" width="16" height="22" rx="5" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.15"/>
  <!-- Microphone -->
  <path d="M322 192 Q312 198 310 210" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="310" cy="213" r="3" fill="#2E2D2D" opacity="0.4"/>
  <!-- Trophy cup -->
  <path d="M42 290 Q42 270 52 265 L68 265 Q78 270 78 290 Q75 310 60 315 Q45 310 42 290 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Trophy handles -->
  <path d="M42 275 Q30 278 30 290 Q30 300 42 302" stroke="#2E2D2D" stroke-width="2" fill="none"/>
  <path d="M78 275 Q90 278 90 290 Q90 300 78 302" stroke="#2E2D2D" stroke-width="2" fill="none"/>
  <!-- Trophy base -->
  <line x1="50" y1="318" x2="70" y2="318" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="55" y1="315" x2="65" y2="315" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>
  <!-- Trophy star -->
  <path d="M60 280 L62 286 L68 286 L63 290 L65 296 L60 292 L55 296 L57 290 L52 286 L58 286 Z" fill="#2E2D2D" opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="50" cy="60" r="2.5" fill="#7C3AED" opacity="0.3"/>
  <circle cx="360" cy="110" r="2" fill="#C026D3" opacity="0.25"/>
  <circle cx="45" cy="180" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="340" cy="340" r="2.5" fill="#7C3AED" opacity="0.25"/>
  <!-- Decorative lines -->
  <line x1="340" y1="50" x2="360" y2="50" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="40" y1="350" x2="55" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="355" y1="250" x2="375" y2="250" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>