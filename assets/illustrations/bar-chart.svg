<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Platform/base shadow -->
  <ellipse cx="203" cy="323" rx="155" ry="18" fill="#000" opacity="0.08"/>
  <!-- Platform/base -->
  <ellipse cx="200" cy="320" rx="155" ry="18" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Platform top surface -->
  <path d="M45 320 L45 310 Q45 296 200 296 Q355 296 355 310 L355 320" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.06"/>
  <!-- Axis lines -->
  <line x1="80" y1="295" x2="80" y2="105" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="75" y1="295" x2="320" y2="295" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Y-axis tick marks -->
  <line x1="75" y1="255" x2="80" y2="255" stroke="#2E2D2D" stroke-width="2" opacity="0.25"/>
  <line x1="75" y1="215" x2="80" y2="215" stroke="#2E2D2D" stroke-width="2" opacity="0.25"/>
  <line x1="75" y1="175" x2="80" y2="175" stroke="#2E2D2D" stroke-width="2" opacity="0.25"/>
  <line x1="75" y1="135" x2="80" y2="135" stroke="#2E2D2D" stroke-width="2" opacity="0.25"/>
  <!-- Y-axis label lines (abstract) -->
  <line x1="55" y1="255" x2="70" y2="255" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="58" y1="215" x2="70" y2="215" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="60" y1="175" x2="70" y2="175" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="57" y1="135" x2="70" y2="135" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Grid lines (subtle) -->
  <line x1="80" y1="255" x2="310" y2="255" stroke="#2E2D2D" stroke-width="1" opacity="0.08" stroke-dasharray="4 4"/>
  <line x1="80" y1="215" x2="310" y2="215" stroke="#2E2D2D" stroke-width="1" opacity="0.08" stroke-dasharray="4 4"/>
  <line x1="80" y1="175" x2="310" y2="175" stroke="#2E2D2D" stroke-width="1" opacity="0.08" stroke-dasharray="4 4"/>
  <!-- Bar 1 shadow -->
  <rect x="108" y="228" width="52" height="67" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Bar 1 (short) -->
  <rect x="108" y="228" width="52" height="67" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.16"/>
  <!-- X-axis label 1 -->
  <line x1="120" y1="303" x2="148" y2="303" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Bar 2 shadow -->
  <rect x="178" y="188" width="52" height="107" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Bar 2 (medium) -->
  <rect x="178" y="188" width="52" height="107" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.18"/>
  <!-- X-axis label 2 -->
  <line x1="190" y1="303" x2="218" y2="303" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Bar 3 shadow -->
  <rect x="248" y="132" width="52" height="163" rx="4" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Bar 3 (tallest) -->
  <rect x="248" y="132" width="52" height="163" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.18"/>
  <!-- X-axis label 3 -->
  <line x1="260" y1="303" x2="288" y2="303" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Hand drawing tallest bar -->
  <!-- Wrist/forearm -->
  <path d="M340 85 Q335 95 330 105 Q325 112 318 118" stroke="#2E2D2D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Hand -->
  <path d="M318 118 Q312 122 308 126 Q304 130 302 128 Q298 124 295 122 Q292 120 294 116 Q296 112 300 110 Q305 108 310 110 L318 118" fill="#2E2D2D" opacity="0.85"/>
  <!-- Pen in hand -->
  <line x1="295" y1="122" x2="274" y2="138" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Pen tip -->
  <path d="M274 138 L270 145 L277 141 Z" fill="#7C3AED" opacity="0.6" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Pen detail -->
  <line x1="290" y1="125" x2="282" y2="132" stroke="#A855F7" stroke-width="1.5" opacity="0.3"/>
  <!-- Drawing line from pen to bar top -->
  <path d="M270 145 Q270 140 272 135" stroke="#7C3AED" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
  <!-- Upward arrow -->
  <line x1="335" y1="205" x2="335" y2="165" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <polyline points="325,175 335,165 345,175" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  <!-- Decorative dots -->
  <circle cx="50" cy="120" r="3" fill="#7C3AED" opacity="0.25"/>
  <circle cx="42" cy="140" r="2" fill="#A855F7" opacity="0.2"/>
  <circle cx="360" cy="260" r="3.5" fill="#C026D3" opacity="0.2"/>
  <circle cx="372" cy="245" r="2" fill="#7C3AED" opacity="0.18"/>
  <!-- Small decorative lines -->
  <line x1="350" y1="140" x2="370" y2="140" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="355" y1="148" x2="368" y2="148" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <!-- Growth percentage indicator -->
  <rect x="330" y="280" width="45" height="22" rx="4" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.1" opacity="0.4"/>
  <line x1="338" y1="291" x2="365" y2="291" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
</svg>
