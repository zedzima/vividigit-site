<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Target shadow -->
  <circle cx="183" cy="203" r="130" fill="#000" opacity="0.08"/>
  <!-- Outer ring -->
  <circle cx="180" cy="200" r="130" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Ring 2 -->
  <circle cx="180" cy="200" r="100" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.1"/>
  <!-- Ring 3 -->
  <circle cx="180" cy="200" r="70" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Ring 4 -->
  <circle cx="180" cy="200" r="40" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.14"/>
  <!-- Bullseye center -->
  <circle cx="180" cy="200" r="14" fill="#7C3AED" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="3"/>
  <!-- Arrow shadow -->
  <line x1="183" y1="203" x2="183" y2="93" stroke="#000" stroke-width="4" opacity="0.08"/>
  <!-- Arrow shaft -->
  <line x1="180" y1="200" x2="180" y2="90" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Arrow head -->
  <path d="M180 200 L172 188 L180 193 L188 188 Z" fill="#2E2D2D" opacity="0.9"/>
  <!-- Arrow hit point -->
  <circle cx="180" cy="200" r="5" fill="#C026D3" fill-opacity="0.5" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Arrow fletching -->
  <path d="M176 92 L170 80 L180 88" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.15"/>
  <path d="M184 92 L190 80 L180 88" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.15"/>
  <!-- Arrow nock -->
  <line x1="175" y1="88" x2="185" y2="88" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>
  <!-- Motion lines (impact) -->
  <line x1="158" y1="190" x2="148" y2="182" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="155" y1="205" x2="142" y2="205" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="158" y1="218" x2="148" y2="225" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="200" y1="218" x2="210" y2="225" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="202" y1="190" x2="212" y2="182" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Hand releasing arrow (right side) -->
  <!-- Arm -->
  <path d="M360 120 Q345 130 332 145 Q320 158 315 165" stroke="#2E2D2D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Hand -->
  <path d="M315 165 Q310 170 305 168 Q300 165 298 160 Q296 155 300 150 Q305 148 310 152 Q314 155 315 165" fill="#2E2D2D" opacity="0.85"/>
  <!-- Fingers releasing -->
  <path d="M298 160 Q294 155 296 150" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M302 163 Q296 162 295 158" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Forearm detail -->
  <path d="M355 125 Q348 128 342 135" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Bow string hint -->
  <path d="M310 145 Q315 155 315 165 Q315 175 310 185" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25" stroke-dasharray="3 3"/>
  <!-- Small secondary arrow (missed, in ring 3) -->
  <circle cx="148" cy="168" r="3" fill="#A855F7" fill-opacity="0.4" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="148" y1="168" x2="148" y2="142" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <!-- Decorative dots -->
  <circle cx="52" cy="80" r="3.5" fill="#7C3AED" opacity="0.25"/>
  <circle cx="38" cy="95" r="2" fill="#A855F7" opacity="0.2"/>
  <circle cx="340" cy="280" r="3" fill="#C026D3" opacity="0.2"/>
  <circle cx="355" cy="300" r="2" fill="#7C3AED" opacity="0.18"/>
  <circle cx="60" cy="340" r="2.5" fill="#A855F7" opacity="0.18"/>
  <!-- Decorative lines -->
  <line x1="330" y1="340" x2="350" y2="340" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="335" y1="348" x2="355" y2="348" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <line x1="40" y1="55" x2="55" y2="55" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <!-- Score badge -->
  <rect x="320" y="230" width="50" height="24" rx="5" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.1" opacity="0.45"/>
  <line x1="328" y1="242" x2="362" y2="242" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
</svg>
