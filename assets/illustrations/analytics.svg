<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Dashboard screen shadow -->
  <rect x="58" y="53" width="290" height="210" rx="12" fill="#000" opacity="0.08"/>
  <!-- Dashboard screen -->
  <rect x="55" y="50" width="290" height="210" rx="12" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.06"/>
  <!-- Screen top bar -->
  <rect x="55" y="50" width="290" height="28" rx="12" fill="#2E2D2D" opacity="0.08"/>
  <rect x="55" y="66" width="290" height="12" fill="#2E2D2D" opacity="0.08"/>
  <!-- Window dots -->
  <circle cx="74" cy="64" r="4" fill="#C026D3" opacity="0.4"/>
  <circle cx="88" cy="64" r="4" fill="#A855F7" opacity="0.35"/>
  <circle cx="102" cy="64" r="4" fill="#7C3AED" opacity="0.3"/>
  <!-- Screen stand -->
  <rect x="170" y="260" width="60" height="8" rx="2" fill="#2E2D2D" opacity="0.15"/>
  <trapezoid/>
  <path d="M185 260 L175 278 L225 278 L215 260" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" opacity="0.1"/>
  <rect x="165" y="278" width="70" height="6" rx="3" fill="#2E2D2D" opacity="0.2"/>
  <!-- Bar chart area -->
  <!-- Bar 1 -->
  <rect x="82" y="188" width="28" height="52" rx="3" fill="#7C3AED" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Bar 2 -->
  <rect x="118" y="158" width="28" height="82" rx="3" fill="#A855F7" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Bar 3 -->
  <rect x="154" y="128" width="28" height="112" rx="3" fill="#7C3AED" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Bar 4 -->
  <rect x="190" y="148" width="28" height="92" rx="3" fill="#C026D3" fill-opacity="0.16" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Bar chart baseline -->
  <line x1="75" y1="240" x2="225" y2="240" stroke="#2E2D2D" stroke-width="2" opacity="0.3"/>
  <!-- Line graph overlay on bars -->
  <polyline points="96,182 132,150 168,118 204,140" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line graph dots -->
  <circle cx="96" cy="182" r="4" fill="#7C3AED" fill-opacity="0.6" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="132" cy="150" r="4" fill="#A855F7" fill-opacity="0.6" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="168" cy="118" r="4" fill="#7C3AED" fill-opacity="0.6" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="204" cy="140" r="4" fill="#C026D3" fill-opacity="0.6" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Right panel - line graph area -->
  <rect x="240" y="90" width="90" height="65" rx="5" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Mini line graph -->
  <polyline points="252,138 268,125 280,130 295,108 318,100" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line graph area fill -->
  <path d="M252,138 L268,125 L280,130 L295,108 L318,100 L318,142 L252,142 Z" fill="#7C3AED" fill-opacity="0.1"/>
  <!-- Small pie chart -->
  <circle cx="265" cy="195" r="22" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <path d="M265,195 L265,173 A22,22 0 0,1 285,189 Z" fill="#7C3AED" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <path d="M265,195 L285,189 A22,22 0 0,1 270,217 Z" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- KPI text lines -->
  <line x1="295" y1="185" x2="325" y2="185" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="295" y1="195" x2="320" y2="195" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="295" y1="205" x2="315" y2="205" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Person silhouette pointing -->
  <!-- Head -->
  <circle cx="320" cy="305" r="14" fill="#2E2D2D" opacity="0.85"/>
  <!-- Body -->
  <path d="M306 320 Q310 345 310 365 L330 365 Q330 345 334 320 Z" fill="#2E2D2D" opacity="0.8"/>
  <!-- Pointing arm -->
  <path d="M310 328 Q290 310 265 285 Q260 280 258 275" stroke="#2E2D2D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Pointing hand/finger -->
  <path d="M258 275 L250 268 M258 275 L254 270 M258 275 L262 268" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Other arm -->
  <path d="M330 330 Q340 345 345 355" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Floating data points -->
  <circle cx="52" cy="320" r="5" fill="#7C3AED" opacity="0.25"/>
  <circle cx="40" cy="340" r="3" fill="#A855F7" opacity="0.2"/>
  <circle cx="365" cy="290" r="4" fill="#C026D3" opacity="0.2"/>
  <circle cx="380" cy="310" r="2.5" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative elements -->
  <line x1="30" y1="110" x2="42" y2="110" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="33" y1="118" x2="48" y2="118" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <circle cx="365" cy="80" r="3" fill="#A855F7" opacity="0.2"/>
  <circle cx="375" cy="95" r="2" fill="#7C3AED" opacity="0.15"/>
</svg>
