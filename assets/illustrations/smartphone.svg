<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for phone body -->
  <rect x="127" y="43" width="150" height="280" rx="18" fill="#000" opacity="0.08"/>
  <!-- Phone body -->
  <rect x="124" y="40" width="150" height="280" rx="18" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Screen area -->
  <rect x="136" y="58" width="126" height="244" rx="6" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.5"/>
  <!-- Status bar -->
  <line x1="146" y1="70" x2="168" y2="70" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="240" y1="70" x2="252" y2="70" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Signal bars -->
  <rect x="228" y="68" width="2" height="5" rx="0.5" fill="#2E2D2D" opacity="0.4"/>
  <rect x="232" y="66" width="2" height="7" rx="0.5" fill="#2E2D2D" opacity="0.4"/>
  <rect x="236" y="64" width="2" height="9" rx="0.5" fill="#2E2D2D" opacity="0.4"/>
  <!-- App wireframe: header bar -->
  <rect x="146" y="82" width="106" height="16" rx="3" fill="#A855F7" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- App wireframe: content card 1 -->
  <rect x="146" y="106" width="106" height="40" rx="4" fill="#C026D3" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="154" y1="118" x2="210" y2="118" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="154" y1="128" x2="195" y2="128" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="154" y1="136" x2="180" y2="136" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- App wireframe: content card 2 -->
  <rect x="146" y="154" width="106" height="40" rx="4" fill="#7C3AED" fill-opacity="0.10" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="154" y1="166" x2="218" y2="166" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="154" y1="176" x2="200" y2="176" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="154" y1="184" x2="188" y2="184" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- App wireframe: button -->
  <rect x="162" y="204" width="74" height="20" rx="10" fill="#7C3AED" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="180" y1="214" x2="218" y2="214" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Bottom nav bar -->
  <rect x="146" y="268" width="106" height="22" rx="3" fill="#2E2D2D" fill-opacity="0.06"/>
  <circle cx="168" cy="279" r="4" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <rect x="193" y="275" width="10" height="8" rx="1.5" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="228" cy="279" r="4" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Left hand holding phone -->
  <path d="M110,180 C100,165 95,155 95,145 L95,240 C95,250 100,260 108,265 L120,260 L120,185 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Left thumb -->
  <path d="M120,225 C112,220 106,212 108,205 C110,198 116,196 120,200" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.10" stroke-linejoin="round"/>
  <!-- Right hand holding phone -->
  <path d="M288,180 C298,165 303,155 303,145 L303,240 C303,250 298,260 290,265 L278,260 L278,185 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Right thumb -->
  <path d="M278,225 C286,220 292,212 290,205 C288,198 282,196 278,200" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.10" stroke-linejoin="round"/>
  <!-- Notification bubble 1 (top-right) -->
  <rect x="258" y="26" width="80" height="36" rx="8" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="258" y="26" width="80" height="36" rx="8" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.16"/>
  <circle cx="272" cy="38" r="5" fill="#7C3AED" fill-opacity="0.35"/>
  <line x1="282" y1="36" x2="326" y2="36" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="282" y1="48" x2="315" y2="48" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Notification bubble 2 (top-left) -->
  <rect x="52" y="52" width="62" height="30" rx="7" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="52" y="52" width="62" height="30" rx="7" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.14"/>
  <circle cx="66" cy="63" r="4" fill="#C026D3" fill-opacity="0.4"/>
  <line x1="76" y1="63" x2="104" y2="63" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="76" y1="73" x2="98" y2="73" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Notification bubble 3 (small, floating) -->
  <rect x="296" y="90" width="50" height="24" rx="6" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="296" y="90" width="50" height="24" rx="6" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.14"/>
  <line x1="306" y1="102" x2="336" y2="102" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Chat badge on notification 1 -->
  <circle cx="335" cy="28" r="9" fill="#C026D3" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <text x="332" y="32" font-family="sans-serif" font-size="10" fill="#2E2D2D" font-weight="bold">3</text>
  <!-- Decorative dots -->
  <circle cx="45" cy="150" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="355" cy="180" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="60" cy="330" r="2" fill="#C026D3" opacity="0.25"/>
  <circle cx="340" cy="310" r="3" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="42" y1="100" x2="56" y2="100" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="348" y1="260" x2="365" y2="260" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="55" y1="280" x2="68" y2="280" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>