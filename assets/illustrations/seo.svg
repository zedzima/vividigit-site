  <line x1="30" y1="130" x2="50" y2="130" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="355" y1="340" x2="375" y2="340" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
