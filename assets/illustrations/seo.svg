<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for SERP page -->
  <rect x="73" y="43" width="260" height="320" rx="12" fill="#000" opacity="0.08"/>
