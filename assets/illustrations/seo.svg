  <polygon points="98,118 100,113 102,118 107,118 103,122 105,127 100,124 95,127 97,122 93,118" fill="#7C3AED" opacity="0.4" transform="scale(0.7) translate(151, 43)"/>
  <polygon points="98,118 100,113 102,118 107,118 103,122 105,127 100,124 95,127 97,122 93,118" fill="#7C3AED" opacity="0.4" transform="scale(0.7) translate(164, 43)"/>
  <polygon points="98,118 100,113 102,118 107,118 103,122 105,127 100,124 95,127 97,122 93,118" fill="#7C3AED" opacity="0.2" transform="scale(0.7) translate(177, 43)"/>
