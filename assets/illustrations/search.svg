<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Shadow of magnifying glass -->
  <circle cx="173" cy="183" r="82" fill="#000" opacity="0.08"/>
  <!-- Magnifying glass lens -->
  <circle cx="170" cy="180" r="82" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Inner lens highlight -->
  <circle cx="150" cy="162" r="28" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Lens shine arc -->
  <path d="M130 140 Q140 125 158 120" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Handle shadow -->
  <line x1="233" y1="247" x2="293" y2="307" stroke="#000" stroke-width="20" stroke-linecap="round" opacity="0.08"/>
  <!-- Handle -->
  <line x1="230" y1="244" x2="290" y2="304" stroke="#2E2D2D" stroke-width="18" stroke-linecap="round"/>
  <!-- Handle inner -->
  <line x1="232" y1="246" x2="286" y2="300" stroke="#A855F7" stroke-width="8" stroke-linecap="round" opacity="0.15"/>
  <!-- Hand holding handle -->
  <path d="M270 280 Q285 272 298 280 Q310 290 305 305 Q300 315 288 318 L275 310 Q268 305 265 295 Z" fill="#2E2D2D" opacity="0.9"/>
  <!-- Thumb -->
  <path d="M268 290 Q260 282 265 275 Q270 270 278 274" stroke="#2E2D2D" stroke-width="3" fill="#2E2D2D" opacity="0.85"/>
  <!-- Fingers detail -->
  <path d="M288 285 Q295 288 298 295" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Document inside lens - webpage -->
  <rect x="140" y="155" width="60" height="50" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Document header bar -->
  <rect x="145" y="160" width="50" height="8" rx="2" fill="#2E2D2D" opacity="0.2"/>
  <!-- Document text lines -->
  <line x1="145" y1="175" x2="190" y2="175" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="145" y1="182" x2="183" y2="182" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="145" y1="189" x2="178" y2="189" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="145" y1="196" x2="170" y2="196" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Floating search result card 1 -->
  <rect x="48" y="68" width="70" height="38" rx="5" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="48" y="68" width="70" height="38" rx="5" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.14"/>
  <line x1="56" y1="78" x2="100" y2="78" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="56" y1="86" x2="92" y2="86" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="56" y1="93" x2="85" y2="93" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Floating search result card 2 -->
  <rect x="275" y="100" width="65" height="35" rx="5" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="275" y="100" width="65" height="35" rx="5" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.14"/>
  <line x1="283" y1="112" x2="325" y2="112" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="283" y1="120" x2="318" y2="120" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Floating search result card 3 -->
  <rect x="66" y="290" width="58" height="32" rx="5" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="66" y="290" width="58" height="32" rx="5" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <line x1="74" y1="301" x2="110" y2="301" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="74" y1="309" x2="102" y2="309" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Decorative dots -->
  <circle cx="320" cy="168" r="3" fill="#7C3AED" opacity="0.35"/>
  <circle cx="340" cy="185" r="2" fill="#A855F7" opacity="0.3"/>
  <circle cx="55" cy="250" r="2.5" fill="#C026D3" opacity="0.3"/>
  <circle cx="38" cy="135" r="2" fill="#7C3AED" opacity="0.25"/>
  <!-- Decorative small lines -->
  <line x1="310" y1="55" x2="325" y2="55" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="315" y1="62" x2="335" y2="62" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="45" y1="340" x2="60" y2="340" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Small search icon indicator -->
  <circle cx="330" cy="340" r="8" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.2"/>
  <line x1="336" y1="346" x2="342" y2="352" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
</svg>
