<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for main wireframe -->
  <rect x="63" y="43" width="230" height="310" rx="8" fill="#000" opacity="0.08"/>
  <!-- Main wireframe browser window -->
  <rect x="60" y="40" width="230" height="310" rx="8" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.08"/>
  <!-- Browser title bar -->
  <rect x="60" y="40" width="230" height="24" rx="8" fill="#2E2D2D" fill-opacity="0.08"/>
  <rect x="60" y="56" width="230" height="8" fill="#2E2D2D" fill-opacity="0.08"/>
  <!-- Window dots -->
  <circle cx="76" cy="52" r="3" fill="#C026D3" opacity="0.4"/>
  <circle cx="87" cy="52" r="3" fill="#A855F7" opacity="0.35"/>
  <circle cx="98" cy="52" r="3" fill="#7C3AED" opacity="0.3"/>
  <!-- URL bar -->
  <rect x="112" y="47" width="120" height="10" rx="4" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Header block -->
  <rect x="72" y="72" width="206" height="32" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.12" stroke-dasharray="6 3"/>
  <!-- Header text placeholder -->
  <line x1="82" y1="85" x2="140" y2="85" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="82" y1="95" x2="120" y2="95" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Navigation dots in header -->
  <circle cx="248" cy="85" r="2" fill="#2E2D2D" opacity="0.2"/>
  <circle cx="260" cy="85" r="2" fill="#2E2D2D" opacity="0.2"/>
  <!-- Sidebar -->
  <rect x="72" y="112" width="52" height="130" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.1" stroke-dasharray="6 3"/>
  <!-- Sidebar menu items -->
  <line x1="80" y1="125" x2="114" y2="125" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="80" y1="140" x2="110" y2="140" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="80" y1="155" x2="112" y2="155" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="80" y1="170" x2="108" y2="170" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Content block 1 (hero area) -->
  <rect x="132" y="112" width="146" height="55" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.1" stroke-dasharray="6 3"/>
  <!-- Image placeholder inside content block 1 -->
  <path d="M148 150 L165 135 L180 148 L195 130 L215 155 Z" stroke="#2E2D2D" stroke-width="1" fill="#7C3AED" fill-opacity="0.08" stroke-linejoin="round" opacity="0.5"/>
  <circle cx="252" cy="128" r="6" fill="#A855F7" fill-opacity="0.1" stroke="#2E2D2D" stroke-width="1" opacity="0.3"/>
  <!-- Content block 2 (being dragged - offset and tilted) -->
  <rect x="138" y="178" width="65" height="40" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.15" transform="rotate(-3 170 198)"/>
  <line x1="148" y1="190" x2="192" y2="190" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3" transform="rotate(-3 170 190)"/>
  <line x1="148" y1="202" x2="185" y2="202" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2" transform="rotate(-3 165 202)"/>
  <!-- Content block 3 -->
  <rect x="212" y="175" width="65" height="40" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.1" stroke-dasharray="6 3"/>
  <line x1="220" y1="188" x2="265" y2="188" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="220" y1="200" x2="258" y2="200" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Footer block -->
  <rect x="72" y="252" width="206" height="28" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#2E2D2D" fill-opacity="0.06" stroke-dasharray="6 3"/>
  <line x1="82" y1="266" x2="160" y2="266" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <!-- Drag handle on block 2 -->
  <rect x="158" y="174" width="18" height="6" rx="2" fill="#7C3AED" opacity="0.3" transform="rotate(-3 167 177)"/>
  <!-- Hand dragging block -->
  <path d="M145 160 C135 155 128 148 125 142 C122 136 128 132 132 138 C130 130 136 128 140 134 C140 126 148 126 148 134 L148 155 C148 162 142 168 138 166 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12" stroke-linejoin="round"/>
  <!-- Drag motion lines -->
  <line x1="168" y1="228" x2="168" y2="238" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="178" y1="230" x2="178" y2="238" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Mobile wireframe (right side, smaller) -->
  <rect x="315" y="105" width="60" height="110" rx="6" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Mobile screen -->
  <rect x="320" y="118" width="50" height="85" rx="2" fill="none" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <!-- Mobile header -->
  <rect x="323" y="121" width="44" height="10" rx="1" fill="#7C3AED" fill-opacity="0.1"/>
  <line x1="326" y1="126" x2="350" y2="126" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Mobile content blocks -->
  <rect x="323" y="135" width="44" height="16" rx="1" stroke="#2E2D2D" stroke-width="1" fill="#C026D3" fill-opacity="0.08" opacity="0.5"/>
  <rect x="323" y="155" width="44" height="12" rx="1" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Mobile home indicator -->
  <rect x="337" y="207" width="16" height="3" rx="1.5" fill="#2E2D2D" opacity="0.15"/>
  <!-- Responsive arrow between screens -->
  <path d="M295 160 L308 160" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <path d="M305 155 L312 160 L305 165" stroke="#2E2D2D" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>
  <!-- Small ruler (bottom area) -->
  <rect x="310" y="265" width="70" height="10" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <line x1="320" y1="265" x2="320" y2="275" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <line x1="340" y1="265" x2="340" y2="275" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <line x1="360" y1="265" x2="360" y2="275" stroke="#2E2D2D" stroke-width="1" opacity="0.15"/>
  <!-- Decorative dots -->
  <circle cx="355" cy="55" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="370" cy="70" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="30" cy="300" r="2.5" fill="#C026D3" opacity="0.25"/>
  <!-- Decorative small lines -->
  <line x1="20" y1="180" x2="42" y2="180" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>