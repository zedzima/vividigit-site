<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for ad placement card -->
  <rect x="78" y="48" width="250" height="160" rx="10" fill="#000" opacity="0.08"/>
  <!-- Ad placement card -->
  <rect x="75" y="45" width="250" height="160" rx="10" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Ad card inner area -->
  <rect x="90" y="60" width="220" height="130" rx="4" fill="white" fill-opacity="0.45" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Sponsored badge -->
  <rect x="98" y="68" width="68" height="18" rx="9" fill="#A855F7" fill-opacity="0.22" stroke="#2E2D2D" stroke-width="1.5"/>
  <text x="108" y="81" font-family="sans-serif" font-size="9" fill="#2E2D2D" font-weight="bold" opacity="0.6">Sponsored</text>
  <!-- Ad title -->
  <line x1="98" y1="100" x2="270" y2="100" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Ad URL -->
  <line x1="98" y1="114" x2="200" y2="114" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Ad description line 1 -->
  <line x1="98" y1="130" x2="290" y2="130" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Ad description line 2 -->
  <line x1="98" y1="142" x2="265" y2="142" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.22"/>
  <!-- CTA button in ad -->
  <rect x="98" y="156" width="80" height="22" rx="11" fill="#7C3AED" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="1.5"/>
  <line x1="115" y1="167" x2="162" y2="167" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Bid amount indicator (top-right of card) -->
  <rect x="250" y="64" width="52" height="20" rx="4" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>
  <text x="258" y="78" font-family="monospace" font-size="10" fill="#2E2D2D" font-weight="bold" opacity="0.5">$2.40</text>
  <!-- Cursor clicking on the CTA button -->
  <path d="M155,175 L155,155 L168,165 L160,167 L165,178 L159,180 L154,169 Z" fill="#2E2D2D" opacity="0.85" stroke="#2E2D2D" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Cursor shadow -->
  <path d="M158,178 L158,158 L171,168 L163,170 L168,181 L162,183 L157,172 Z" fill="#000" opacity="0.08"/>
  <!-- Click ripple effect -->
  <circle cx="155" cy="168" r="20" stroke="#A855F7" stroke-width="1.5" fill="none" opacity="0.2"/>
  <circle cx="155" cy="168" r="30" stroke="#A855F7" stroke-width="1" fill="none" opacity="0.1"/>
  <!-- Money/coins flowing from click -->
  <!-- Coin 1 -->
  <circle cx="185" cy="220" r="14" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <circle cx="185" cy="220" r="14" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.18"/>
  <text x="181" y="225" font-family="sans-serif" font-size="14" fill="#2E2D2D" font-weight="bold" opacity="0.5">$</text>
  <!-- Coin 2 -->
  <circle cx="220" cy="245" r="12" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <circle cx="220" cy="245" r="12" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.16"/>
  <text x="216" y="250" font-family="sans-serif" font-size="12" fill="#2E2D2D" font-weight="bold" opacity="0.45">$</text>
  <!-- Coin 3 -->
  <circle cx="160" cy="255" r="10" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <circle cx="160" cy="255" r="10" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.16"/>
  <text x="157" y="259" font-family="sans-serif" font-size="10" fill="#2E2D2D" font-weight="bold" opacity="0.4">$</text>
  <!-- Coin 4 (small) -->
  <circle cx="200" cy="268" r="8" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.12"/>
  <text x="197" y="272" font-family="sans-serif" font-size="8" fill="#2E2D2D" font-weight="bold" opacity="0.35">$</text>
  <!-- Flow lines from click to coins -->
  <path d="M160,185 C165,200 175,210 185,215" stroke="#A855F7" stroke-width="1.5" fill="none" stroke-dasharray="3,3" opacity="0.3"/>
  <path d="M165,185 C180,205 200,225 220,240" stroke="#A855F7" stroke-width="1.5" fill="none" stroke-dasharray="3,3" opacity="0.25"/>
  <!-- Targeting reticle (left side) -->
  <circle cx="42" cy="130" r="22" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.10"/>
  <circle cx="42" cy="130" r="12" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="42" cy="130" r="3" fill="#C026D3" opacity="0.4"/>
  <line x1="42" y1="104" x2="42" y2="114" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="42" y1="146" x2="42" y2="156" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="16" y1="130" x2="26" y2="130" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="58" y1="130" x2="68" y2="130" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Small CPC chart (bottom-right) -->
  <rect x="280" y="280" width="90" height="70" rx="6" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="280" y="280" width="90" height="70" rx="6" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.10"/>
  <!-- Chart label -->
  <text x="290" y="296" font-family="sans-serif" font-size="8" fill="#2E2D2D" font-weight="bold" opacity="0.4">CPC</text>
  <!-- Chart bars -->
  <rect x="294" y="325" width="10" height="18" rx="1.5" fill="#7C3AED" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1"/>
  <rect x="310" y="315" width="10" height="28" rx="1.5" fill="#A855F7" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1"/>
  <rect x="326" y="308" width="10" height="35" rx="1.5" fill="#7C3AED" fill-opacity="0.35" stroke="#2E2D2D" stroke-width="1"/>
  <rect x="342" y="320" width="10" height="23" rx="1.5" fill="#C026D3" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="1"/>
  <!-- Chart baseline -->
  <line x1="290" y1="343" x2="358" y2="343" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <!-- Trend line on chart -->
  <polyline points="299,322 315,312 331,305 347,316" stroke="#C026D3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="50" cy="250" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="355" cy="220" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="40" cy="340" r="2" fill="#C026D3" opacity="0.25"/>
  <circle cx="130" cy="310" r="3" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="330" y1="40" x2="350" y2="40" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="35" y1="60" x2="55" y2="60" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="260" y1="370" x2="280" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>