<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Eye outer shape shadow -->
  <path d="M23 203 Q100 108 200 108 Q300 108 377 203 Q300 298 200 298 Q100 298 23 203 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Eye outer shape -->
  <path d="M20 200 Q100 105 200 105 Q300 105 380 200 Q300 295 200 295 Q100 295 20 200 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.06"/>
  <!-- Upper eyelid line (thicker for emphasis) -->
  <path d="M20 200 Q100 105 200 105 Q300 105 380 200" stroke="#2E2D2D" stroke-width="4" fill="none"/>
  <!-- Lower eyelid line -->
  <path d="M20 200 Q100 295 200 295 Q300 295 380 200" stroke="#2E2D2D" stroke-width="3" fill="none"/>
  <!-- Eyelash lines (top) -->
  <line x1="100" y1="130" x2="90" y2="110" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="145" y1="115" x2="138" y2="94" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="200" y1="105" x2="200" y2="82" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="255" y1="115" x2="262" y2="94" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="300" y1="130" x2="310" y2="110" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Iris outer -->
  <circle cx="200" cy="200" r="65" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.14"/>
  <!-- Iris inner -->
  <circle cx="200" cy="200" r="42" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.18"/>
  <!-- Pupil -->
  <circle cx="200" cy="200" r="18" fill="#2E2D2D" opacity="0.85"/>
  <!-- Pupil highlight -->
  <circle cx="192" cy="192" r="5" fill="white" opacity="0.6"/>
  <circle cx="208" cy="196" r="2.5" fill="white" opacity="0.4"/>
  <!-- Data/chart pattern inside iris -->
  <!-- Mini bar chart in iris -->
  <rect x="168" y="218" width="8" height="16" rx="1" fill="#2E2D2D" opacity="0.25"/>
  <rect x="180" y="212" width="8" height="22" rx="1" fill="#2E2D2D" opacity="0.3"/>
  <rect x="192" y="222" width="8" height="12" rx="1" fill="#2E2D2D" opacity="0.25"/>
  <!-- Mini trend line in iris -->
  <polyline points="215,230 225,222 235,226 245,215" stroke="#2E2D2D" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Data dots in iris ring -->
  <circle cx="165" cy="175" r="2" fill="#C026D3" opacity="0.35"/>
  <circle cx="178" cy="162" r="1.5" fill="#7C3AED" opacity="0.3"/>
  <circle cx="222" cy="162" r="1.5" fill="#A855F7" opacity="0.3"/>
  <circle cx="235" cy="175" r="2" fill="#C026D3" opacity="0.35"/>
  <!-- Magnifier lens overlay -->
  <!-- Magnifier glass -->
  <circle cx="245" cy="175" r="38" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.08"/>
  <!-- Magnifier inner highlight -->
  <path d="M225 158 Q232 148 245 145" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.2" stroke-linecap="round"/>
  <!-- Magnifier handle -->
  <line x1="272" y1="203" x2="310" y2="245" stroke="#2E2D2D" stroke-width="10" stroke-linecap="round"/>
  <line x1="273" y1="204" x2="308" y2="243" stroke="#A855F7" stroke-width="4" stroke-linecap="round" opacity="0.15"/>
  <!-- Zoomed data inside magnifier -->
  <rect x="228" y="163" width="12" height="10" rx="1.5" fill="#7C3AED" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="244" y="158" width="12" height="15" rx="1.5" fill="#A855F7" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="260" y="168" width="12" height="5" rx="1.5" fill="#C026D3" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Rays emanating outward -->
  <line x1="58" y1="155" x2="40" y2="140" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="50" y1="200" x2="28" y2="200" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="58" y1="245" x2="40" y2="260" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="342" y1="155" x2="360" y2="140" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="350" y1="200" x2="372" y2="200" stroke="#C026D3" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Decorative dots -->
  <circle cx="30" cy="120" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="370" cy="120" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="70" cy="340" r="2.5" fill="#C026D3" opacity="0.2"/>
  <circle cx="330" cy="330" r="3" fill="#7C3AED" opacity="0.18"/>
  <!-- Decorative lines -->
  <line x1="60" y1="55" x2="78" y2="55" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="64" y1="63" x2="75" y2="63" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <line x1="330" y1="350" x2="350" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>
