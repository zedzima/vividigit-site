<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === TRANSLATE: Two speech bubbles with language chars, bridge connecting === -->

  <!-- Left speech bubble shadow -->
  <path d="M33 83 Q33 53 63 53 L183 53 Q213 53 213 83 L213 183 Q213 213 183 213 L103 213 L73 253 L83 213 L63 213 Q33 213 33 183 Z" fill="#000" opacity="0.08" transform="translate(3,4)"/>
  <!-- Left speech bubble -->
  <path d="M30 80 Q30 50 60 50 L180 50 Q210 50 210 80 L210 180 Q210 210 180 210 L100 210 L70 250 L80 210 L60 210 Q30 210 30 180 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.14"/>

  <!-- Letter "A" inside left bubble -->
  <text x="120" y="155" text-anchor="middle" fill="#2E2D2D" font-size="64" font-weight="bold" font-family="Georgia, serif" opacity="0.55">A</text>
  <!-- Smaller "Bc" below -->
  <text x="120" y="190" text-anchor="middle" fill="#2E2D2D" font-size="22" font-family="Georgia, serif" opacity="0.3">Bc</text>

  <!-- Right speech bubble shadow -->
  <path d="M193 153 Q193 123 223 123 L343 123 Q373 123 373 153 L373 253 Q373 283 343 283 L303 283 L333 323 L313 283 L223 283 Q193 283 193 253 Z" fill="#000" opacity="0.08" transform="translate(3,4)"/>
  <!-- Right speech bubble -->
  <path d="M190 150 Q190 120 220 120 L340 120 Q370 120 370 150 L370 250 Q370 280 340 280 L300 280 L330 320 L310 280 L220 280 Q190 280 190 250 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#C026D3" fill-opacity="0.14"/>

  <!-- CJK character inside right bubble -->
  <text x="280" y="220" text-anchor="middle" fill="#2E2D2D" font-size="58" font-weight="bold" opacity="0.55">&#25991;</text>
  <!-- Smaller characters below -->
  <text x="280" y="258" text-anchor="middle" fill="#2E2D2D" font-size="20" opacity="0.3">&#23383;&#20307;</text>

  <!-- Bridge/arrow connecting the two bubbles -->
  <!-- Bridge structure -->
  <path d="M205 155 Q225 140 240 155" stroke="#2E2D2D" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Bridge pillars -->
  <line x1="208" y1="155" x2="208" y2="168" stroke="#2E2D2D" stroke-width="2.5" opacity="0.4"/>
  <line x1="237" y1="155" x2="237" y2="168" stroke="#2E2D2D" stroke-width="2.5" opacity="0.4"/>
  <!-- Bridge deck -->
  <line x1="205" y1="168" x2="240" y2="168" stroke="#2E2D2D" stroke-width="2.5" opacity="0.4"/>

  <!-- Bidirectional arrows through bridge -->
  <path d="M170 175 L190 175" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M186 171 L192 175 L186 179" stroke="#7C3AED" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M255 182 L235 182" stroke="#C026D3" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M239 178 L233 182 L239 186" stroke="#C026D3" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Small globe (bottom left) -->
  <circle cx="65" cy="320" r="22" fill="#000" opacity="0.08" transform="translate(2,2)"/>
  <circle cx="63" cy="318" r="22" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Globe meridians -->
  <ellipse cx="63" cy="318" rx="10" ry="22" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25"/>
  <line x1="41" y1="318" x2="85" y2="318" stroke="#2E2D2D" stroke-width="1.5" opacity="0.25"/>
  <!-- Globe parallels -->
  <ellipse cx="63" cy="306" rx="18" ry="5" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.2"/>
  <ellipse cx="63" cy="330" rx="18" ry="5" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- Translation lines (like document) -->
  <rect x="310" y="325" width="55" height="42" rx="4" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.10"/>
  <line x1="318" y1="336" x2="355" y2="336" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="318" y1="345" x2="348" y2="345" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="318" y1="354" x2="342" y2="354" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Swap icon on document -->
  <path d="M340 330 L348 326 L348 334 Z" fill="#2E2D2D" opacity="0.2"/>

  <!-- Floating language tag "EN" -->
  <rect x="28" y="265" width="30" height="18" rx="4" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.12"/>
  <text x="43" y="278" text-anchor="middle" fill="#2E2D2D" font-size="10" font-weight="bold" opacity="0.45">EN</text>

  <!-- Floating language tag "ZH" -->
  <rect x="340" cy="95" width="30" height="18" rx="4" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.12" y="85"/>
  <text x="355" y="98" text-anchor="middle" fill="#2E2D2D" font-size="10" font-weight="bold" opacity="0.45">ZH</text>

  <!-- Decorative dots -->
  <circle cx="150" cy="300" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="250" cy="350" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="20" cy="140" r="2" fill="#C026D3" opacity="0.22"/>
  <circle cx="385" cy="180" r="2.5" fill="#7C3AED" opacity="0.2"/>
  <circle cx="200" cy="40" r="2" fill="#A855F7" opacity="0.25"/>

  <!-- Decorative small lines -->
  <line x1="160" y1="35" x2="180" y2="35" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="375" y1="310" x2="392" y2="310" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="130" y1="370" x2="150" y2="370" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>