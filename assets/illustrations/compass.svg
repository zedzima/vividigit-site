<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for compass body -->
  <circle cx="203" cy="173" r="95" fill="#000" opacity="0.08"/>
  <!-- Compass body -->
  <circle cx="200" cy="170" r="95" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Inner ring -->
  <circle cx="200" cy="170" r="75" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.4"/>
  <!-- Inner dial circle -->
  <circle cx="200" cy="170" r="55" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Cardinal direction ticks -->
  <line x1="200" y1="100" x2="200" y2="110" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="230" x2="200" y2="240" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="170" x2="140" y2="170" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <line x1="260" y1="170" x2="270" y2="170" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Direction labels -->
  <text x="195" y="128" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7C3AED">N</text>
  <text x="196" y="222" font-family="sans-serif" font-size="12" fill="#2E2D2D" opacity="0.5">S</text>
  <text x="148" y="175" font-family="sans-serif" font-size="12" fill="#2E2D2D" opacity="0.5">W</text>
  <text x="242" y="175" font-family="sans-serif" font-size="12" fill="#2E2D2D" opacity="0.5">E</text>
  <!-- Needle north half (purple) -->
  <polygon points="200,118 193,170 207,170" fill="#7C3AED" fill-opacity="0.7" stroke="#2E2D2D" stroke-width="2" stroke-linejoin="round"/>
  <!-- Needle south half -->
  <polygon points="200,222 193,170 207,170" fill="#2E2D2D" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2" stroke-linejoin="round"/>
  <!-- Needle center pin -->
  <circle cx="200" cy="170" r="5" fill="#2E2D2D"/>
  <circle cx="200" cy="170" r="2.5" fill="#7C3AED"/>
  <!-- Hand holding compass -->
  <path d="M140,290 C130,270 115,260 110,250 C105,240 110,230 120,235 L125,240 C120,228 128,222 135,228 C132,218 140,214 145,222 C144,212 152,210 155,220 L160,250 C162,270 155,285 148,298 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Thumb detail -->
  <path d="M150,252 Q148,244 152,238" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Wrist/arm -->
  <path d="M140,298 Q130,320 125,345 L165,345 Q160,320 148,298" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.10" stroke-linejoin="round"/>
  <!-- Map elements in background - terrain lines -->
  <path d="M280,280 Q310,260 330,280 Q350,300 370,290" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.15"/>
  <path d="M270,300 Q300,280 320,300 Q340,320 360,310" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.12"/>
  <path d="M290,320 Q310,305 330,320 Q350,335 370,325" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.10"/>
  <!-- Map grid lines -->
  <line x1="270" y1="270" x2="270" y2="340" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <line x1="310" y1="270" x2="310" y2="340" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <line x1="350" y1="270" x2="350" y2="340" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <line x1="270" y1="300" x2="370" y2="300" stroke="#2E2D2D" stroke-width="1" opacity="0.1"/>
  <!-- Dotted path trail -->
  <circle cx="290" cy="290" r="2" fill="#7C3AED" opacity="0.4"/>
  <circle cx="300" cy="285" r="2" fill="#7C3AED" opacity="0.35"/>
  <circle cx="312" cy="282" r="2" fill="#7C3AED" opacity="0.3"/>
  <circle cx="324" cy="284" r="2" fill="#7C3AED" opacity="0.25"/>
  <circle cx="335" cy="290" r="2" fill="#7C3AED" opacity="0.2"/>
  <circle cx="345" cy="298" r="2" fill="#7C3AED" opacity="0.15"/>
  <!-- Location marker at end of trail -->
  <path d="M345,295 C345,288 350,284 355,284 C360,284 365,288 365,295 C365,302 355,312 355,312 C355,312 345,302 345,295 Z" fill="#C026D3" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <circle cx="355" cy="294" r="2.5" fill="#2E2D2D" opacity="0.4"/>
  <!-- Decorative small compass rose top-right -->
  <circle cx="330" cy="65" r="14" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.10"/>
  <line x1="330" y1="53" x2="330" y2="77" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <line x1="318" y1="65" x2="342" y2="65" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="55" cy="80" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="40" cy="100" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="70" cy="350" r="2.5" fill="#C026D3" opacity="0.25"/>
  <circle cx="370" cy="200" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="30" y1="160" x2="50" y2="160" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="35" y1="168" x2="48" y2="168" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.1"/>
</svg>