<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for monitor -->
  <rect x="63" y="47" width="280" height="195" rx="12" fill="#000" opacity="0.08"/>
  <!-- Monitor body -->
  <rect x="60" y="44" width="280" height="195" rx="12" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Screen area -->
  <rect x="74" y="58" width="252" height="165" rx="6" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.45"/>
  <!-- Dashboard: sidebar -->
  <rect x="82" y="66" width="50" height="149" rx="3" fill="#A855F7" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Sidebar nav items -->
  <rect x="88" y="78" width="36" height="6" rx="2" fill="#2E2D2D" opacity="0.25"/>
  <rect x="88" y="92" width="30" height="6" rx="2" fill="#7C3AED" opacity="0.4"/>
  <rect x="88" y="106" width="34" height="6" rx="2" fill="#2E2D2D" opacity="0.2"/>
  <rect x="88" y="120" width="28" height="6" rx="2" fill="#2E2D2D" opacity="0.2"/>
  <rect x="88" y="134" width="32" height="6" rx="2" fill="#2E2D2D" opacity="0.2"/>
  <!-- Dashboard: header area -->
  <rect x="140" y="66" width="178" height="28" rx="3" fill="#C026D3" fill-opacity="0.10" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="150" y="75" width="70" height="6" rx="2" fill="#2E2D2D" opacity="0.3"/>
  <circle cx="302" cy="80" r="6" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.2"/>
  <!-- Dashboard: card 1 -->
  <rect x="140" y="102" width="84" height="54" rx="4" fill="#7C3AED" fill-opacity="0.14" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="150" y="112" width="40" height="5" rx="2" fill="#2E2D2D" opacity="0.3"/>
  <rect x="150" y="124" width="60" height="8" rx="2" fill="#7C3AED" opacity="0.3"/>
  <!-- Mini bar chart in card 1 -->
  <rect x="152" y="142" width="6" height="8" rx="1" fill="#7C3AED" opacity="0.4"/>
  <rect x="162" y="138" width="6" height="12" rx="1" fill="#A855F7" opacity="0.4"/>
  <rect x="172" y="140" width="6" height="10" rx="1" fill="#7C3AED" opacity="0.4"/>
  <rect x="182" y="135" width="6" height="15" rx="1" fill="#A855F7" opacity="0.4"/>
  <!-- Dashboard: card 2 -->
  <rect x="232" y="102" width="86" height="54" rx="4" fill="#A855F7" fill-opacity="0.12" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="242" y="112" width="45" height="5" rx="2" fill="#2E2D2D" opacity="0.3"/>
  <rect x="242" y="124" width="55" height="8" rx="2" fill="#A855F7" opacity="0.3"/>
  <!-- Mini line chart in card 2 -->
  <polyline points="244,148 254,142 264,146 274,138 284,140 294,132" stroke="#C026D3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Dashboard: bottom row -->
  <rect x="140" y="164" width="178" height="44" rx="4" fill="#C026D3" fill-opacity="0.08" stroke="#2E2D2D" stroke-width="1.5"/>
  <rect x="150" y="174" width="80" height="5" rx="2" fill="#2E2D2D" opacity="0.25"/>
  <rect x="150" y="186" width="140" height="5" rx="2" fill="#2E2D2D" opacity="0.15"/>
  <rect x="150" y="196" width="100" height="5" rx="2" fill="#2E2D2D" opacity="0.15"/>
  <!-- Monitor stand -->
  <rect x="175" y="239" width="50" height="25" rx="3" stroke="#2E2D2D" stroke-width="3" fill="#2E2D2D" fill-opacity="0.06"/>
  <ellipse cx="200" cy="268" rx="55" ry="8" stroke="#2E2D2D" stroke-width="3" fill="#2E2D2D" fill-opacity="0.06"/>
  <!-- Sticky note 1 (top-right of monitor) -->
  <rect x="348" y="52" width="38" height="38" rx="2" fill="#7C3AED" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2" transform="rotate(5 367 71)"/>
  <line x1="354" y1="64" x2="378" y2="64" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3" transform="rotate(5 367 71)"/>
  <line x1="354" y1="74" x2="374" y2="74" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3" transform="rotate(5 367 71)"/>
  <!-- Sticky note 2 -->
  <rect x="350" y="100" width="34" height="34" rx="2" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2" transform="rotate(-3 367 117)"/>
  <line x1="356" y1="112" x2="376" y2="112" stroke="#2E2D2D" stroke-width="1.5" opacity="0.3" transform="rotate(-3 367 117)"/>
  <!-- Coffee cup shadow -->
  <ellipse cx="358" cy="260" rx="22" ry="5" fill="#000" opacity="0.06"/>
  <!-- Coffee cup -->
  <path d="M338,230 L340,256 Q340,262 348,262 L366,262 Q374,262 374,256 L376,230 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Cup handle -->
  <path d="M376,236 C386,236 390,244 386,252 L374,252" stroke="#2E2D2D" stroke-width="2.5" fill="none"/>
  <!-- Steam lines -->
  <path d="M350,224 C350,218 356,218 356,212" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M362,222 C362,216 368,216 368,210" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <!-- Decorative dots -->
  <circle cx="30" cy="80" r="3" fill="#7C3AED" opacity="0.25"/>
  <circle cx="22" cy="120" r="2" fill="#A855F7" opacity="0.2"/>
  <circle cx="38" cy="300" r="3" fill="#C026D3" opacity="0.2"/>
  <!-- Small decorative lines -->
  <line x1="16" y1="180" x2="40" y2="180" stroke="#7C3AED" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <line x1="20" y1="190" x2="36" y2="190" stroke="#A855F7" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
</svg>