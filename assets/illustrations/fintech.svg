<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Smartphone shadow -->
  <rect x="123" y="63" width="160" height="280" rx="18" fill="#000" opacity="0.08"/>
  <!-- Smartphone body -->
  <rect x="120" y="60" width="160" height="280" rx="18" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Screen area -->
  <rect x="134" y="82" width="132" height="230" rx="4" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.5"/>
  <!-- Notch -->
  <rect x="175" y="64" width="50" height="8" rx="4" fill="#2E2D2D" opacity="0.25"/>
  <!-- Chart - bar chart -->
  <rect x="148" y="200" width="16" height="50" rx="2" fill="#7C3AED" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="170" y="175" width="16" height="75" rx="2" fill="#A855F7" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="192" y="160" width="16" height="90" rx="2" fill="#C026D3" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="214" y="185" width="16" height="65" rx="2" fill="#7C3AED" fill-opacity="0.18" stroke="#2E2D2D" stroke-width="2"/>
  <rect x="236" y="145" width="16" height="105" rx="2" fill="#A855F7" fill-opacity="0.20" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Chart line (trend) -->
  <polyline points="156,195 178,170 200,155 222,180 244,140" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chart dots -->
  <circle cx="156" cy="195" r="3" fill="#2E2D2D"/>
  <circle cx="178" cy="170" r="3" fill="#2E2D2D"/>
  <circle cx="200" cy="155" r="3" fill="#2E2D2D"/>
  <circle cx="222" cy="180" r="3" fill="#2E2D2D"/>
  <circle cx="244" cy="140" r="3" fill="#2E2D2D"/>
  <!-- Balance text lines -->
  <line x1="148" y1="100" x2="210" y2="100" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="148" y1="112" x2="240" y2="112" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="148" y1="126" x2="195" y2="126" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Screen bottom nav dots -->
  <circle cx="175" cy="295" r="3" fill="#2E2D2D" opacity="0.2"/>
  <circle cx="200" cy="295" r="3" fill="#7C3AED" opacity="0.4"/>
  <circle cx="225" cy="295" r="3" fill="#2E2D2D" opacity="0.2"/>
  <!-- Credit card shadow -->
  <rect x="258" y="78" width="105" height="68" rx="8" fill="#000" opacity="0.08" transform="rotate(-12 310 112)"/>
  <!-- Credit card -->
  <rect x="255" y="75" width="105" height="68" rx="8" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.15" transform="rotate(-12 308 109)"/>
  <!-- Card chip -->
  <rect x="272" y="92" width="18" height="13" rx="2.5" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.12" transform="rotate(-12 281 98)"/>
  <!-- Card lines -->
  <line x1="270" y1="118" x2="340" y2="106" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="272" y1="128" x2="315" y2="119" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Hands holding phone - left hand -->
  <path d="M108 230 Q100 220 98 200 Q96 185 102 178 Q108 172 114 178 L118 200 L118 250 Q112 255 108 245 Z" fill="#2E2D2D" opacity="0.85"/>
  <!-- Left thumb -->
  <path d="M114 178 Q120 168 126 172 Q132 178 130 188 L126 190" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" opacity="0.8"/>
  <!-- Right hand -->
  <path d="M292 230 Q300 220 302 200 Q304 185 298 178 Q292 172 286 178 L282 200 L282 250 Q288 255 292 245 Z" fill="#2E2D2D" opacity="0.85"/>
  <!-- Right thumb -->
  <path d="M286 178 Q280 168 274 172 Q268 178 270 188 L274 190" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" opacity="0.8"/>
  <!-- Dollar sign floating -->
  <text x="58" y="130" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2E2D2D" opacity="0.25">$</text>
  <text x="78" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7C3AED" opacity="0.30">$</text>
  <!-- Crypto symbol (Bitcoin-style) -->
  <circle cx="65" cy="260" r="14" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.12"/>
  <text x="58" y="266" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2E2D2D" opacity="0.5">₿</text>
  <!-- Secure lock -->
  <rect x="320" y="270" width="22" height="18" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.14"/>
  <path d="M325 270 L325 262 Q331 250 337 262 L337 270" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="331" cy="280" r="2" fill="#2E2D2D" opacity="0.5"/>
  <!-- Decorative dots -->
  <circle cx="45" cy="85" r="2.5" fill="#7C3AED" opacity="0.3"/>
  <circle cx="355" cy="200" r="2" fill="#C026D3" opacity="0.3"/>
  <circle cx="340" cy="340" r="3" fill="#A855F7" opacity="0.25"/>
  <circle cx="52" cy="340" r="2" fill="#7C3AED" opacity="0.25"/>
  <!-- Decorative lines -->
  <line x1="40" y1="195" x2="58" y2="195" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="345" y1="155" x2="365" y2="155" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="60" y1="365" x2="80" y2="365" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>