<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Padlock body shadow -->
  <rect x="113" y="178" width="150" height="120" rx="12" fill="#000" opacity="0.08"/>
  <!-- Padlock shackle shadow -->
  <path d="M143,178 L143,128 C143,88 168,68 193,68 C218,68 243,88 243,128 L243,178" stroke="#000" stroke-width="18" fill="none" opacity="0.08" stroke-linecap="round"/>
  <!-- Padlock shackle -->
  <path d="M140,175 L140,125 C140,85 165,65 190,65 C215,65 240,85 240,125 L240,175" stroke="#2E2D2D" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Shackle inner gap -->
  <path d="M155,175 L155,130 C155,100 170,82 190,82 C210,82 225,100 225,130 L225,175" stroke="#7C3AED" stroke-width="4" fill="none" fill-opacity="0.1" stroke-linecap="round" opacity="0.15"/>
  <!-- Padlock body -->
  <rect x="110" y="175" width="150" height="120" rx="12" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.14"/>
  <!-- Padlock face plate -->
  <rect x="125" y="190" width="120" height="90" rx="6" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <!-- Keyhole -->
  <circle cx="185" cy="228" r="14" stroke="#2E2D2D" stroke-width="3" fill="#2E2D2D" fill-opacity="0.15"/>
  <path d="M185,240 L180,265 L190,265 Z" fill="#2E2D2D" fill-opacity="0.15" stroke="#2E2D2D" stroke-width="2" stroke-linejoin="round"/>
  <!-- Key shadow -->
  <path d="M293,213 L343,213 L343,223 L328,223 L328,233 L318,233 L318,223 L293,223 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Key -->
  <path d="M290,210 L340,210 L340,220 L325,220 L325,230 L315,230 L315,220 L290,220 Z" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.15" stroke-linejoin="round"/>
  <!-- Key ring -->
  <circle cx="280" cy="215" r="18" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.12"/>
  <circle cx="280" cy="215" r="8" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.3"/>
  <!-- Hand turning the key -->
  <path d="M310,260 C318,252 328,248 335,250 C342,252 344,260 338,266 L332,270 C340,262 346,260 350,264 C355,270 348,280 340,282 L325,285 C312,288 302,280 300,272 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Forearm -->
  <path d="M335,282 Q355,300 370,330 L345,340 Q335,312 318,290" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.10"/>
  <!-- Finger detail -->
  <path d="M325,262 Q330,256 335,255" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Shield icon (top-left) -->
  <path d="M55,70 L55,100 C55,118 70,130 80,135 C90,130 105,118 105,100 L105,70 L80,60 Z" stroke="#2E2D2D" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Shield checkmark -->
  <polyline points="68,95 76,103 92,87" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Encrypted data lines (right side) -->
  <rect x="320" y="65" width="60" height="80" rx="5" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.08"/>
  <line x1="330" y1="80" x2="368" y2="80" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="330" y1="92" x2="360" y2="92" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="330" y1="104" x2="365" y2="104" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="330" y1="116" x2="355" y2="116" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <line x1="330" y1="128" x2="362" y2="128" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <!-- Lock icon on data -->
  <rect x="342" y="96" width="12" height="10" rx="2" fill="#2E2D2D" opacity="0.15"/>
  <path d="M345,96 L345,92 C345,89 347,88 348,88 C349,88 351,89 351,92 L351,96" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Secure badge (bottom-left) -->
  <circle cx="60" cy="320" r="16" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <polyline points="52,320 58,326 68,314" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="35" cy="200" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="380" cy="180" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="50" cy="260" r="2" fill="#C026D3" opacity="0.2"/>
  <circle cx="370" cy="370" r="2.5" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative lines -->
  <line x1="20" y1="170" x2="35" y2="170" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="25" y1="178" x2="35" y2="178" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.1"/>
</svg>