<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for folded map -->
  <path d="M53,83 L153,63 L253,83 L353,63 L353,303 L253,323 L153,303 L53,323 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Folded map body -->
  <path d="M50,80 L150,60 L250,80 L350,60 L350,300 L250,320 L150,300 L50,320 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10" stroke-linejoin="round"/>
  <!-- Fold lines -->
  <line x1="150" y1="60" x2="150" y2="300" stroke="#2E2D2D" stroke-width="2" opacity="0.2" stroke-dasharray="6,4"/>
  <line x1="250" y1="80" x2="250" y2="320" stroke="#2E2D2D" stroke-width="2" opacity="0.2" stroke-dasharray="6,4"/>
  <!-- Map inner surface (left panel) -->
  <path d="M60,90 L145,72 L145,290 L60,310 Z" fill="#A855F7" fill-opacity="0.06"/>
  <!-- Map inner surface (center panel) -->
  <path d="M155,72 L245,90 L245,310 L155,290 Z" fill="white" fill-opacity="0.3"/>
  <!-- Map inner surface (right panel) -->
  <path d="M255,90 L340,72 L340,290 L255,310 Z" fill="#C026D3" fill-opacity="0.06"/>
  <!-- Route line 1 (main road) -->
  <path d="M80,140 Q120,130 160,160 Q200,190 230,175 Q270,155 310,180" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Route line 2 (secondary road) -->
  <path d="M90,200 Q130,185 175,210 Q210,230 260,215 Q290,205 320,230" stroke="#A855F7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35" stroke-dasharray="5,3"/>
  <!-- Terrain lines -->
  <path d="M70,250 Q95,240 110,250 Q125,260 140,250" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.12"/>
  <path d="M260,130 Q280,120 300,130 Q320,140 335,130" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.12"/>
  <path d="M265,145 Q285,135 305,145" stroke="#2E2D2D" stroke-width="1" fill="none" opacity="0.08"/>
  <!-- Location markers -->
  <path d="M90,130 C90,123 95,119 100,119 C105,119 110,123 110,130 C110,137 100,147 100,147 C100,147 90,137 90,130 Z" fill="#C026D3" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="2"/>
  <circle cx="100" cy="129" r="3" fill="#2E2D2D" opacity="0.4"/>
  <!-- Destination marker (larger, highlighted) -->
  <path d="M295,168 C295,158 302,152 310,152 C318,152 325,158 325,168 C325,178 310,193 310,193 C310,193 295,178 295,168 Z" fill="#7C3AED" fill-opacity="0.25" stroke="#2E2D2D" stroke-width="2.5"/>
  <circle cx="310" cy="167" r="4" fill="#2E2D2D" opacity="0.5"/>
  <!-- Small marker -->
  <path d="M195,155 C195,150 198,148 201,148 C204,148 207,150 207,155 C207,160 201,166 201,166 C201,166 195,160 195,155 Z" fill="#A855F7" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Person's finger pointing at destination -->
  <path d="M340,340 L318,210 C316,200 320,195 326,197 L330,200 C328,192 334,188 338,194 L340,200 C340,192 346,190 348,196 L350,210 L352,240 Q352,280 345,340 Z" stroke="#2E2D2D" stroke-width="3" fill="#C026D3" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Finger pointing detail -->
  <path d="M326,210 Q324,205 326,200" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Index finger (pointing) -->
  <path d="M316,210 Q310,200 308,195" stroke="#2E2D2D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <circle cx="308" cy="193" r="3" fill="#2E2D2D" opacity="0.3"/>
  <!-- Compass rose (decorative, top-left) -->
  <circle cx="75" cy="105" r="10" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <line x1="75" y1="96" x2="75" y2="114" stroke="#2E2D2D" stroke-width="1" opacity="0.3"/>
  <line x1="66" y1="105" x2="84" y2="105" stroke="#2E2D2D" stroke-width="1" opacity="0.3"/>
  <polygon points="75,97 73,103 77,103" fill="#7C3AED" opacity="0.5"/>
  <!-- Distance indicator -->
  <line x1="105" y1="270" x2="175" y2="270" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="105" y1="265" x2="105" y2="275" stroke="#2E2D2D" stroke-width="2" opacity="0.3"/>
  <line x1="175" y1="265" x2="175" y2="275" stroke="#2E2D2D" stroke-width="2" opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="30" cy="180" r="2.5" fill="#7C3AED" opacity="0.3"/>
  <circle cx="380" cy="140" r="2" fill="#A855F7" opacity="0.25"/>
  <circle cx="40" cy="360" r="3" fill="#C026D3" opacity="0.2"/>
  <circle cx="370" cy="340" r="2" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="25" y1="50" x2="40" y2="50" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="365" y1="45" x2="380" y2="45" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>