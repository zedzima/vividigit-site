<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for clipboard -->
  <rect x="103" y="43" width="200" height="290" rx="12" fill="#000" opacity="0.08"/>
  <!-- Clipboard body -->
  <rect x="100" y="40" width="200" height="290" rx="12" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.10"/>
  <!-- Clipboard clip (top) -->
  <rect x="165" y="28" width="70" height="28" rx="6" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="165" y="28" width="70" height="28" rx="6" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.18"/>
  <!-- Clip hole -->
  <circle cx="200" cy="42" r="6" stroke="#2E2D2D" stroke-width="2" fill="white" fill-opacity="0.5"/>
  <!-- Inner paper area -->
  <rect x="118" y="68" width="164" height="244" rx="4" fill="white" fill-opacity="0.45" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Checklist item 1 (checked) -->
  <rect x="132" y="85" width="18" height="18" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.15"/>
  <polyline points="136,94 140,99 148,89" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="160" y1="92" x2="262" y2="92" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Checklist item 2 (checked) -->
  <rect x="132" y="116" width="18" height="18" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.15"/>
  <polyline points="136,125 140,130 148,120" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="160" y1="123" x2="248" y2="123" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Checklist item 3 (checked) -->
  <rect x="132" y="147" width="18" height="18" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.15"/>
  <polyline points="136,156 140,161 148,151" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="160" y1="154" x2="255" y2="154" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Checklist item 4 (being checked now - pen is here) -->
  <rect x="132" y="178" width="18" height="18" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.18"/>
  <line x1="160" y1="185" x2="240" y2="185" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Checklist item 5 (unchecked) -->
  <rect x="132" y="209" width="18" height="18" rx="3" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.4"/>
  <line x1="160" y1="216" x2="258" y2="216" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- Checklist item 6 (unchecked) -->
  <rect x="132" y="240" width="18" height="18" rx="3" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.35"/>
  <line x1="160" y1="247" x2="235" y2="247" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Checklist item 7 (unchecked) -->
  <rect x="132" y="271" width="18" height="18" rx="3" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.3"/>
  <line x1="160" y1="278" x2="245" y2="278" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  <!-- Pen marking item 4 -->
  <path d="M125,205 L140,185 L145,183 L143,188 L128,208 Z" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.18" stroke-linejoin="round"/>
  <!-- Pen body -->
  <line x1="143" y1="188" x2="90" y2="248" stroke="#2E2D2D" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="145" y1="183" x2="92" y2="243" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Pen tip -->
  <path d="M86,253 L90,248 L92,243 L86,253 Z" fill="#2E2D2D" opacity="0.8"/>
  <!-- Priority marker (exclamation) -->
  <circle cx="268" y="185" r="8" fill="#C026D3" fill-opacity="0.2" stroke="#2E2D2D" stroke-width="1.5"/>
  <text x="265" y="189" font-family="sans-serif" font-size="12" fill="#2E2D2D" font-weight="bold" opacity="0.5">!</text>
  <!-- Sticky note (top-right, floating) -->
  <rect x="305" y="55" width="60" height="55" rx="3" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="305" y="55" width="60" height="55" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.16"/>
  <!-- Sticky note fold -->
  <path d="M345,110 L365,110 L365,90 Z" fill="white" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Sticky note text lines -->
  <line x1="312" y1="70" x2="350" y2="70" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="312" y1="80" x2="345" y2="80" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="312" y1="90" x2="338" y2="90" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Attached document (bottom-left, floating) -->
  <rect x="28" y="130" width="48" height="60" rx="3" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <rect x="28" y="130" width="48" height="60" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Document corner fold -->
  <path d="M60,130 L76,130 L76,146 Z" fill="white" fill-opacity="0.3" stroke="#2E2D2D" stroke-width="1.5"/>
  <!-- Document text -->
  <line x1="36" y1="148" x2="66" y2="148" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="36" y1="158" x2="60" y2="158" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="36" y1="168" x2="55" y2="168" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Paperclip connecting doc -->
  <path d="M72,140 C80,135 85,130 82,122 C79,114 72,115 70,122 L68,142" stroke="#2E2D2D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="340" cy="150" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="50" cy="100" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="360" cy="300" r="2" fill="#C026D3" opacity="0.25"/>
  <circle cx="35" cy="320" r="3" fill="#7C3AED" opacity="0.2"/>
  <!-- Decorative small lines -->
  <line x1="320" y1="240" x2="340" y2="240" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="30" y1="280" x2="50" y2="280" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="340" y1="350" x2="360" y2="350" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>