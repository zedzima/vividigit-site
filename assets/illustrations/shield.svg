<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Shield depth shadow -->
  <path d="M203,47 C203,47 303,67 333,67 L333,207 C333,277 203,347 203,347 C203,347 73,277 73,207 L73,67 C103,67 203,47 203,47 Z" fill="#000" opacity="0.08" transform="translate(4,4)"/>
  <!-- Shield main -->
  <path d="M199,43 C199,43 299,63 329,63 L329,203 C329,273 199,343 199,343 C199,343 69,273 69,203 L69,63 C99,63 199,43 199,43 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- Shield inner area -->
  <path d="M199,70 C199,70 280,86 306,86 L306,200 C306,256 199,316 199,316 C199,316 92,256 92,200 L92,86 C118,86 199,70 199,70 Z" stroke="#2E2D2D" stroke-width="2" fill="#A855F7" fill-opacity="0.08"/>
  <!-- Large checkmark -->
  <polyline points="155,195 185,230 250,155" stroke="#7C3AED" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Checkmark secondary thinner line for depth -->
  <polyline points="155,195 185,230 250,155" stroke="#2E2D2D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Person silhouette (behind shield, left side visible) -->
  <!-- Head -->
  <circle cx="50" cy="155" r="20" fill="#2E2D2D" opacity="0.15" stroke="#2E2D2D" stroke-width="2.5"/>
  <!-- Body -->
  <path d="M50,175 C50,175 30,190 25,220 L25,290 L40,290 L42,240 L50,225 L58,240 L60,290 L75,290 L75,220 C70,190 50,175 50,175 Z" fill="#2E2D2D" opacity="0.12" stroke="#2E2D2D" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Arms extended confidently -->
  <path d="M35,200 L15,215" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M65,200 L70,185" stroke="#2E2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Person silhouette right side -->
  <!-- Head -->
  <circle cx="360" cy="165" r="18" fill="#2E2D2D" opacity="0.12" stroke="#2E2D2D" stroke-width="2"/>
  <!-- Body -->
  <path d="M360,183 C360,183 342,196 338,222 L338,280 L350,280 L352,238 L360,225 L368,238 L370,280 L382,280 L382,222 C378,196 360,183 360,183 Z" fill="#2E2D2D" opacity="0.10" stroke="#2E2D2D" stroke-width="2" stroke-linejoin="round"/>
  <!-- Arm reaching to shield -->
  <path d="M345,205 L330,195" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round"/>
  <!-- Lock icon -->
  <rect x="330" y="80" width="30" height="24" rx="4" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.16"/>
  <path d="M339,80 L339,70 C339,62 351,62 351,70 L351,80" stroke="#2E2D2D" stroke-width="2.5" fill="none"/>
  <circle cx="345" cy="92" r="3" fill="#2E2D2D" opacity="0.4"/>
  <!-- Dotted protection barrier arc -->
  <path d="M30,110 Q35,50 100,30" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 4" fill="none" opacity="0.3"/>
  <path d="M300,30 Q365,50 380,110" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 4" fill="none" opacity="0.3"/>
  <!-- Bottom dotted barrier -->
  <path d="M15,300 Q30,340 70,355" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 4" fill="none" opacity="0.25"/>
  <path d="M330,355 Q370,340 385,300" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 4" fill="none" opacity="0.25"/>
  <!-- Decorative dots -->
  <circle cx="20" cy="60" r="3" fill="#7C3AED" opacity="0.25"/>
  <circle cx="388" cy="55" r="2.5" fill="#A855F7" opacity="0.2"/>
  <circle cx="15" cy="350" r="2" fill="#C026D3" opacity="0.2"/>
  <circle cx="390" cy="340" r="2.5" fill="#7C3AED" opacity="0.2"/>
  <circle cx="200" cy="20" r="2" fill="#A855F7" opacity="0.2"/>
  <!-- Small decorative lines -->
  <line x1="355" y1="380" x2="385" y2="380" stroke="#A855F7" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <line x1="15" y1="385" x2="40" y2="385" stroke="#7C3AED" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
</svg>