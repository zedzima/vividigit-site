<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Depth shadow for pedestal -->
  <rect x="133" y="303" width="140" height="22" rx="4" fill="#000" opacity="0.08"/>
  <rect x="153" y="283" width="100" height="24" rx="3" fill="#000" opacity="0.08"/>
  <!-- Pedestal base -->
  <rect x="130" y="300" width="140" height="22" rx="4" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.14"/>
  <!-- Pedestal top -->
  <rect x="150" y="280" width="100" height="24" rx="3" stroke="#2E2D2D" stroke-width="3" fill="#7C3AED" fill-opacity="0.16"/>
  <!-- #1 badge on pedestal -->
  <text x="183" y="298" font-family="sans-serif" font-size="16" fill="#7C3AED" font-weight="bold" opacity="0.6">#1</text>
  <!-- Depth shadow for trophy cup -->
  <path d="M168,183 L168,143 C168,103 200,73 203,73 C206,73 238,103 238,143 L238,183 Z" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <!-- Trophy cup body -->
  <path d="M165,180 L165,140 C165,100 197,70 200,70 C203,70 235,100 235,140 L235,180 Z" stroke="#2E2D2D" stroke-width="3.5" fill="#7C3AED" fill-opacity="0.18" stroke-linejoin="round"/>
  <!-- Trophy cup rim -->
  <ellipse cx="200" cy="70" rx="35" ry="10" stroke="#2E2D2D" stroke-width="3" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Trophy cup inner highlight -->
  <path d="M180,90 C185,80 195,74 200,74" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.25" stroke-linecap="round"/>
  <!-- Trophy stem -->
  <rect x="192" y="180" width="16" height="40" rx="2" stroke="#2E2D2D" stroke-width="2.5" fill="#2E2D2D" fill-opacity="0.08"/>
  <!-- Trophy stem base plate -->
  <rect x="178" y="218" width="44" height="10" rx="3" stroke="#2E2D2D" stroke-width="2.5" fill="#A855F7" fill-opacity="0.12"/>
  <!-- Trophy left handle -->
  <path d="M165,105 C140,105 130,125 130,140 C130,155 142,168 160,168" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Trophy right handle -->
  <path d="M235,105 C260,105 270,125 270,140 C270,155 258,168 240,168" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Person reaching up (left side) -->
  <!-- Person body -->
  <circle cx="95" cy="240" r="16" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>
  <!-- Person torso -->
  <line x1="95" y1="256" x2="95" y2="310" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Person legs -->
  <line x1="95" y1="310" x2="78" y2="360" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <line x1="95" y1="310" x2="112" y2="360" stroke="#2E2D2D" stroke-width="3" stroke-linecap="round"/>
  <!-- Person arm reaching up toward trophy -->
  <path d="M95,270 C85,255 100,230 120,210 C135,195 155,185 165,180" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Other arm -->
  <path d="M95,275 C110,260 130,245 145,232" stroke="#2E2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Confetti pieces -->
  <rect x="110" y="45" width="12" height="6" rx="1" fill="#7C3AED" opacity="0.4" transform="rotate(-20, 116, 48)"/>
  <rect x="260" y="55" width="10" height="5" rx="1" fill="#A855F7" opacity="0.35" transform="rotate(15, 265, 58)"/>
  <rect x="145" y="30" width="8" height="4" rx="1" fill="#C026D3" opacity="0.35" transform="rotate(-35, 149, 32)"/>
  <rect x="240" y="35" width="11" height="5" rx="1" fill="#7C3AED" opacity="0.3" transform="rotate(25, 246, 38)"/>
  <rect x="300" y="80" width="9" height="4" rx="1" fill="#C026D3" opacity="0.3" transform="rotate(-10, 305, 82)"/>
  <rect x="80" y="60" width="10" height="5" rx="1" fill="#A855F7" opacity="0.3" transform="rotate(30, 85, 63)"/>
  <!-- Confetti circles -->
  <circle cx="130" cy="42" r="3" fill="#C026D3" opacity="0.4"/>
  <circle cx="280" cy="48" r="2.5" fill="#7C3AED" opacity="0.35"/>
  <circle cx="170" cy="25" r="2" fill="#A855F7" opacity="0.35"/>
  <circle cx="310" cy="65" r="3" fill="#A855F7" opacity="0.3"/>
  <circle cx="65" cy="85" r="2.5" fill="#7C3AED" opacity="0.3"/>
  <!-- Medal (right side) -->
  <line x1="320" y1="180" x2="335" y2="210" stroke="#C026D3" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="350" y1="180" x2="335" y2="210" stroke="#C026D3" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="335" cy="228" r="18" fill="#000" opacity="0.08" transform="translate(3,3)"/>
  <circle cx="335" cy="228" r="18" stroke="#2E2D2D" stroke-width="2.5" fill="#C026D3" fill-opacity="0.16"/>
  <circle cx="335" cy="228" r="11" stroke="#2E2D2D" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Star on medal -->
  <polygon points="335,219 337,225 344,225 339,229 341,235 335,231 329,235 331,229 326,225 333,225" fill="#2E2D2D" opacity="0.4"/>
  <!-- Ribbon decoration (top-right) -->
  <path d="M345,170 L355,175 L345,180 L355,185" stroke="#A855F7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Decorative dots -->
  <circle cx="50" cy="170" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="365" cy="300" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="40" cy="350" r="2" fill="#C026D3" opacity="0.25"/>
  <!-- Decorative small lines -->
  <line x1="310" y1="320" x2="330" y2="320" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="45" y1="130" x2="62" y2="130" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>