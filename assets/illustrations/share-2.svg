<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- === SHARE-2: Network nodes with hands passing document === -->

  <!-- Node 1 (top center) - shadow -->
  <circle cx="203" cy="83" r="38" fill="#000" opacity="0.08"/>
  <!-- Node 1 -->
  <circle cx="200" cy="80" r="38" stroke="#2E2D2D" stroke-width="4" fill="#7C3AED" fill-opacity="0.15"/>
  <!-- Node 1 inner icon (document) -->
  <rect x="184" y="65" width="32" height="30" rx="3" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.4"/>
  <line x1="190" y1="74" x2="210" y2="74" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="190" y1="81" x2="206" y2="81" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="190" y1="88" x2="202" y2="88" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Node 2 (bottom left) - shadow -->
  <circle cx="73" cy="303" r="38" fill="#000" opacity="0.08"/>
  <!-- Node 2 -->
  <circle cx="70" cy="300" r="38" stroke="#2E2D2D" stroke-width="4" fill="#A855F7" fill-opacity="0.15"/>
  <!-- Node 2 inner icon (person) -->
  <circle cx="70" cy="288" r="10" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M55 318 Q55 308 70 308 Q85 308 85 318" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.35"/>

  <!-- Node 3 (bottom right) - shadow -->
  <circle cx="333" cy="303" r="38" fill="#000" opacity="0.08"/>
  <!-- Node 3 -->
  <circle cx="330" cy="300" r="38" stroke="#2E2D2D" stroke-width="4" fill="#C026D3" fill-opacity="0.15"/>
  <!-- Node 3 inner icon (screen/device) -->
  <rect x="312" y="286" width="36" height="24" rx="3" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.4"/>
  <line x1="322" y1="310" x2="338" y2="310" stroke="#2E2D2D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Connection line: Node 1 to Node 2 -->
  <line x1="168" y1="110" x2="100" y2="268" stroke="#2E2D2D" stroke-width="3" opacity="0.25"/>
  <!-- Connection line: Node 1 to Node 3 -->
  <line x1="232" y1="110" x2="300" y2="268" stroke="#2E2D2D" stroke-width="3" opacity="0.25"/>
  <!-- Connection line: Node 2 to Node 3 -->
  <line x1="108" y1="300" x2="292" y2="300" stroke="#2E2D2D" stroke-width="3" opacity="0.25"/>

  <!-- Flow arrow: Node 1 -> Node 2 -->
  <path d="M148 165 L138 158 L132 168" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Flow arrow: Node 1 -> Node 3 -->
  <path d="M252 165 L262 158 L268 168" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Flow arrow: Node 2 -> Node 3 -->
  <path d="M190 295 L198 288 L198 302" stroke="#A855F7" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Hand 1 passing document (on line between Node 1 and Node 2) -->
  <!-- Document/package being passed -->
  <rect x="110" y="175" width="28" height="22" rx="3" fill="#000" opacity="0.08" transform="translate(2,2)"/>
  <rect x="108" y="173" width="28" height="22" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#7C3AED" fill-opacity="0.14"/>
  <line x1="114" y1="181" x2="130" y2="181" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="114" y1="188" x2="126" y2="188" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Hand gripping -->
  <path d="M135 178 Q142 172 146 178 Q148 184 142 188 Q138 190 134 186 Z" fill="#2E2D2D" opacity="0.8"/>
  <path d="M132 184 Q128 178 132 174" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Hand 2 passing package (on line between Node 1 and Node 3) -->
  <!-- Package being passed -->
  <rect x="262" y="175" width="28" height="22" rx="3" fill="#000" opacity="0.08" transform="translate(2,2)"/>
  <rect x="260" y="173" width="28" height="22" rx="3" stroke="#2E2D2D" stroke-width="2" fill="#C026D3" fill-opacity="0.14"/>
  <line x1="266" y1="181" x2="282" y2="181" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="266" y1="188" x2="278" y2="188" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Hand gripping -->
  <path d="M255 178 Q248 172 244 178 Q242 184 248 188 Q252 190 256 186 Z" fill="#2E2D2D" opacity="0.8"/>
  <path d="M258 184 Q262 178 258 174" stroke="#2E2D2D" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Data packet on bottom line -->
  <rect x="188" y="290" width="24" height="18" rx="3" stroke="#2E2D2D" stroke-width="1.5" fill="#A855F7" fill-opacity="0.14"/>
  <line x1="193" y1="297" x2="207" y2="297" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="193" y1="303" x2="203" y2="303" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.2"/>

  <!-- Small data packet floating near Node 3 -->
  <rect x="355" y="248" width="20" height="16" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="#C026D3" fill-opacity="0.10"/>
  <line x1="359" y1="254" x2="371" y2="254" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.25"/>

  <!-- Small data packet floating near Node 2 -->
  <rect x="25" y="248" width="20" height="16" rx="2" stroke="#2E2D2D" stroke-width="1.5" fill="#7C3AED" fill-opacity="0.10"/>
  <line x1="29" y1="254" x2="41" y2="254" stroke="#2E2D2D" stroke-width="1" stroke-linecap="round" opacity="0.25"/>

  <!-- Circular motion indicator around Node 1 -->
  <path d="M165 55 Q175 38 200 35 Q225 38 235 55" stroke="#2E2D2D" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.2"/>
  <path d="M232 58 L238 52 L236 62" stroke="#2E2D2D" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>

  <!-- Decorative dots -->
  <circle cx="200" cy="200" r="4" fill="#7C3AED" opacity="0.2"/>
  <circle cx="55" cy="180" r="2.5" fill="#A855F7" opacity="0.25"/>
  <circle cx="345" cy="180" r="2.5" fill="#C026D3" opacity="0.25"/>
  <circle cx="200" cy="360" r="3" fill="#7C3AED" opacity="0.22"/>
  <circle cx="30" cy="350" r="2" fill="#A855F7" opacity="0.2"/>
  <circle cx="370" cy="350" r="2" fill="#C026D3" opacity="0.2"/>

  <!-- Decorative small lines -->
  <line x1="155" y1="365" x2="175" y2="365" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="15" y1="210" x2="32" y2="210" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="368" y1="210" x2="388" y2="210" stroke="#2E2D2D" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
</svg>