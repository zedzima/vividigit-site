<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="100%" stop-color="#C026D3"/>
  </linearGradient>
  <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#A855F7"/>
    <stop offset="100%" stop-color="#7C3AED"/>
  </linearGradient>
  <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="100%" stop-color="#A855F7"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- SMARTPHONE / SOCIAL DASHBOARD -->
<rect x="205" y="90" width="190" height="355" rx="28" stroke="url(#g1)" stroke-width="4" fill="none" filter="url(#glow)"/>
<rect x="222" y="120" width="156" height="286" rx="16" stroke="#A855F7" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.04"/>
<line x1="272" y1="104" x2="328" y2="104" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
<circle cx="300" cy="425" r="10" stroke="#A855F7" stroke-width="2.5" fill="none"/>

<!-- In-screen line chart -->
<path d="M240 180 L268 162 L298 176 L328 146 L356 160" stroke="url(#g1)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
<circle cx="240" cy="180" r="4" fill="#C026D3"/>
<circle cx="268" cy="162" r="4" fill="#C026D3"/>
<circle cx="298" cy="176" r="4" fill="#C026D3"/>
<circle cx="328" cy="146" r="4" fill="#C026D3"/>
<circle cx="356" cy="160" r="4" fill="#C026D3"/>

<!-- In-screen bars -->
<rect x="244" y="335" width="20" height="45" rx="3" stroke="#7C3AED" stroke-width="2.5" fill="#7C3AED" fill-opacity="0.18"/>
<rect x="273" y="315" width="20" height="65" rx="3" stroke="#A855F7" stroke-width="2.5" fill="#A855F7" fill-opacity="0.18"/>
<rect x="302" y="292" width="20" height="88" rx="3" stroke="url(#g1)" stroke-width="2.5" fill="#C026D3" fill-opacity="0.16"/>
<rect x="331" y="325" width="20" height="55" rx="3" stroke="#A855F7" stroke-width="2.5" fill="#A855F7" fill-opacity="0.14"/>

<!-- In-screen heart icon -->
<path d="M300 232 C292 220 274 221 270 236 C266 252 282 263 300 278 C318 263 334 252 330 236 C326 221 308 220 300 232Z" stroke="#C026D3" stroke-width="2.5" fill="#C026D3" fill-opacity="0.12"/>

<!-- MEGAPHONE -->
<g transform="translate(130,250) rotate(-20)" filter="url(#glow)">
  <path d="M0 0 L70 -22 L70 32 L0 12Z" stroke="url(#g2)" stroke-width="4" fill="#7C3AED" fill-opacity="0.12" stroke-linejoin="round"/>
  <path d="M-12 8 L0 8" stroke="#A855F7" stroke-width="4" stroke-linecap="round"/>
  <rect x="-22" y="4" width="10" height="18" rx="4" stroke="#A855F7" stroke-width="2.5" fill="#A855F7" fill-opacity="0.14"/>
  <line x1="75" y1="-15" x2="95" y2="-25" stroke="#C026D3" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="5" x2="102" y2="5" stroke="#C026D3" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="24" x2="95" y2="34" stroke="#C026D3" stroke-width="3" stroke-linecap="round"/>
</g>

<!-- SOCIAL BUBBLES -->
<g filter="url(#glow)">
  <circle cx="470" cy="190" r="38" stroke="url(#g1)" stroke-width="3.5" fill="none"/>
  <path d="M454 187 C462 173 478 173 486 187 C492 198 484 207 470 218 C456 207 448 198 454 187Z" stroke="#A855F7" stroke-width="2.5" fill="#A855F7" fill-opacity="0.12"/>

  <rect x="435" y="250" width="85" height="62" rx="14" stroke="#7C3AED" stroke-width="3" fill="#7C3AED" fill-opacity="0.08"/>
  <path d="M460 312 L450 332 L478 314" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="450" y1="271" x2="503" y2="271" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="450" y1="287" x2="494" y2="287" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
</g>

<!-- NOTIFICATION BELL -->
<g transform="translate(108,420)" filter="url(#glow)">
  <path d="M25 4 C12 4 4 14 4 28 V42 L0 48 H50 L46 42 V28 C46 14 38 4 25 4Z" stroke="url(#g3)" stroke-width="3.5" fill="#A855F7" fill-opacity="0.08" stroke-linejoin="round"/>
  <circle cx="25" cy="54" r="5" stroke="#C026D3" stroke-width="2.5" fill="#C026D3" fill-opacity="0.16"/>
  <circle cx="48" cy="10" r="10" stroke="#C026D3" stroke-width="2.5" fill="#C026D3" fill-opacity="0.22"/>
  <line x1="45" y1="10" x2="51" y2="10" stroke="#C026D3" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="7" x2="48" y2="13" stroke="#C026D3" stroke-width="2" stroke-linecap="round"/>
</g>

<!-- A/B AD CARD -->
<g transform="translate(430,400)" filter="url(#glow)">
  <rect x="0" y="0" width="130" height="90" rx="12" stroke="#A855F7" stroke-width="3" fill="#7C3AED" fill-opacity="0.05"/>
  <line x1="65" y1="10" x2="65" y2="80" stroke="#A855F7" stroke-width="2" opacity="0.3"/>
  <path d="M18 58 L30 70 L50 44" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M80 44 L112 76" stroke="#C026D3" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M112 44 L80 76" stroke="#C026D3" stroke-width="3" fill="none" stroke-linecap="round"/>
</g>

<!-- CONNECTORS -->
<line x1="200" y1="255" x2="170" y2="250" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 6" opacity="0.35"/>
<line x1="397" y1="220" x2="432" y2="205" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 6" opacity="0.35"/>
<line x1="225" y1="390" x2="165" y2="430" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 6" opacity="0.3"/>
<line x1="380" y1="390" x2="435" y2="430" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 6" opacity="0.3"/>

<!-- Accent orbit -->
<ellipse cx="300" cy="270" rx="240" ry="95" stroke="#7C3AED" stroke-width="1.5" opacity="0.2" fill="none" transform="rotate(-12 300 270)"/>
<circle cx="530" cy="310" r="5" fill="#C026D3" fill-opacity="0.65"/>

<!-- Sparkles -->
<g stroke="#A855F7" stroke-width="2" opacity="0.45">
  <line x1="82" y1="146" x2="82" y2="162" stroke-linecap="round"/>
  <line x1="74" y1="154" x2="90" y2="154" stroke-linecap="round"/>
</g>
<g stroke="#C026D3" stroke-width="2" opacity="0.4">
  <line x1="520" y1="102" x2="520" y2="116" stroke-linecap="round"/>
  <line x1="513" y1="109" x2="527" y2="109" stroke-linecap="round"/>
</g>
<circle cx="70" cy="300" r="3" fill="#7C3AED" opacity="0.35"/>
</svg>
