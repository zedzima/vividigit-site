<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="100%" stop-color="#C026D3"/>
  </linearGradient>
  <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#A855F7"/>
    <stop offset="100%" stop-color="#7C3AED"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- CENTRAL EMAIL CARD -->
<g filter="url(#glow)">
  <rect x="170" y="190" width="260" height="190" rx="18" stroke="url(#g1)" stroke-width="4" fill="#7C3AED" fill-opacity="0.05"/>
  <path d="M182 214 L300 300 L418 214" stroke="#A855F7" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M182 356 L270 286" stroke="#7C3AED" stroke-width="2.5" opacity="0.65"/>
  <path d="M418 356 L330 286" stroke="#7C3AED" stroke-width="2.5" opacity="0.65"/>
  <circle cx="300" cy="286" r="10" stroke="#C026D3" stroke-width="2.5" fill="#C026D3" fill-opacity="0.16"/>
</g>

<!-- WORKFLOW NODES -->
<g filter="url(#glow)">
  <!-- Segment node (top-left) -->
  <circle cx="120" cy="150" r="42" stroke="url(#g2)" stroke-width="3.5" fill="none"/>
  <circle cx="106" cy="145" r="7" stroke="#A855F7" stroke-width="2" fill="#A855F7" fill-opacity="0.15"/>
  <circle cx="134" cy="145" r="7" stroke="#A855F7" stroke-width="2" fill="#A855F7" fill-opacity="0.15"/>
  <path d="M98 165 C108 176 132 176 142 165" stroke="#A855F7" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Schedule node (top-right) -->
  <circle cx="480" cy="150" r="42" stroke="url(#g1)" stroke-width="3.5" fill="none"/>
  <circle cx="480" cy="150" r="18" stroke="#C026D3" stroke-width="2.5" fill="none"/>
  <path d="M480 150 L490 142" stroke="#C026D3" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M480 150 L480 161" stroke="#C026D3" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Offer node (bottom-left) -->
  <circle cx="120" cy="450" r="42" stroke="url(#g1)" stroke-width="3.5" fill="none"/>
  <rect x="101" y="434" width="38" height="30" rx="6" stroke="#A855F7" stroke-width="2.5" fill="#A855F7" fill-opacity="0.1"/>
  <line x1="112" y1="434" x2="112" y2="464" stroke="#A855F7" stroke-width="2"/>
  <line x1="128" y1="434" x2="128" y2="464" stroke="#A855F7" stroke-width="2"/>

  <!-- Goal node (bottom-right) -->
  <circle cx="480" cy="450" r="42" stroke="url(#g2)" stroke-width="3.5" fill="none"/>
  <circle cx="480" cy="450" r="18" stroke="#C026D3" stroke-width="2.5" fill="none"/>
  <circle cx="480" cy="450" r="7" stroke="#C026D3" stroke-width="2.5" fill="#C026D3" fill-opacity="0.15"/>
  <path d="M512 418 L488 442" stroke="#C026D3" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M512 418 L505 419 L511 426" fill="#C026D3"/>
</g>

<!-- SEND PATH / PAPER AIRPLANE -->
<g filter="url(#glow)">
  <path d="M58 316 C100 288 140 294 182 300 C210 304 240 306 270 300" stroke="#A855F7" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="6 8" opacity="0.55"/>
  <path d="M56 320 L92 310 L72 338 L68 323 L56 320Z" stroke="#7C3AED" stroke-width="2.8" fill="#7C3AED" fill-opacity="0.14" stroke-linejoin="round"/>
</g>

<!-- A/B TEST MINI CARD -->
<g transform="translate(240,420)" filter="url(#glow)">
  <rect x="0" y="0" width="120" height="90" rx="12" stroke="#7C3AED" stroke-width="3" fill="#7C3AED" fill-opacity="0.05"/>
  <line x1="60" y1="12" x2="60" y2="78" stroke="#A855F7" stroke-width="2" opacity="0.35"/>
  <path d="M18 58 L29 69 L48 46" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M74 46 L103 74" stroke="#C026D3" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M103 46 L74 74" stroke="#C026D3" stroke-width="3" fill="none" stroke-linecap="round"/>
</g>

<!-- CONNECTORS TO CENTER -->
<line x1="158" y1="176" x2="210" y2="220" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 6" opacity="0.35"/>
<line x1="442" y1="176" x2="390" y2="220" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 6" opacity="0.35"/>
<line x1="158" y1="424" x2="210" y2="356" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 6" opacity="0.35"/>
<line x1="442" y1="424" x2="390" y2="356" stroke="#A855F7" stroke-width="2" stroke-dasharray="5 6" opacity="0.35"/>

<!-- BOTTOM PERFORMANCE TICKS -->
<g stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <path d="M210 540 L220 552 L240 530"/>
  <path d="M255 540 L265 552 L285 530" stroke="#A855F7"/>
  <path d="M300 540 L310 552 L330 530" stroke="#C026D3"/>
  <path d="M345 540 L355 552 L375 530" stroke="#A855F7"/>
</g>

<!-- ORBIT + ACCENTS -->
<ellipse cx="300" cy="300" rx="255" ry="150" stroke="#7C3AED" stroke-width="1.5" opacity="0.2" fill="none" transform="rotate(-10 300 300)"/>
<circle cx="536" cy="262" r="5" fill="#C026D3" fill-opacity="0.62"/>

<g stroke="#A855F7" stroke-width="2" opacity="0.45">
  <line x1="78" y1="246" x2="78" y2="262" stroke-linecap="round"/>
  <line x1="70" y1="254" x2="86" y2="254" stroke-linecap="round"/>
</g>
<g stroke="#C026D3" stroke-width="2" opacity="0.4">
  <line x1="520" y1="88" x2="520" y2="104" stroke-linecap="round"/>
  <line x1="512" y1="96" x2="528" y2="96" stroke-linecap="round"/>
</g>
<circle cx="74" cy="370" r="3" fill="#7C3AED" opacity="0.35"/>
</svg>
