<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="100%" stop-color="#C026D3"/>
  </linearGradient>
  <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#A855F7"/>
    <stop offset="100%" stop-color="#7C3AED"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- MONITOR / DASHBOARD — center piece -->
<!-- Screen frame -->
<rect x="150" y="100" width="300" height="210" rx="12" stroke="url(#g1)" stroke-width="4" fill="none" filter="url(#glow)"/>
<!-- Screen stand -->
<path d="M270 310 L270 350 Q270 360 260 360 L340 360 Q330 360 330 350 L330 310" stroke="#A855F7" stroke-width="3.5" fill="none"/>
<line x1="240" y1="360" x2="360" y2="360" stroke="#A855F7" stroke-width="3.5" stroke-linecap="round"/>

<!-- Dashboard content inside screen -->
<!-- Bar chart -->
<rect x="180" y="240" width="28" height="45" rx="3" stroke="#7C3AED" stroke-width="3" fill="#7C3AED" fill-opacity="0.15"/>
<rect x="218" y="215" width="28" height="70" rx="3" stroke="#A855F7" stroke-width="3" fill="#A855F7" fill-opacity="0.15"/>
<rect x="256" y="190" width="28" height="95" rx="3" stroke="url(#g1)" stroke-width="3" fill="#C026D3" fill-opacity="0.15"/>
<rect x="294" y="225" width="28" height="60" rx="3" stroke="#A855F7" stroke-width="3" fill="#A855F7" fill-opacity="0.1"/>

<!-- Trend line over bars -->
<path d="M192 235 L232 208 L270 183 L308 218" stroke="#C026D3" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
<!-- Data points on trend -->
<circle cx="192" cy="235" r="4" fill="#C026D3"/>
<circle cx="232" cy="208" r="4" fill="#C026D3"/>
<circle cx="270" cy="183" r="4" fill="#C026D3"/>
<circle cx="308" cy="218" r="4" fill="#C026D3"/>

<!-- Mini line chart in top-right of screen -->
<path d="M350 140 L365 155 L380 135 L400 150 L420 125" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<!-- Header bar inside screen -->
<line x1="175" y1="130" x2="330" y2="130" stroke="#A855F7" stroke-width="2" opacity="0.3"/>
<circle cx="185" cy="118" r="5" stroke="#7C3AED" stroke-width="2" fill="none"/>
<line x1="198" y1="118" x2="250" y2="118" stroke="#7C3AED" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

<!-- MAGNIFYING GLASS — left side -->
<circle cx="95" cy="200" r="42" stroke="url(#g2)" stroke-width="4" fill="none" filter="url(#glow)"/>
<line x1="126" y1="231" x2="155" y2="260" stroke="url(#g2)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
<!-- Eye inside magnifier -->
<ellipse cx="95" cy="200" rx="22" ry="14" stroke="#A855F7" stroke-width="2.5" fill="none"/>
<circle cx="95" cy="200" r="7" fill="#A855F7" fill-opacity="0.3" stroke="#A855F7" stroke-width="2"/>

<!-- ROCKET — right side -->
<g transform="translate(490, 190) rotate(-30)">
  <!-- Body -->
  <path d="M0 -50 Q-18 -20 -18 25 L18 25 Q18 -20 0 -50Z" stroke="url(#g1)" stroke-width="4" fill="#7C3AED" fill-opacity="0.1" filter="url(#glow)"/>
  <!-- Window -->
  <circle cx="0" cy="-5" r="8" stroke="#C026D3" stroke-width="2.5" fill="#C026D3" fill-opacity="0.15"/>
  <!-- Fins -->
  <path d="M-18 15 L-30 30 L-18 25" stroke="#A855F7" stroke-width="3" fill="#A855F7" fill-opacity="0.1"/>
  <path d="M18 15 L30 30 L18 25" stroke="#A855F7" stroke-width="3" fill="#A855F7" fill-opacity="0.1"/>
  <!-- Flame -->
  <path d="M-10 25 Q0 50 10 25" stroke="#C026D3" stroke-width="2.5" fill="#C026D3" fill-opacity="0.2"/>
</g>

<!-- TARGET — bottom left -->
<circle cx="130" cy="460" r="45" stroke="#7C3AED" stroke-width="3.5" fill="none" filter="url(#glow)"/>
<circle cx="130" cy="460" r="28" stroke="#A855F7" stroke-width="2.5" fill="none"/>
<circle cx="130" cy="460" r="12" stroke="#C026D3" stroke-width="2.5" fill="#C026D3" fill-opacity="0.2"/>
<!-- Arrow hitting target -->
<line x1="170" y1="420" x2="138" y2="452" stroke="#C026D3" stroke-width="3" stroke-linecap="round"/>
<path d="M170 420 L160 422 L168 430Z" fill="#C026D3"/>

<!-- GEAR — bottom right -->
<g transform="translate(470, 460)">
  <circle cx="0" cy="0" r="22" stroke="#A855F7" stroke-width="3" fill="none"/>
  <circle cx="0" cy="0" r="9" stroke="#7C3AED" stroke-width="2.5" fill="none"/>
  <!-- Teeth -->
  <rect x="-5" y="-35" width="10" height="12" rx="2" fill="#A855F7" fill-opacity="0.6"/>
  <rect x="-5" y="23" width="10" height="12" rx="2" fill="#A855F7" fill-opacity="0.6"/>
  <rect x="23" y="-5" width="12" height="10" rx="2" fill="#A855F7" fill-opacity="0.6"/>
  <rect x="-35" y="-5" width="12" height="10" rx="2" fill="#A855F7" fill-opacity="0.6"/>
  <rect x="15" y="-28" width="10" height="12" rx="2" fill="#A855F7" fill-opacity="0.4" transform="rotate(45 20 -22)"/>
  <rect x="-25" y="16" width="10" height="12" rx="2" fill="#A855F7" fill-opacity="0.4" transform="rotate(45 -20 22)"/>
  <rect x="15" y="16" width="10" height="12" rx="2" fill="#A855F7" fill-opacity="0.4" transform="rotate(-45 20 22)"/>
  <rect x="-25" y="-28" width="10" height="12" rx="2" fill="#A855F7" fill-opacity="0.4" transform="rotate(-45 -20 -22)"/>
</g>

<!-- CONNECTING DOTTED LINES — subtle -->
<!-- Magnifier to screen -->
<line x1="140" y1="210" x2="150" y2="210" stroke="#7C3AED" stroke-width="2" stroke-dasharray="4 6" opacity="0.4"/>
<!-- Rocket to screen -->
<line x1="460" y1="200" x2="450" y2="200" stroke="#7C3AED" stroke-width="2" stroke-dasharray="4 6" opacity="0.4"/>
<!-- Screen to target -->
<line x1="240" y1="360" x2="165" y2="425" stroke="#A855F7" stroke-width="2" stroke-dasharray="4 6" opacity="0.3"/>
<!-- Screen to gear -->
<line x1="360" y1="360" x2="435" y2="425" stroke="#A855F7" stroke-width="2" stroke-dasharray="4 6" opacity="0.3"/>

<!-- Checkmark — bottom center -->
<path d="M280 480 L295 500 L325 460" stroke="#C026D3" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

<!-- Small sparkle accents (just 3, not noisy) -->
<g stroke="#A855F7" stroke-width="2" opacity="0.5">
  <line x1="530" y1="120" x2="530" y2="140" stroke-linecap="round"/>
  <line x1="520" y1="130" x2="540" y2="130" stroke-linecap="round"/>
</g>
<g stroke="#C026D3" stroke-width="2" opacity="0.4">
  <line x1="70" y1="340" x2="70" y2="356" stroke-linecap="round"/>
  <line x1="62" y1="348" x2="78" y2="348" stroke-linecap="round"/>
</g>
<circle cx="520" cy="380" r="3" fill="#7C3AED" opacity="0.4"/>
</svg>
